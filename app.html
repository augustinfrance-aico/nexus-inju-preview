  setPilotageCategory(c){
    this.state.pilotageCategory = c;
    this.save();
    this.renderView();
  },
  setPilotageView(v){
    this.state.pilotageView = v;
    this.save();
    this.renderView();
  },
  shiftPilotageMonth(delta){
    if (!this.state.pilotageMonth) { const n = new Date(); this.state.pilotageMonth = { year:n.getFullYear(), month:n.getMonth() }; }
    let { year, month } = this.state.pilotageMonth;
    month += delta;
    if (month < 0) { month = 11; year--; }
    if (month > 11) { month = 0; year++; }
    this.state.pilotageMonth = { year, month };
    this.save();
    this.renderView();
  },
  gotoTodayPilotage(){
    const n = new Date();
    this.state.pilotageMonth = { year:n.getFullYear(), month:n.getMonth() };
    this.save();
    this.renderView();
  },
  openAgendaDetail(id){
    const it = this.getAgendaItems().find(x => x.id === id);
    if (!it) return;
    const cats = this.pilotageCategories();
    const meta = cats[it.category] || { color:'#7A3CFF', ic:'🎯', lbl:it.category||'Item' };
    const statusLbl = { scheduled:'Programmé', active:'Actif', done:'Effectué', cancelled:'Annulé' }[it.status] || it.status;
    const ov = document.getElementById('modal-overlay');
    const mc = document.getElementById('modal-content');
    ov.classList.remove('hidden');
    mc.innerHTML = `
      <div class="modal-hd" style="border-bottom:3px solid ${meta.color}"><h3>${it.icon||meta.ic} ${it.title}</h3><button class="modal-close" onclick="Nx.closeModal()">✕</button></div>
      <div class="modal-body">
        <div style="display:flex;gap:8px;margin-bottom:14px">
          <span class="chip" style="background:${meta.color}1A;color:${meta.color};border:1px solid ${meta.color}55">${meta.ic} ${meta.lbl}</span>
          <span class="chip">${statusLbl}</span>
        </div>
        ${it.detail ? `<div style="padding:14px;background:var(--bg2);border-radius:10px;margin-bottom:14px;font-size:13.5px;line-height:1.6;color:var(--ink2)">${it.detail}</div>` : ''}
        <div style="font-size:12.5px;color:var(--muted)"><b>📅 Quand :</b> ${it.when || '—'}</div>
        ${it.createdAt ? `<div style="font-size:11px;color:var(--muted);margin-top:6px"><b>Créé :</b> ${new Date(it.createdAt).toLocaleString('fr-FR')}</div>` : ''}
      </div>
      <div class="modal-foot">
        ${(it.status==='scheduled'||it.status==='active') ? `
          <button class="btn btn-s" onclick="Nx.closeModal();Nx.modifyAgendaItem('${it.id}')">✏️ Modifier</button>
          <button class="btn btn-s" style="color:#EF4444;border-color:#FCA5A5" onclick="Nx.closeModal();Nx.cancelAgendaItem('${it.id}')">✕ Annuler</button>` : ''}
        ${it.status==='cancelled' ? `<button class="btn btn-s" onclick="Nx.closeModal();Nx.reactivateAgendaItem('${it.id}')">↻ Réactiver</button>` : ''}
        ${meta.route && meta.route !== 'pilotage' ? `<button class="btn btn-p" onclick="Nx.closeModal();Nx.navigate('${meta.route}')">→ Aller à ${meta.lbl}</button>` : `<button class="btn btn-p" onclick="Nx.closeModal()">OK</button>`}
      </div>`;
  },
  openDayPopup(ts){
    const d = new Date(ts);
    const items = this.getAgendaItems().filter(it => {
      const id = this.parseAgendaDate(it);
      return id.getFullYear()===d.getFullYear() && id.getMonth()===d.getMonth() && id.getDate()===d.getDate();
    });
    const cats = this.pilotageCategories();
    const ov = document.getElementById('modal-overlay');
    const mc = document.getElementById('modal-content');
    ov.classList.remove('hidden');
    mc.innerHTML = `
      <div class="modal-hd"><h3>📅 ${d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</h3><button class="modal-close" onclick="Nx.closeModal()">✕</button></div>
      <div class="modal-body" style="max-height:60vh;overflow-y:auto">
        ${items.length === 0 ? '<div style="text-align:center;color:var(--muted);padding:30px">Rien de prévu ce jour.</div>' :
          items.map(it => {
            const meta = cats[it.category] || { color:'#7A3CFF', ic:'🎯', lbl:'—' };
            return `<div style="padding:12px 14px;background:var(--bg2);border-left:3px solid ${meta.color};border-radius:8px;margin-bottom:8px;cursor:pointer" onclick="Nx.closeModal();Nx.openAgendaDetail('${it.id}')">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span style="font-size:16px">${it.icon||meta.ic}</span><b style="font-size:13px">${it.title}</b></div>
              <div style="font-size:11.5px;color:var(--muted);margin-left:24px">${meta.lbl} · ${it.when||'—'}</div>
            </div>`;
          }).join('')}
      </div>
      <div class="modal-foot"><button class="btn btn-p" onclick="Nx.closeModal()">Fermer</button></div>`;

  setPilotageTab(tab){
    this.state.pilotageTab = tab;
    this.save();
    this.renderView();
  },

  // Lit l'agenda depuis localStorage (partagé avec core.html)
  getAgendaItems(){
    try {
      const raw = localStorage.getItem('nx_agenda');
      return raw ? JSON.parse(raw) : [];
    } catch(e){ return []; }
  },
  saveAgendaItems(items){
    try { localStorage.setItem('nx_agenda', JSON.stringify(items)); } catch(e){}
  },

  cancelAgendaItem(id){
    const items = this.getAgendaItems();
    const idx = items.findIndex(i => i.id === id);
    if (idx < 0) return;
    items[idx].status = 'cancelled';
    items[idx].cancelledAt = new Date().toISOString();
    this.saveAgendaItems(items);
    this.toast(t('pilotage.toast.cancelled'), 'info');
    this.renderView();
  },
  reactivateAgendaItem(id){
    const items = this.getAgendaItems();
    const idx = items.findIndex(i => i.id === id);
    if (idx < 0) return;
    items[idx].status = 'scheduled';
    delete items[idx].cancelledAt;
    this.saveAgendaItems(items);
    this.toast(t('pilotage.toast.reactivated'), 'success');
    this.renderView();
  },
  modifyAgendaItem(id){
    const items = this.getAgendaItems();
    const it = items.find(i => i.id === id);
    if (!it) return;
    const newWhen = prompt('Nouvelle date/heure (ex: Vendredi 19h) :', it.when || '');
    if (newWhen === null) return;
    it.when = newWhen.trim() || it.when;
    it.modifiedAt = new Date().toISOString();
    this.saveAgendaItems(items);
    this.toast(t('pilotage.toast.modified'), 'success');
    this.renderView();
  },
  duplicateAgendaItem(id){
    const items = this.getAgendaItems();
    const src = items.find(i => i.id === id);
    if (!src) return;
    const copy = Object.assign({}, src, {
      id: 'agd_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
      status: 'scheduled',
      createdAt: new Date().toISOString()
    });
    delete copy.cancelledAt;
    delete copy.doneAt;
    items.push(copy);
    this.saveAgendaItems(items);
    this.state.pilotageTab = 'scheduled';
    this.save();
    this.toast('Action dupliquée → onglet Programmé', 'success');
    this.renderView();
  },

  // RENDER CAMPAGNE AUTO — lit state.autoCampaignDetails pour les overrides user
  // Fix Augustin 19/05 : quand on modifie le nom dans le builder, ça s'actualise vraiment ici
  renderAutoCampaign(id, ic, color, title, desc, status){
    const stored = (this.state.autoCampaignStatus||{})[id];
    if (stored === 'deleted') return '';
    const realStatus = stored || status;
    // Override depuis state si l'utilisateur a modifié cette campagne
    const det = (this.state.autoCampaignDetails||{})[id];
    let realTitle = title, realDesc = desc;
    if (det) {
      if (det.name) realTitle = det.name;
      // Reconstruit desc depuis cfg + trigger + target
      const targetLabels = { vip:'VIP', rec:'Récurrents', new:'Nouveaux', norm:'Normaux', lost:'Perdus', all:'Tous' };
      const tgt = targetLabels[det.target] || det.target || '';
      const parts = [];
      if (det.trigger === 'monthly' && det.cfg)      parts.push(`Le ${det.cfg.day||'?'} de chaque mois à ${det.cfg.time||'09:00'}`);
      else if (det.trigger === 'weekly' && det.cfg)  parts.push(`Chaque ${det.cfg.weekday||'?'} à ${det.cfg.time||'17:00'}`);
      else if (det.trigger === 'birthday')           parts.push(`Veille des anniversaires à ${(det.cfg&&det.cfg.time)||'09:00'}`);
      else if (det.trigger === 'silence' && det.cfg) parts.push(`Si silence > ${det.cfg.silenceDays||'?'} jours`);
      else if (det.trigger === 'weather')            parts.push('Selon météo');
      else if (det.trigger === 'stat')               parts.push('Selon stat seuil');
      if (tgt) parts.push(`cible ${tgt}`);
      if (parts.length) realDesc = parts.join(' · ');
    }
    return `
      <div style="padding:14px 16px;background:var(--bg2);border:1px solid var(--line);border-radius:11px;display:flex;align-items:center;gap:14px;margin-bottom:8px">
        <div style="width:42px;height:42px;border-radius:11px;background:${color}22;color:${color};display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">${ic}</div>
        <div style="flex:1">
          <div style="font-weight:700;font-size:13.5px">${realTitle}</div>
          <div style="font-size:11.5px;color:var(--muted);margin-top:2px">${realDesc}</div>
        </div>
        <span class="chip ${realStatus==='active'?'green':''}" style="font-size:11px;${realStatus!=='active'?'background:#94A3B822;color:#475569':''}">${realStatus==='active'?'● Active':'○ Pause'}</span>
        <button class="btn-g" onclick="Nx.toggleAutoStatus('${id}')" title="${realStatus==='active'?'Mettre en pause':'Activer'}">${realStatus==='active'?'⏸ Pause':'▶ Activer'}</button>
        <button class="btn-g" onclick="Nx.editAutoCampaign('${id}')" title="Modifier">✏️</button>
        <button class="btn-g" style="color:var(--red)" onclick="Nx.deleteAutoCampaign('${id}')" title="Supprimer">🗑</button>
      </div>`;
  },

  toggleAutoStatus(id){
    // POINT CAMPAGNES (e) — Activer/Pause fonctionnel pour les auto-campagnes
    if (!this.state.autoCampaignStatus) this.state.autoCampaignStatus = {};
    const labelMap = {'recovery-lost':'Récupération clients perdus','anniv-clients':'Anniversaires clients','promo-fin-mois':'Promo fin de mois','cart-abandoned':'Récupération panier abandonné'};
    if (id === 'recovery-lost') {
      this.state.recoveryStatus = (this.state.recoveryStatus === 'active') ? 'paused' : 'active';
      this.state.autoCampaignStatus[id] = this.state.recoveryStatus;
    } else if (id === 'cart-abandoned') {
      // Augustin 04/06 : statut dédié + miroir dans autoCampaignStatus
      this.state.cartRecoveryStatus = (this.state.cartRecoveryStatus === 'active') ? 'paused' : 'active';
      this.state.autoCampaignStatus[id] = this.state.cartRecoveryStatus;
    } else {
      const cur = this.state.autoCampaignStatus[id] || 'active';
      this.state.autoCampaignStatus[id] = (cur === 'active') ? 'paused' : 'active';
    }
    this.save();
    this.renderView();
    const newState = this.state.autoCampaignStatus[id] || (id==='recovery-lost'?this.state.recoveryStatus:id==='cart-abandoned'?this.state.cartRecoveryStatus:'active');
    this.toast(newState==='active'?'✓ '+(labelMap[id]||id)+' ACTIVÉE':'⏸ '+(labelMap[id]||id)+' mise en pause','success');
  },
  editAutoCampaign(id){
    // Fix Augustin 19/05 : avec le crayon, ça modifie pas le contenu
    // → on passe l'id à openAutoCampaign pour qu'il pré-remplisse TOUS les champs depuis state
    this.openAutoCampaign(id);
    this.toast('✏️ Édition en cours', 'info', id);
  },
  deleteAutoCampaign(id){
    // POINT CAMPAGNES (e) — Suppression réelle (marque l'auto comme deleted)
    if (!confirm('Supprimer cette automatisation ?\n\nElle ne sera plus jamais déclenchée.')) return;
    if (!this.state.autoCampaignStatus) this.state.autoCampaignStatus = {};
    this.state.autoCampaignStatus[id] = 'deleted';
    this.save();
    this.toast('🗑 Automatisation supprimée','success', id);
    this.renderView();
  },

  // Archives catalogue : upload + visualisation (sous le champ Lien catalogue)
  addCatalogArchive(){
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.pdf,.doc,.docx,.xls,.xlsx,.csv,.txt,.zip,.png,.jpg,.jpeg,.webp,.gif';
    input.multiple = true;
    input.onchange = (e) => {
      const files = Array.from(e.target.files || []);
      if (!files.length) return;
      if (!this.state.business.catalogArchives) this.state.business.catalogArchives = [];
      let done = 0, tooBig = 0;
      files.forEach(file => {
        if (file.size > 4 * 1024 * 1024) {
          tooBig++; done++;
          if (done === files.length) { this.save(); this.renderView(); this.toast(`📎 ${files.length-tooBig} ajouté(s)`,'success', tooBig ? `${tooBig} ignoré(s) (> 4 Mo)` : ''); }
          return;
        }
        const reader = new FileReader();
        reader.onload = (ev) => {
          const sizeKb = Math.round(file.size / 1024);
          this.state.business.catalogArchives.push({
            id: Date.now() + Math.random(),
            name: file.name,
            type: file.type,
            size: sizeKb < 1024 ? sizeKb + ' Ko' : (sizeKb/1024).toFixed(1) + ' Mo',
            date: new Date().toLocaleDateString('fr-FR'),
            dataUrl: ev.target.result
          });
          done++;
          if (done === files.length) {
            try { this.save(); } catch(err) {
              this.state.business.catalogArchives.forEach(a => { if (a.dataUrl) delete a.dataUrl; });
              this.save(); this.toast('⚠️ Stockage plein','warn','Visualisation indisponible'); this.renderView(); return;
            }
            this.renderView();
            this.toast(`📎 ${files.length-tooBig} archive(s) catalogue`,'success', files.map(f=>f.name).join(', ').slice(0,80));
          }
        };
        reader.readAsDataURL(file);
      });
    };
    input.click();
  },
  viewCatalogArchive(i){
    const a = (this.state.business.catalogArchives||[])[i];
    if (!a || !a.dataUrl) { this.toast('Visualisation indisponible','warn'); return; }
    const win = window.open();
    if (!win) { this.toast('Popup bloquée','warn','Autorise les popups'); return; }
    const isImg = /^image\//.test(a.type) || /\.(png|jpg|jpeg|gif|webp)$/i.test(a.name);
    const isPdf = a.type === 'application/pdf' || /\.pdf$/i.test(a.name);
    if (isImg) win.document.write(`<!DOCTYPE html><html><head><title>${a.name}</title><style>body{margin:0;background:#0F172A;display:flex;align-items:center;justify-content:center;min-height:100vh}img{max-width:100%;max-height:100vh;object-fit:contain}</style></head><body><img src="${a.dataUrl}"></body></html>`);
    else if (isPdf) win.document.write(`<!DOCTYPE html><html><head><title>${a.name}</title><style>body,html{margin:0;height:100%}iframe{width:100%;height:100vh;border:0}</style></head><body><iframe src="${a.dataUrl}"></iframe></body></html>`);
    else { const link = document.createElement('a'); link.href = a.dataUrl; link.download = a.name; link.click(); win.close(); this.toast('💾 Téléchargement','success', a.name); }
  },
  removeCatalogArchive(i){
    if (!confirm('Retirer cette archive ?')) return;
    if (this.state.business.catalogArchives) this.state.business.catalogArchives.splice(i,1);
    this.save();
    this.renderView();
    this.toast('🗑 Archive retirée','info');
  },

  // Recalcule le texte de récap "Envoi prévu : ..." selon le preset actif
  updateCampScheduleRecap(){
    const preset = document.getElementById('campSchedule')?.value || 'dimanche19';
    const recap = document.getElementById('campScheduleRecapText');
    if (!recap) return;
    const fr = (d) => d.toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
    const cap = (s) => s.charAt(0).toUpperCase() + s.slice(1);
    let txt = '';
    const today = new Date();
    if (preset === 'now') {
      txt = `${cap(fr(today))} à ${today.getHours()}h${String(today.getMinutes()).padStart(2,'0')} <span class="cal-recap-tag">maintenant</span>`;
    } else if (preset === 'dimanche19') {
      const d = new Date(today);
      d.setDate(d.getDate() + ((7 - d.getDay()) % 7 || 7));
      txt = `${cap(fr(d))} à 19h00 <span class="cal-recap-tag cal-peak-tag">🔥 peak</span>`;
    } else if (preset === 'demain9') {
      const d = new Date(today); d.setDate(d.getDate() + 1);
      txt = `${cap(fr(d))} à 9h00`;
    } else if (preset === 'custom') {
      const dStr = document.getElementById('campCustomDate')?.value;
      const tStr = document.getElementById('campCustomTime')?.value;
      if (dStr) {
        const d = new Date(dStr + 'T' + (tStr||'09:00'));
        txt = `${cap(fr(d))} à ${tStr||'09:00'}`;
      } else txt = '— choisir une date —';
    } else if (preset === 'recurring') {
      const freq = document.getElementById('campScheduleRec')?.value || 'weekly';
      const fLbl = {weekly:'chaque semaine', biweekly:'tous les 15 jours', monthly:'chaque mois', quarterly:'chaque trimestre'}[freq];
      const time = document.getElementById('campRecTime')?.value || '17:00';
      txt = `Récurrent · <b>${fLbl}</b> à ${time} <span class="cal-recap-tag">🔁 auto</span>`;
    }
    recap.innerHTML = txt;
  },

      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        const preview = document.getElementById('campPhotoPreview');

  downloadInvoicePdf(invoiceId){
    const inv = this.state.invoices.find(x=>x.id===invoiceId);
    if (!inv) { this.toast('Facture introuvable','warn'); return; }
    const area = document.getElementById('print-area');
    const b = this.state.business;

  // 🛒 PANIER ABANDONNÉ — détection + lancement (Augustin 04/06/2026)
  // Détecte les conversations où le client a demandé prix/dispo et qui sont restées sans suite côté client.
  detectAbandonedCarts(){
    const INTENT_KW = /precio|cuánto|cuanto|cuesta|disponible|delivery|hora|horario|cuánto|tiene|tienes|pedir|pedido|reservar|encargar/i;
    const conv = this.state.conversations || [];
    return conv.filter(c => {
      const msgs = c.messages || [];
      if (!msgs.length) return false;
      const last = msgs[msgs.length - 1];
      // Le dernier message ne doit PAS venir du patron (il a répondu = pas abandonné)
      if (last.from === 'me') return false;
      // L'intent achat doit apparaître dans au moins un message du client
      return msgs.some(m => m.from === 'them' && INTENT_KW.test(m.text || ''));
    }).map(c => {
      const cl = (this.state.clients || []).find(x => x.id === c.clientId);
      return { conv: c, client: cl };
    }).filter(x => x.client);
  },
  launchCartRecovery(){
    const list = this.detectAbandonedCarts();
    if (!list.length) return this.toast('Aucun panier abandonné détecté pour le moment','info','Nexus surveille en continu');
    const tmpl = this._autoCampDefaults['cart-abandoned'];
    if (!this.state.cartRecoveryRuns) this.state.cartRecoveryRuns = [];
    const runId = 'run_' + Date.now();
    const recovered = list.map(({client, conv}) => {
      const prenom = (client.name || '').split(' ')[0];
      const text = tmpl.message
        .replace('{prenom}', prenom)
        .replace('{promo}', tmpl.cfg.promoCode);
      conv.messages.push({ from:'me', text, time:"À l'instant", channel:'cart-recovery', runId });
      conv.unread = false;
      return { clientId: client.id, name: client.name };
    });
    this.state.cartRecoveryRuns.unshift({ id: runId, ts: Date.now(), count: recovered.length, items: recovered });
    if (this.state.cartRecoveryRuns.length > 20) this.state.cartRecoveryRuns = this.state.cartRecoveryRuns.slice(0, 20);
    this.state.cartRecoveryStatus = 'active';
    this.save();
    this.renderView();
    this.toast(`🛒 ${recovered.length} relance${recovered.length>1?'s':''} envoyée${recovered.length>1?'s':''}`, 'success', `Estimation : ${Math.round(recovered.length * 0.25)} client${recovered.length>=4?'s':''} reviendront acheter (taux 20-30%)`);

  activateAutoCampaign(){
    if (!this.state.autoCampaignDetails) this.state.autoCampaignDetails = {};
    if (!this.state.autoCampaignStatus)  this.state.autoCampaignStatus = {};
    // Récupère les champs
    const name    = (document.getElementById('autoName')||{}).value || '';

    const target  = (document.getElementById('autoTarget')||{}).value || 'rec';

    const antiAbusCredits = ((document.getElementById('autoAntiAbusCredits')||{}).checked) || false;
    // Lit les inputs dynamiques du déclencheur (data-cfg-key)
    const cfg = {};
    document.querySelectorAll('#autoTriggerFields [data-cfg-key]').forEach(el => {
      cfg[el.dataset.cfgKey] = el.value;
    });
    // ID : si édition → garde le même, sinon nouveau
    const id = this.state.editingAutoCampaign || ('custom-' + Date.now());
    this.state.autoCampaignDetails[id] = { name, trigger, target, message, cfg, antiAbusWeek, antiAbusCredits, updatedAt: new Date().toISOString() };

    this.state.editingAutoCampaign = null;

  sendCampaign(){
    const name = document.getElementById('campName').value;
    const target = document.getElementById('campTarget').value;
    let recipientCount = 120;
    let audienceLabel = target;
    if (target === 'custom') {
      const picks = document.querySelectorAll('.camp-client-pick:checked');
      recipientCount = picks.length;
      audienceLabel = `Personnalisé (${recipientCount} clients à la pince)`;
      if (recipientCount === 0) { this.toast('Sélectionne au moins 1 client','warn'); return; }
    } else if (target === 'vip') { recipientCount = this.state.clients.filter(c=>c.tags.includes('VIP')).length; audienceLabel='VIP'; }
    else if (target === 'lost') { recipientCount = this.state.clients.filter(c=>c.status==='lost').length; audienceLabel='Clients perdus'; }
    else if (target === 'recurrent') { recipientCount = this.state.clients.filter(c=>c.tag==='rec').length; audienceLabel='Récurrents'; }
    else if (target === 'new') { recipientCount = this.state.clients.filter(c=>c.status==='prospect').length; audienceLabel='Nouveaux'; }
    else if (target === 'occ') { recipientCount = Math.round(this.state.clients.length*0.3); audienceLabel='Occasionnels'; }
    else if (target.startsWith('custom_')) {
      const idx = parseInt(target.split('_')[1]);
      recipientCount = this.state.customSegments[idx]?.clientIds.length || 0;
      audienceLabel = '📌 ' + (this.state.customSegments[idx]?.name||'Segment custom');
    }
    const onb = this.state.onboarding.find(s=>s.id==='campaign');
    if (onb) onb.done = true;
    // V5.2 : ENVOI RÉEL via robot n8n signé (WhatsApp). Garde-fou beta côté serveur :
    // seuls les numéros de la liste blanche reçoivent ; sinon preview au patron.
    const message = (document.getElementById('campMsg')?.value||'').trim().slice(0,500);
    if (window.NxCloud && NxCloud.isAuthed()) {
      if (!message) { this.toast('Message vide','warn'); return; }
      const targetMap = { vip:'vip', lost:'lost', recurrent:'rec', new:'new', occ:'all', custom:'all' };
      const mapped = target.startsWith('custom') ? 'all' : (targetMap[target] || 'all');
      this.closeModal();
      this.toast('🚀 Envoi de la campagne…','info');
      this._signedPost('nexus-campaign-send', ['campaign-send', message], { name, message, target: mapped })
        .then(res => {
          if (res.ok) {
            this.toast('✅ Campagne envoyée par le robot','success','WhatsApp en cours — actualise (↻) dans ~30 s pour le log réel');
            this.save();
          } else {
            this.toast('⚠️ Échec envoi robot','warn', res.error);
          }
        });
      return;
    }
    // Mode démo (pas connecté au cloud) : simulation comme avant
    this.state.campaigns.unshift({id:Date.now(),name,sent:0,opened:0,replied:0,status:'running',date:'Aujourd\'hui',audience:audienceLabel});
    this.save();
    this.closeModal();
    this.toast('🚀 Campagne lancée (démo)','success', recipientCount+' destinataires simulés');
    const opened = Math.round(recipientCount * 0.82);
    const replied = Math.round(recipientCount * 0.20);
    setTimeout(()=>{this.state.campaigns[0].sent=recipientCount;this.state.campaigns[0].opened=opened;this.save();},2500);
    setTimeout(()=>{this.state.campaigns[0].replied=replied;this.save();},4000);
  },

  // ============================================================
  // V5 (10/06/2026) — PONT APP -> ROBOTS N8N (signé, secret côté serveur)
  // L'app demande une signature à la RPC Supabase nexus_sign_action
  // (authentifiée, le secret HMAC ne quitte jamais le serveur), puis
  // appelle le webhook n8n avec ts+signature dans le body (anti-rejeu ±5min).
  // ============================================================
  N8N_WEBHOOK_BASE: 'https://augustin-aico.app.n8n.cloud/webhook',
  async _signedPost(path, parts, body){
    if (!window.NxCloud || !NxCloud.isAuthed()) return { ok:false, error:'Connecte-toi au cloud d\'abord (bouton ☁️)' };
    const sig = await NxCloud.rpc('nexus_sign_action', { p_parts: parts });
    if (!sig.ok) return { ok:false, error:'Signature refusée : ' + (sig.error||'') };
    const payload = Object.assign({}, body, { tenant_id: sig.data.tenant_id, ts: sig.data.ts, signature: sig.data.signature });
    try {
      const r = await fetch(this.N8N_WEBHOOK_BASE + '/' + path, {
        method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)
      });
      const txt = await r.text();
      if (!r.ok) return { ok:false, error:'Robot n8n : HTTP ' + r.status + ' — ' + txt.slice(0,140) };
      return { ok:true, raw: txt };
    } catch(e){ return { ok:false, error:'Réseau : ' + String(e).slice(0,140) }; }
  },

  async submitRdv(){
    const title  = (document.getElementById('rdvTitle')?.value||'').trim().slice(0,200);
    const date   = document.getElementById('rdvDate')?.value;
    const time   = document.getElementById('rdvTime')?.value || '10:00';
    const dur    = parseInt(document.getElementById('rdvDur')?.value||'60',10);
    const detail = (document.getElementById('rdvDetail')?.value||'').trim().slice(0,500);
    if (!title) return this.toast('Titre obligatoire','warn');
    if (!date)  return this.toast('Date obligatoire','warn');
    const start = new Date(date + 'T' + time);
    if (isNaN(start)) return this.toast('Date invalide','warn');
    const end = new Date(start.getTime() + dur*60000);
    // 1. Agenda local (visible immédiatement dans Pilotage)
    const item = {
      id: Date.now(), title, detail, icon:'📅', category:'reminder',
      when: start.toLocaleString('fr-FR',{weekday:'long',day:'numeric',month:'long',hour:'2-digit',minute:'2-digit'}),
      status:'scheduled', dueDate: start.toISOString(), createdAt: new Date().toISOString()
    };
    const items = this.getAgendaItems(); items.push(item); this.saveAgendaItems(items);
    this.closeModal(); this.renderView();
    // 2. Ligne cloud (le robot la marquera "synced" après création Google Calendar)
    if (!window.NxCloud || !NxCloud.isAuthed()) return this.toast('📅 RDV local créé','warn','Connecte le cloud pour Google Calendar');
    const row = this._toRowAgenda(item);
    const up = await NxCloud.upsertOne('agenda_items', row, 'id');
    if (!up.ok) return this.toast('⚠️ RDV local seulement','warn','Cloud : ' + (up.error||''));
    // 3. Pont signé -> robot n8n -> Google Calendar
    this.toast('📅 Création dans Google Calendar…','info');
    const res = await this._signedPost('nexus-calendar-out', [row.id, title],
      { id: row.id, title, detail, start: start.toISOString(), end: end.toISOString() });
    if (res.ok) this.toast('✅ RDV créé dans Google Calendar','success', title);
    else this.toast('⚠️ RDV enregistré, mais Google Calendar a échoué','warn', res.error);
  },

  // Augustin 28/05/2026 : Escalade d'urgences (beta) — détection mots-clés + segment VIP/Business
  // Update 28/05 #2 : preview modal + log persistant + hook WAHA/WhatsApp Business ready
  EMERGENCY_KEYWORDS: ['urgente','urgent','ahora','rápido','rapido','importante','ayuda','emergencia','help','asap','immediatement','immédiatement'],
  detectEmergency(text, client){
    const t = String(text||'').toLowerCase();
    const kw = this.EMERGENCY_KEYWORDS.find(k => t.includes(k));
    const isImportant = client && (client.tag === 'vip' || client.tag === 'biz' || (client.tags||[]).includes('VIP') || (client.tags||[]).includes('Empresa'));
    return { matched: !!kw || isImportant, reason: kw ? ('mot-clé "' + kw + '"') : (isImportant ? 'client ' + ((client.tags||[]).includes('VIP') ? 'VIP' : 'Business') : null) };
  },
  // Construit le message exact qui sera envoyé au patron (WhatsApp ou SMS selon provider)
  buildEscalationPayload(client, message, reason){
    const b = this.state.business || {};
    const ownerPhone = b.ownerPhone || b.phone || '+56 9 0000 0000';
    const ownerName = b.owner || 'Carlos';
    const ts = new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
    const body = `🚨 NEXUS · Message urgent\n\nClient : ${client.name}${client.phone ? ' (' + client.phone + ')' : ''}\nRaison : ${reason}\nReçu à : ${ts}\n\n« ${message} »\n\nRépondre direct ▸ https://wa.me/${(client.phone||'').replace(/[^\d]/g,'')}`;
    return { to: ownerPhone, ownerName, body, channel: 'whatsapp' };
  },
  // V5 (10/06) — PONT 2 : envoi RÉEL via robot n8n signé (Nexus — Escalade Urgences -> WAHA -> WhatsApp patron).
  // Fallback simulation si pas connecté au cloud ou robot éteint.
  async sendEscalation(payload, client, message, reason){
    try {
      if (!client) return { ok:false, simulated:true, reason:'client manquant' };
      // UUID cloud du client : vrai UUID si créé par le robot WhatsApp, sinon mapping local déterministe
      const clientCloudId = client.cloudId || this._localIdToUuid(client.id, '8000');
      const msg = String(message||'').slice(0,500);
      const rsn = String(reason||'').slice(0,200);
      const res = await this._signedPost('nexus-escalate', [clientCloudId, msg, rsn],
        { client_id: clientCloudId, message: msg, reason: rsn });
      if (res.ok) return { ok:true };
      return { ok:false, simulated:true, reason: res.error };
    } catch(e){ return { ok:false, simulated:true, reason: String(e).slice(0,140) }; }
  },
  async triggerEscalation(client, message, reason){
    if (!this.state.vacanceStats) this.state.vacanceStats = { received: 7, replied: 7, escalated: 0 };
    if (!this.state.escalationLog) this.state.escalationLog = [];
    this.state.vacanceStats.escalated = (this.state.vacanceStats.escalated || 0) + 1;

    const payload = this.buildEscalationPayload(client, message, reason);
    const result  = await this.sendEscalation(payload, client, message, reason);
    const status  = result.ok ? 'sent' : 'simulated';

    // Push navigateur (si autorisée)
    let pushStatus = 'non-supporté';
    try {
      if ('Notification' in window) {
        if (Notification.permission === 'granted') {
          new Notification('🚨 Nexus · Escalade urgente', { body: client.name + ' : ' + String(message).slice(0,90), tag: 'nx-escalation-' + Date.now() });
          pushStatus = 'envoyée';
        } else if (Notification.permission === 'default') {
          const perm = await Notification.requestPermission();
          if (perm === 'granted') {
            new Notification('🚨 Nexus · Escalade urgente', { body: client.name + ' : ' + String(message).slice(0,90), tag: 'nx-escalation-' + Date.now() });
            pushStatus = 'envoyée (permission accordée)';
          } else { pushStatus = 'refusée par l\'utilisateur'; }
        } else { pushStatus = 'refusée précédemment'; }
      }
    } catch(e){ pushStatus = 'erreur : ' + e.message; }

    // Log persistant
    const entry = {
      ts: Date.now(),
      timeLabel: new Date().toLocaleString('fr-FR', {weekday:'short', day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'}),
      client: client.name,
      clientPhone: client.phone || '',
      message: String(message).slice(0,140),
      reason,
      channel: payload.channel === 'whatsapp' ? 'WhatsApp' : 'SMS',
      to: payload.to,
      status,
      pushStatus,
      simulationReason: result.simulated ? result.reason : null
    };
    // V5 : si l'envoi est passé par le robot n8n, c'est LUI qui logge dans escalation_log (cloud).
    // On rafraîchit depuis le cloud au lieu d'ajouter un doublon local.
    if (result.ok && window.NxCloud && NxCloud.isAuthed()) {
      try {
        await new Promise(r => setTimeout(r, 2500)); // laisse le robot finir son log
        const esc = await NxCloud.listAll('escalation_log');
        if (esc.ok && esc.data.length) this.state.escalationLog = esc.data.map(r => this._fromRowEscalation(r));
        else this.state.escalationLog.unshift(entry);
      } catch(_) { this.state.escalationLog.unshift(entry); }
    } else {
      this.state.escalationLog.unshift(entry);
    }
    if (this.state.escalationLog.length > 50) this.state.escalationLog = this.state.escalationLog.slice(0,50);
    this.save();
    this.showEscalationPreview(entry, payload);
    this.renderView();
  },

  simulateEscalation(){
    const vacRaw = localStorage.getItem('nexus_vacances');
    let v = null; try { v = vacRaw ? JSON.parse(vacRaw) : null; } catch(e){}
    if (v && v.perm_escalate === false) {
      return this.toast('Active d\'abord le toggle "Escalader urgences"','warn','Sinon Nexus n\'enverra pas l\'alerte au patron');
    }
    const clients = this.state.clients || [];
    const vip = clients.find(c => (c.tags||[]).includes('VIP') || c.tag === 'vip') || clients.find(c => c.tag === 'biz') || clients[0];
    const scenarios = [
      { msg: '¡URGENTE Carlos! Necesito 50 empanadas para esta noche, evento importante 🙏', reason: 'mot-clé "urgente" + client VIP' },
      { msg: 'Ayuda, mi pedido de tortas no llegó y es para una boda hoy a las 18h', reason: 'mot-clé "ayuda" + livraison du jour' },
      { msg: 'Hola, necesito hablar contigo ahora, es importante para nuestro evento corporativo', reason: 'mot-clé "ahora" + client Business' }
    ];
    const sc = scenarios[Math.floor(Math.random() * scenarios.length)];
    this.triggerEscalation(vip || { name: 'Client VIP test', tags:['VIP'], tag:'vip', phone:'+56 9 8765 4321' }, sc.msg, sc.reason);
  },

  defaultVacances(){
    return {
      active:false,
      // POINT MODE VACANCES (a) — Champs personnalisables au lieu de toggles
      cfg_when_start:'', cfg_when_end:'',
      cfg_how_text:'Décontracté et chaleureux avec emojis, comme moi. Tutoiement, phrases courtes.',
      cfg_what_text:'Horaires, prix du catalogue, disponibilité produits, commandes simples. Ne pas s\'engager sur les gros événements.',
      // Legacy (gardé pour compat) :
      cfg_when:true, cfg_how:true, cfg_what:true,
      preset:'we',
      startDate:'', endDate:'',
      msgShort:'¡Hola! Estoy fuera unos días, vuelvo pronto. Para urgencias escribir al +56 9 1234 5678. ¡Gracias!',
      msgLong:'Estimado cliente, estoy de vacaciones hasta el [FECHA]. Para pedidos urgentes contactar a [TEL]. Te respondo a mi vuelta. ¡Saludos!',
      msgUrgent:'¡Hola! Para urgencias contactar a [TEL] o esperar mi vuelta el [FECHA]. Gracias por tu paciencia 🙏',
      lang:'auto',

  // Toggle d'un sujet autorisé dans le mode vacances (Augustin 21/05/2026)
  updateVacTopic(topicKey, checked){
    let vac = {};
    try { vac = JSON.parse(localStorage.getItem('nexus_vacances') || 'null') || this.defaultVacances(); }
    catch(e){ vac = this.defaultVacances(); }
    if (!vac.cfg_what_topics) vac.cfg_what_topics = {};

    localStorage.setItem('nexus_vacances', JSON.stringify(vac));
  },

  // Applique un template pré-écrit dans le textarea du 1er message vacances (Augustin 21/05/2026)
  applyVacMsgSuggestion(txt){
    const decoded = (txt||'').replace(/&#39;/g,"'").replace(/&quot;/g,'"').replace(/\\n/g,'\n');
    const ta = document.getElementById('vacMsgShortTA');
    if (ta) ta.value = decoded;
    this.updateVac('msgShort', decoded);
    this.toast('✓ Suggestion appliquée','success','Modifie librement avant d\'activer');
  },

  // Génère un message d'absence personnalisé via Groq (utilise profil entreprise)
  async suggestVacMsgAI(){
    const ta = document.getElementById('vacMsgShortTA');
    if (!ta) return;
    const orig = ta.value;
    ta.value = '✨ Nexus rédige un message adapté à ton entreprise…';
    ta.disabled = true;
    const b = this.state.business || {};
    const prompt = `Tu es Nexus, IA assistante d'une PME LATAM. Rédige UN message d'absence court (max 3 phrases) en espagnol, chaleureux et professionnel, pour un client qui contacte la boutique pendant l'absence du propriétaire. Contexte : entreprise "${b.name||'PME'}", ville ${b.city||'Santiago'}, type ${b.description||'commerce local'}. Utilise les balises [DATE] et [TEL]. Mentionne que l'IA assistante peut répondre aux questions courantes. Réponds UNIQUEMENT avec le texte du message, rien d'autre.`;
    try {
      const r = await fetch('/api/claude', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ question: prompt }) });
      const data = await r.json();
      const answer = (data.answer||'').trim().replace(/^["«]|["»]$/g,'');
      if (!answer) throw new Error('vide');
      ta.value = answer;
      this.updateVac('msgShort', answer);
      this.toast('✨ Message généré via IA','success', 'Modifie librement avant d\'activer');
    } catch(e) {
      ta.value = orig;
      this.toast('❌ Génération échouée','warn');
    } finally {
      ta.disabled = false;
    }
  },

  updateVac(key, value){
    let vac = {};
    try { vac = JSON.parse(localStorage.getItem('nexus_vacances') || 'null') || this.defaultVacances(); }
    catch(e){ vac = this.defaultVacances(); }
    vac[key] = value;
    localStorage.setItem('nexus_vacances', JSON.stringify(vac));
    // Re-render pour UI affectée
    if (['preset','dailyRange','allDay'].includes(key)) this.renderView();
  },
  // V5 : sauvegarde explicite de la config vacances vers le cloud (bouton 💾)
  async saveVacancesNow(){
    if (!window.NxCloud || !NxCloud.isAuthed()) return this.toast('💾 Sauvegardé en local','success','Connecte le cloud pour synchroniser');
    this.toast('💾 Sauvegarde...','info');
    try { await this.syncToCloud(); this.toast('✅ Configuration sauvegardée','success','Local + cloud à jour'); }
    catch(e){ this.toast('⚠️ Sauvegarde cloud échouée','warn', String(e).slice(0,100)); }
  },

  // Applique un preset de durée : calcule auto startDate/endDate/heures
  applyVacPreset(presetId){
    let vac = {};
    try { vac = JSON.parse(localStorage.getItem('nexus_vacances') || 'null') || this.defaultVacances(); }
    catch(e){ vac = this.defaultVacances(); }
    const now = new Date();
    const start = new Date(now);
    const end = new Date(now);
    let startTime = '18:00', endTime = '09:00';
    switch(presetId) {
      case 'afternoon': // après-midi = aujourd'hui 14h → aujourd'hui 18h
        startTime = '14:00'; endTime = '18:00';
        break;
      case 'day': // 1 jour = aujourd'hui → demain
        end.setDate(end.getDate() + 1);
        startTime = '09:00'; endTime = '09:00';
        break;
      case 'weekend': // week-end = vendredi 18h → lundi 9h
        { const dow = now.getDay(); const friOffset = (5 - dow + 7) % 7; start.setDate(start.getDate() + friOffset); end.setDate(start.getDate() + 3); }
        break;
      case 'week': // 1 semaine
        end.setDate(end.getDate() + 7);
        break;
      case '2weeks':
        end.setDate(end.getDate() + 14);
        break;
      case 'month':
        end.setMonth(end.getMonth() + 1);
        break;
      case 'custom':
        // Laisse l'user choisir, ne touche pas aux dates
        vac.preset = 'custom';
        localStorage.setItem('nexus_vacances', JSON.stringify(vac));
        this.renderView();
        return;
    }
    vac.preset = presetId;
    vac.startDate = start.toISOString().slice(0,10);
    vac.endDate = end.toISOString().slice(0,10);
    vac.startTime = startTime;
    vac.endTime = endTime;
    localStorage.setItem('nexus_vacances', JSON.stringify(vac));
    this.toast('✓ Dates pré-remplies','success', `${vac.startDate} → ${vac.endDate}`);
    this.renderView();
  },

  toggleVacancesActive(){
    let vac = {};
    try { vac = JSON.parse(localStorage.getItem('nexus_vacances') || 'null') || this.defaultVacances(); }
    catch(e){ vac = this.defaultVacances(); }
    vac.active = !vac.active;
    localStorage.setItem('nexus_vacances', JSON.stringify(vac));
    // Synchronise avec le toggle sidebar
    this.state.vacation = vac.active;
    this.state.vacationDetails.enabled = vac.active;

    if (t) t.checked = vac.active;

    if (row) row.classList.toggle('warn', vac.active);
    this.toast(vac.active ? '✈️ Mode vacances activé — l\'IA prend le relais' : '🛑 Mode vacances désactivé — tu reprends les commandes', 'success');

        </div>

        <div class="card" style="padding:0;overflow:hidden">
          ${items.map(i => {
            const statusColor = i.s==='connected' ? '#22C55E' : i.s==='pending' ? '#F59E0B' : '#94A3B8';
            const statusLbl   = i.s==='connected' ? 'Connecté' : i.s==='pending' ? 'En attente' : 'À connecter';
            const btnLbl      = i.s==='connected' ? 'Déconnecter' : 'Connecter maintenant';
            const btnClass    = i.s==='connected' ? 'btn-s' : 'btn-p';
            return `<div style="padding:16px 18px;display:flex;gap:14px;align-items:center;border-bottom:1px solid var(--line2)">
              <div style="width:44px;height:44px;border-radius:12px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">${i.ic}</div>
              <div style="flex:1;min-width:0">
                <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px"><b style="font-size:14px">${i.n}</b>${i.critical?'<span title="Intégration critique pour Nexus" style="font-size:10px">🔴</span>':''}</div>
                <div style="font-size:12px;color:var(--muted)">${i.desc}</div>
              </div>
              <span class="chip" style="background:${statusColor}1A;color:${statusColor};border:1px solid ${statusColor}55;font-weight:700">${statusLbl}</span>
              <button class="btn ${btnClass}" style="white-space:nowrap" onclick="Nx.toggleIntegration('${i.k}')">${btnLbl}</button>

        </div>

          <button class="btn btn-s" onclick="Nx.navigate('tutorial')">Plus tard</button>
          <button class="btn btn-p" onclick="Nx.toggleTutoStep('integrations');Nx.navigate('tutorial')">✓ Marquer l'étape comme faite</button>
        </div>
      </div>`;
  },

  toggleIntegration(k){

};

// Boot
window.addEventListener('DOMContentLoaded', () => Nx.init());

// ============================================================
// ☁️ CLOUD SUPABASE — Wiring boot + listeners (Augustin 04/06/2026)
// ============================================================
(function() {
  function bindCloudUi() {
    if (!window.Nx || !window.Nx.refreshCloudUi) { setTimeout(bindCloudUi, 100); return; }
    Nx.refreshCloudUi();
  }
  document.addEventListener('nx-cloud-ready', (e) => {
    bindCloudUi();
    // Si user déjà connecté (session persistée), charger profil + toutes les tables
    if (e.detail && e.detail.user && window.Nx) {
      Nx.loadProfileFromCloud && Nx.loadProfileFromCloud();
      Nx.syncFromCloud      && Nx.syncFromCloud();
    }
  });
  document.addEventListener('nx-cloud-auth', (e) => {
    bindCloudUi();
    // Quand l'utilisateur se connecte (magic link OU password), on charge profil + tables
    if (e.detail && e.detail.event === 'SIGNED_IN' && window.Nx) {
      Nx.loadProfileFromCloud && Nx.loadProfileFromCloud();
      Nx.syncFromCloud      && Nx.syncFromCloud();
    }
    if (e.detail && e.detail.event === 'SIGNED_OUT' && window.Nx) {
      try { Nx.renderView(); } catch(_) {}
    }
  });
  bindCloudUi();

  // V4.2 : filet de securite — re-sync silencieux toutes les 30 min (pas de spam).
  // L'actualisation a la demande se fait via le bouton "Actualiser" du CRM (Nx.refreshFromCloud).
  let _nxSyncing = false;
  setInterval(async () => {
    try {
      if (!window.Nx || !window.NxCloud || !window.NxCloud.isAuthed()) return;
      if (_nxSyncing) return;
      _nxSyncing = true;
      // V5 fix persistance : push d'abord (sinon le pull écrase les modifs locales)
      try { await Nx.syncToCloud(); } catch(_) {}
      await Nx.syncFromCloud(true); // silent
    } catch(_) {} finally { _nxSyncing = false; }
  }, 1800000); // 30 min
})();
