<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1A56DB">
<title>Nexus — App Nexus InJu · MVP</title>
<style>
:root{
  --bg:#F8FAFC; --bg2:#F1F5F9; --panel:#FFFFFF; --ink:#0F172A; --ink2:#334155; --muted:#64748B;
  --line:#E2E8F0; --line2:#F1F5F9;
  --blue:#1A56DB; --blue-soft:#EFF4FE; --blue-ink:#1E40AF; --blue-ghost:#DBE5FD;
  --green:#22C55E; --green-soft:#ECFDF5;
  --amber:#F59E0B; --amber-soft:#FFFBEB;
  --red:#EF4444; --red-soft:#FEF2F2;
  --violet:#7A3CFF; --violet-soft:#F3E8FF;
  --cyan:#06B6D4; --cyan-soft:#ECFEFF;
  --shadow:0 1px 2px rgba(15,23,42,.04), 0 4px 16px -8px rgba(15,23,42,.08);
  --shadow-lg:0 8px 32px -12px rgba(15,23,42,.16);
  --shadow-xl:0 20px 60px -20px rgba(15,23,42,.24);
  --radius:14px; --radius-sm:8px;
}
html[data-theme="dark"]{
  --bg:#0B0F16; --bg2:#0F1520; --panel:#121824; --ink:#E8ECF3; --ink2:#B8C1CE; --muted:#8A94A6;
  --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.04);
  --blue-soft:rgba(26,86,219,.15); --blue-ghost:rgba(26,86,219,.3);
  --green-soft:rgba(34,197,94,.12); --amber-soft:rgba(245,158,11,.12); --red-soft:rgba(239,68,68,.12);
  --violet-soft:rgba(122,60,255,.15); --cyan-soft:rgba(6,182,212,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:'Inter','Segoe UI',-apple-system,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased;font-size:14px;min-height:100vh}
.mono{font-family:'JetBrains Mono','SF Mono',Menlo,monospace}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit;font-size:14px}
a{color:inherit;text-decoration:none}
::selection{background:var(--blue-ghost);color:var(--blue-ink)}

/* LAYOUT — sidebar supprimée selon demande Juan/Excalidraw : accès aux modules UNIQUEMENT via pop-up Interface principale */
.app{display:grid;grid-template-columns:1fr;min-height:100vh}
.main{display:flex;flex-direction:column;min-width:0}

/* SIDEBAR — masquée totalement (le pop-up Interface principale est la SEULE entrée vers les modules) */
.sidebar{display:none !important}
.sidebar-backdrop{display:none !important}
.menu-toggle{display:none !important}
.side-hd{padding:20px 18px;border-bottom:1px solid var(--line2)}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.logo{width:32px;height:32px}
.brand-name{font-size:17px;font-weight:800;letter-spacing:-.02em}
.brand-name span{color:var(--blue)}
.p-card{display:flex;align-items:center;gap:12px;padding:12px;background:linear-gradient(135deg,var(--blue),var(--blue-ink));border-radius:12px;color:#fff}
.p-avatar{width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.p-who{flex:1;min-width:0}
.p-who .n{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-who .b{font-size:11px;opacity:.85}
.p-switch{background:rgba(255,255,255,.12);border:0;padding:6px;border-radius:6px;color:#fff;cursor:pointer;transition:background .15s}
.p-switch:hover{background:rgba(255,255,255,.22)}

.side-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;padding:16px 20px 6px}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 18px;cursor:pointer;transition:all .15s;border-left:3px solid transparent;color:var(--ink2)}
.nav-item:hover{background:var(--bg2)}
.nav-item.active{background:var(--blue-soft);border-left-color:var(--blue);color:var(--blue-ink)}
.nav-ic{width:30px;height:30px;border-radius:8px;background:var(--bg2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-size:15px}
.nav-item.active .nav-ic{background:var(--blue);color:#fff}
.nav-lbl{font-size:13px;font-weight:500;flex:1}
.nav-meta{font-size:11px;color:var(--muted);padding:2px 7px;background:var(--bg2);border-radius:999px;font-weight:600}
.nav-item.active .nav-meta{background:var(--blue);color:#fff}

.side-foot{margin-top:auto;padding:14px 18px;border-top:1px solid var(--line2);display:flex;flex-direction:column;gap:8px}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--bg2);border-radius:8px;font-size:12px;color:var(--ink2)}
.toggle-row.warn{background:var(--amber-soft);color:#B45309}
.switch{position:relative;display:inline-block;width:32px;height:18px}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;inset:0;background:var(--line);border-radius:999px;transition:.2s}
.slider:before{position:absolute;content:"";height:14px;width:14px;left:2px;top:2px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.switch input:checked + .slider{background:var(--blue)}
.switch input:checked + .slider:before{transform:translateX(14px)}
.live-dot{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
.live-dot .dot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:14px;padding:12px 24px;background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:50;flex-shrink:0}
.breadcrumb{font-size:13px;color:var(--muted);flex:1}
.breadcrumb b{color:var(--ink);font-weight:600}
.search-btn{display:flex;align-items:center;gap:10px;padding:7px 12px;background:var(--bg2);border:1px solid transparent;border-radius:8px;width:280px;transition:all .15s;color:var(--muted);cursor:pointer}
.search-btn:hover{background:var(--panel);border-color:var(--line)}
.search-btn .kbd{font-size:10px;padding:2px 6px;background:var(--panel);border:1px solid var(--line);border-radius:4px;margin-left:auto;font-family:'JetBrains Mono',monospace;color:var(--muted)}
.icon-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--line);background:var(--panel);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:all .15s;color:var(--ink2)}
.icon-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-soft)}
.badge-dot{position:absolute;top:4px;right:4px;min-width:14px;height:14px;padding:0 3px;background:var(--red);color:#fff;border-radius:999px;border:2px solid var(--panel);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}
.lang-btn{display:flex;gap:0;background:var(--bg2);border-radius:7px;padding:2px;border:1px solid var(--line)}
.lang-btn button{padding:4px 8px;border-radius:5px;border:0;background:transparent;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.05em;transition:all .15s}
.lang-btn button.on{background:var(--panel);color:var(--blue);box-shadow:var(--shadow)}
.avatar{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--blue-ink));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;cursor:pointer;transition:transform .15s}
.avatar:hover{transform:scale(1.05)}

/* VIEW CONTAINER */
.view{padding:28px 32px 60px;max-width:1280px;margin:0 auto;width:100%}
.view.hidden{display:none}
.page-hd{margin-bottom:22px;display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap}
.page-hd h1{font-size:26px;font-weight:800;letter-spacing:-.02em;line-height:1.15}
.page-hd h1 em{color:var(--blue);font-style:normal}
.page-hd .sub{color:var(--muted);font-size:14px;margin-top:4px}
.date-pill{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;background:var(--panel);border:1px solid var(--line);border-radius:999px;font-size:12px;color:var(--ink2)}
.date-pill .dot{width:6px;height:6px;background:var(--green);border-radius:50%;box-shadow:0 0 0 3px var(--green-soft)}

/* CARDS */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;transition:all .2s}
.card-hd{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 10px;gap:12px}
.card-hd h3{font-size:14px;font-weight:700;letter-spacing:-.01em}
.card-hd .actions{display:flex;gap:6px}
.card-body{padding:10px 20px 20px}

/* BUTTONS */
.btn{padding:9px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;border:0;transition:all .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-p{background:var(--blue);color:#fff}
.btn-p:hover{background:var(--blue-ink);transform:translateY(-1px);box-shadow:0 4px 12px -4px var(--blue)}
.btn-s{background:var(--panel);color:var(--ink2);border:1px solid var(--line)}
.btn-s:hover{border-color:var(--blue);color:var(--blue)}
.btn-g{background:transparent;color:var(--muted);border:1px solid var(--line);padding:6px 12px;font-size:12px;border-radius:6px}
.btn-g:hover{color:var(--blue);border-color:var(--blue)}
.btn-success{background:var(--green);color:#fff}
.btn-success:hover{background:#16A34A}
.btn-danger{background:var(--red);color:#fff}
.btn-warn{background:var(--amber);color:#fff}
.btn-ghost{padding:5px 10px;border-radius:6px;font-size:12px;color:var(--muted);border:1px solid var(--line);background:var(--panel);cursor:pointer;transition:all .15s}
.btn-ghost:hover{color:var(--blue);border-color:var(--blue)}

/* STATS GRID */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.stat:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.stat-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.stat-ic{width:36px;height:36px;border-radius:10px;background:var(--blue-soft);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:16px}
.stat-ic.g{background:var(--green-soft);color:var(--green)}
.stat-ic.a{background:var(--amber-soft);color:var(--amber)}
.stat-ic.p{background:var(--violet-soft);color:var(--violet)}
.stat-ic.c{background:var(--cyan-soft);color:var(--cyan)}
.delta{font-size:11px;font-weight:600;padding:3px 8px;border-radius:999px}
.delta.up{background:var(--green-soft);color:var(--green)}
.delta.dn{background:var(--red-soft);color:var(--red)}
.delta.eq{background:var(--bg2);color:var(--muted)}
.stat-lbl{font-size:11px;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.stat-val{font-size:clamp(17px,2.4vw,22px);font-weight:800;letter-spacing:-.02em;line-height:1.2;word-break:break-word;overflow-wrap:anywhere}
.stat-sub{font-size:11px;color:var(--muted);margin-top:2px}

/* TIPS */
.tips{padding:22px 24px;border-radius:var(--radius);background:linear-gradient(135deg,var(--blue-soft) 0%,var(--green-soft) 100%);border:1px solid var(--blue-ghost);position:relative;overflow:hidden;margin-bottom:16px}
.tips::before{content:"";position:absolute;top:-50px;right:-50px;width:200px;height:200px;background:radial-gradient(circle,rgba(26,86,219,.15),transparent 70%);border-radius:50%;pointer-events:none}
.tips-hd{display:flex;align-items:center;gap:10px;margin-bottom:12px;position:relative}
.tips-ic{width:40px;height:40px;border-radius:12px;background:var(--panel);border:1px solid var(--blue-ghost);display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:var(--shadow)}
.tips-hd .t{font-size:13px;font-weight:700;color:var(--blue-ink)}
.tips-hd .t small{display:block;font-size:11px;color:var(--muted);font-weight:500;margin-top:1px}
.tips-body{font-size:14px;color:var(--ink);line-height:1.6;position:relative;margin-bottom:14px}
.tips-body b{color:var(--blue-ink);font-weight:700}
.tips-actions{display:flex;gap:8px;position:relative;flex-wrap:wrap}

/* GRID 2-col */
.grid2{display:grid;grid-template-columns:1.5fr 1fr;gap:14px;margin-bottom:16px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}

/* MESSAGES / INBOX */
.msg{display:flex;gap:12px;padding:12px 20px;border-top:1px solid var(--line2);transition:background .15s;cursor:pointer;position:relative}
.msg:first-of-type{border-top:0}
.msg:hover{background:var(--bg2)}
.msg.unread{background:linear-gradient(90deg,var(--blue-soft) 0,transparent 80%)}
.msg.unread:hover{background:var(--blue-soft)}
.msg.active{background:var(--blue-soft)!important;border-left:3px solid var(--blue)}
.msg-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;flex-shrink:0}
.msg-body{flex:1;min-width:0}
.msg-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;gap:8px}
.msg-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.msg-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.msg-unread-dot{width:7px;height:7px;background:var(--blue);border-radius:50%;flex-shrink:0}
.msg-time{font-size:11px;color:var(--muted)}
.msg-txt{font-size:12.5px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.msg-tag{display:inline-block;margin-top:4px;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.02em}
.msg-tag.new{background:var(--green-soft);color:var(--green)}
.msg-tag.vip{background:#FEF3C7;color:#B45309}
.msg-tag.rec{background:var(--blue-soft);color:var(--blue)}
.msg-tag.alert{background:var(--red-soft);color:var(--red)}
.msg-tag.biz{background:var(--violet-soft);color:var(--violet)}
.ch{display:inline-flex;align-items:center;gap:3px;font-size:10px;color:var(--muted);margin-left:6px}

/* PODIUM */
.podium-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px dashed var(--line);cursor:pointer;transition:transform .15s}
.podium-row:hover{transform:translateX(4px)}
.podium-row:last-child{border:0}
.rank{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0}
.rank-1{background:linear-gradient(135deg,#FCD34D,#F59E0B);color:#78350F;box-shadow:0 4px 12px -4px #F59E0B}
.rank-2{background:linear-gradient(135deg,#E5E7EB,#9CA3AF);color:#1F2937}
.rank-3{background:linear-gradient(135deg,#FDBA74,#C2410C);color:#7C2D12}
.rank-n{background:var(--bg2);color:var(--muted)}
.p-info{flex:1;min-width:0}
.p-name{font-size:13px;font-weight:600}
.p-stat{font-size:11px;color:var(--muted)}
.p-score{font-size:14px;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--blue)}
.p-bar{width:100%;height:4px;background:var(--bg2);border-radius:999px;overflow:hidden;margin-top:5px}
.p-bar span{display:block;height:100%;background:linear-gradient(90deg,var(--blue),var(--green));border-radius:999px;transition:width .6s}

/* FORM */
.form-row{margin-bottom:16px}
.form-lbl{font-size:12px;font-weight:600;color:var(--ink2);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.04em}
.form-ctrl{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--panel);color:var(--ink);transition:all .15s;font-size:13px}
.form-ctrl:focus{outline:0;border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,219,.12)}
textarea.form-ctrl{resize:vertical;min-height:80px;font-family:inherit}

/* CHAT INTERFACE */
.chat-layout{display:grid;grid-template-columns:340px 1fr;gap:14px;min-height:min(calc(100vh - 200px),720px)}
.chat-list{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column}
.chat-list-hd{padding:14px 18px;border-bottom:1px solid var(--line2)}
.chat-list-tabs{display:flex;gap:6px;margin-top:10px;overflow-x:auto}
.chat-tab{flex-shrink:0;padding:6px 12px;border-radius:999px;font-size:11px;font-weight:600;background:var(--bg2);border:1px solid var(--line);cursor:pointer;color:var(--ink2)}
.chat-tab.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.chat-messages-list{flex:1;overflow-y:auto;max-height:calc(100vh - 280px)}
.chat-conv{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);display:flex;flex-direction:column;overflow:hidden}
.chat-conv-hd{padding:14px 18px;border-bottom:1px solid var(--line2);display:flex;align-items:center;gap:12px}
.chat-conv-body{flex:1;padding:20px;overflow-y:auto;background:var(--bg2);min-height:420px;max-height:calc(100vh - 340px)}
.bubble{max-width:68%;padding:10px 14px;border-radius:14px;margin-bottom:8px;font-size:13.5px;line-height:1.45;position:relative}
.bubble.them{background:var(--panel);color:var(--ink);border:1px solid var(--line);border-top-left-radius:4px;margin-right:auto}
.bubble.me{background:#DCF8C6;color:#0F172A;border-top-right-radius:4px;margin-left:auto}
html[data-theme="dark"] .bubble.me{background:#056162;color:#E8ECF3}
.bubble .t{font-size:10px;color:var(--muted);margin-top:4px;text-align:right}
.bubble.voice::before{content:"🎙";margin-right:6px}
.chat-draft{background:var(--blue-soft);border:1px dashed var(--blue-ghost);padding:10px 14px;border-radius:10px;font-size:13px;color:var(--blue-ink);margin-bottom:8px;position:relative}
.chat-draft .chat-draft-label{font-weight:600;display:inline-block;margin-right:4px}
.chat-draft-actions{display:flex;gap:6px;margin-top:8px}
.chat-input{display:flex;gap:8px;padding:14px 18px;border-top:1px solid var(--line2);background:var(--panel)}
.chat-input input{flex:1;padding:10px 14px;border:1px solid var(--line);border-radius:999px;background:var(--bg2);font-size:13px}
.chat-input input:focus{outline:0;border-color:var(--blue)}

/* MODAL */
#modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.6);-webkit-backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
#modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.6);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
#modal-overlay.hidden{display:none}
.modal{background:var(--panel);border-radius:var(--radius);max-width:640px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-xl);animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-hd{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.modal-hd h3{font-size:16px;font-weight:700}
.modal-close{border:0;background:var(--bg2);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:16px;color:var(--muted);display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:var(--red-soft);color:var(--red)}
.modal-body{padding:22px}
.modal-foot{padding:14px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px;background:var(--bg2)}

/* TOAST */
#toast-container{position:fixed;top:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--blue);padding:12px 16px;border-radius:var(--radius-sm);box-shadow:var(--shadow-xl);min-width:280px;font-size:13px;display:flex;align-items:flex-start;gap:10px;animation:slideIn .3s ease;pointer-events:auto}
.toast.success{border-left-color:var(--green)}
.toast.warn{border-left-color:var(--amber)}
.toast.error{border-left-color:var(--red)}
.toast .i{font-size:18px;flex-shrink:0}
.toast-body{flex:1}
.toast-body b{display:block;margin-bottom:2px}
.toast-body small{color:var(--muted);font-size:11.5px}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}

/* COMMAND PALETTE */
#command-palette{position:fixed;inset:0;background:rgba(15,23,42,.5);-webkit-backdrop-filter:blur(4px);z-index:150;display:flex;align-items:flex-start;justify-content:center;padding-top:100px}
#command-palette{position:fixed;inset:0;background:rgba(15,23,42,.5);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);z-index:150;display:flex;align-items:flex-start;justify-content:center;padding-top:100px}
#command-palette.hidden{display:none}
.cp{background:var(--panel);border-radius:var(--radius);max-width:560px;width:calc(100% - 40px);overflow:hidden;box-shadow:var(--shadow-xl);animation:slideUp .2s ease}
.cp-input{width:100%;padding:18px 24px;border:0;border-bottom:1px solid var(--line);background:var(--panel);color:var(--ink);font-size:16px}
.cp-input:focus{outline:0}
.cp-results{max-height:440px;overflow-y:auto}
.cp-group{padding:6px 0}
.cp-group-title{padding:6px 24px;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.cp-item{padding:10px 24px;display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px}
.cp-item:hover,.cp-item.on{background:var(--blue-soft);color:var(--blue-ink)}
.cp-item .ic{font-size:15px}
.cp-item .meta{margin-left:auto;font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace}

/* BADGES/CHIPS */
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600;background:var(--bg2);color:var(--ink2)}
.chip.blue{background:var(--blue-soft);color:var(--blue)}
.chip.green{background:var(--green-soft);color:var(--green)}
.chip.amber{background:var(--amber-soft);color:var(--amber)}
.chip.red{background:var(--red-soft);color:var(--red)}
.chip.violet{background:var(--violet-soft);color:var(--violet)}

/* ONBOARDING */
.onb{padding:18px 22px;background:linear-gradient(135deg,var(--violet-soft),var(--cyan-soft));border:1px solid var(--violet-soft);border-radius:var(--radius);margin-bottom:16px}
.onb-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.onb-progress{flex:1;height:6px;background:var(--panel);border-radius:999px;overflow:hidden;margin:0 14px}
.onb-progress span{display:block;height:100%;background:linear-gradient(90deg,var(--violet),var(--cyan));transition:width .6s;border-radius:999px}
.onb-steps{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px}
.onb-step{flex-shrink:0;min-width:180px;padding:12px 14px;background:var(--panel);border:1px solid var(--line);border-radius:10px;cursor:pointer;transition:all .15s}
.onb-step:hover{border-color:var(--violet)}
.onb-step.done{opacity:.6;background:var(--green-soft);border-color:var(--green)}
.onb-step .n{width:24px;height:24px;border-radius:50%;background:var(--bg2);display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:var(--muted);margin-bottom:8px}
.onb-step.done .n{background:var(--green);color:#fff}
.onb-step h4{font-size:12.5px;font-weight:600;margin-bottom:4px}
.onb-step p{font-size:11px;color:var(--muted)}

/* HEATMAP */
.heatmap{display:grid;grid-template-columns:60px repeat(7,1fr);gap:3px;padding:10px 0}
.heat-cell{aspect-ratio:1.5;border-radius:3px;background:var(--bg2);position:relative;cursor:pointer}
.heat-h0{background:var(--bg2)}
.heat-h1{background:#DBEAFE}
.heat-h2{background:#93C5FD}
.heat-h3{background:#3B82F6}
.heat-h4{background:#1E3A8A}
.heat-lbl{font-size:10px;color:var(--muted);padding:0 6px;display:flex;align-items:center;font-family:'JetBrains Mono',monospace}

/* STREAK */
.streak{display:flex;align-items:center;gap:16px;padding:14px 18px;background:linear-gradient(135deg,#FFF7ED,#FED7AA);border:1px solid #FDBA74;border-radius:var(--radius);color:#7C2D12;margin-bottom:12px}
html[data-theme="dark"] .streak{background:linear-gradient(135deg,rgba(253,186,116,.15),rgba(251,146,60,.08));color:#FED7AA}
.streak-flame{font-size:32px;animation:flame 2s ease-in-out infinite}
@keyframes flame{0%,100%{transform:scale(1) rotate(-2deg)}50%{transform:scale(1.08) rotate(2deg)}}
.streak-n{font-size:clamp(20px,3vw,28px);font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1.15}
.streak-lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}

/* AI BUTTON FLOAT */
.ai-fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--violet));color:#fff;border:0;cursor:pointer;box-shadow:0 10px 30px -8px var(--violet);z-index:40;display:flex;align-items:center;justify-content:center;font-size:22px;transition:transform .2s}
.ai-fab:hover{transform:scale(1.08) rotate(-8deg)}
.ai-fab::after{content:"";position:absolute;inset:-4px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--violet));opacity:.3;animation:pulseRing 2s infinite;z-index:-1}
@keyframes pulseRing{0%{transform:scale(1);opacity:.5}100%{transform:scale(1.3);opacity:0}}

/* TIMELINE */
.timeline{position:relative;padding-left:24px}
.timeline::before{content:"";position:absolute;left:6px;top:6px;bottom:6px;width:2px;background:var(--line)}
.tl-item{position:relative;padding-bottom:18px}
.tl-item::before{content:"";position:absolute;left:-24px;top:4px;width:14px;height:14px;border-radius:50%;background:var(--panel);border:3px solid var(--blue)}
.tl-item.alt::before{border-color:var(--green)}
.tl-item.amb::before{border-color:var(--amber)}
.tl-time{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.tl-body{font-size:13px;color:var(--ink);margin-top:3px}

/* FILTER BAR */
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filter-pill{padding:6px 12px;background:var(--panel);border:1px solid var(--line);border-radius:999px;font-size:12px;cursor:pointer;color:var(--ink2);transition:all .15s;font-weight:500}
.filter-pill:hover{border-color:var(--blue);color:var(--blue)}
.filter-pill.on{background:var(--blue);color:#fff;border-color:var(--blue)}

/* INVOICE LIST */
.inv-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line2);transition:background .15s}
.inv-row:hover{background:var(--bg2)}
.inv-id{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);width:100px}
.inv-amt{font-weight:700;margin-left:auto;font-family:'JetBrains Mono',monospace}

/* MENU TOGGLE (hamburger) — visible uniquement sur mobile */
.menu-toggle{display:none;width:36px;height:36px;border-radius:8px;border:1px solid var(--line);background:var(--panel);align-items:center;justify-content:center;cursor:pointer;color:var(--ink2);flex-shrink:0;transition:all .15s}
.menu-toggle:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-soft)}
.menu-toggle:focus-visible{outline:2px solid var(--blue);outline-offset:2px}
.sidebar-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.55);-webkit-backdrop-filter:blur(2px);z-index:85;opacity:0;visibility:hidden;transition:opacity .2s,visibility .2s}
.sidebar-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.55);-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px);z-index:85;opacity:0;visibility:hidden;transition:opacity .2s,visibility .2s}
.sidebar-backdrop.show{opacity:1;visibility:visible}

/* FOCUS RINGS (a11y) */
button:focus-visible,a:focus-visible,.nav-item:focus-visible,.filter-pill:focus-visible{outline:2px solid var(--blue);outline-offset:2px;border-radius:6px}

/* MOBILE-FIRST cascade */
@media(max-width:1280px){.view{padding:24px 26px 50px}}
@media(max-width:1024px){
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed;inset:0 auto 0 0;width:280px;max-width:85vw;z-index:90;transform:translateX(-100%);transition:transform .25s ease;box-shadow:0 20px 60px rgba(0,0,0,.3);height:100vh;display:flex}
  .sidebar.open{transform:translateX(0)}
  .menu-toggle{display:inline-flex}
  .stats{grid-template-columns:repeat(2,1fr)}
  .grid2,.grid3,.grid4{grid-template-columns:1fr}
  .chat-layout{grid-template-columns:1fr}
  .view{padding:20px 18px 44px}
  .search-btn{width:auto;flex:1;max-width:220px}
}
@media(max-width:760px){
  .topbar{padding:10px 14px;gap:8px}
  .breadcrumb{font-size:12.5px;min-width:0;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lang-btn button{padding:3px 7px;font-size:10.5px}
  .search-btn{display:none}
  .ai-fab{bottom:18px;right:18px;width:50px;height:50px;font-size:20px}
}
@media(max-width:520px){
  .stats{grid-template-columns:1fr}
  .topbar{padding:8px 12px;gap:6px}
  .page-hd h1{font-size:20px}
  .page-hd .sub{font-size:12px}
  .view{padding:14px 12px 30px}
  .icon-btn{width:32px;height:32px}
  .lang-btn{padding:1px}.lang-btn button{padding:2px 5px;font-size:10px}
  .avatar{width:30px;height:30px;font-size:11px}
  .streak-flame{font-size:24px}
  .streak-n{font-size:22px}
  .modal{max-width:100%;border-radius:12px}
  .modal-hd{padding:14px 18px}
  .modal-body{padding:16px}
  #toast-container{top:14px;right:14px;left:14px}
  .toast{min-width:0;width:100%}
  .ai-fab{bottom:14px;right:14px;width:46px;height:46px;font-size:18px}
}
@media(max-width:380px){
  .view{padding:12px 10px 26px}
  .page-hd h1{font-size:18px}
  .breadcrumb{font-size:11.5px}
}

/* PERF — réduire animations si demandé */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
}

/* HIDDEN UTILITY */
.hidden{display:none!important}
.mt8{margin-top:8px}.mt16{margin-top:16px}.mt24{margin-top:24px}
.flex{display:flex;gap:10px;align-items:center}.between{justify-content:space-between}
.shake{animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}

/* ============ NEXUS CORE DASHBOARD ÉPURÉ ============
   Espace principal général. Icône fenêtre centrale = la SEULE entrée vers les 6 modules. */
.nexus-core-dashboard{padding:30px 32px 50px;max-width:980px;margin:0 auto;display:flex;flex-direction:column;gap:32px;align-items:center;text-align:center}
.ncd-header{display:flex;flex-direction:column;align-items:center;gap:14px;padding-top:18px}
.ncd-brand{display:flex;flex-direction:column;align-items:center;gap:10px}
.ncd-logo-wrap{position:relative;display:inline-flex;align-items:center;gap:10px}
.ncd-logo{width:74px;height:74px;border-radius:20px;background:linear-gradient(135deg,#2E7BFF 0%,#8B5CFF 60%,#00E5FF 100%);display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 18px 40px -12px rgba(46,123,255,.5),inset 0 1px 0 rgba(255,255,255,.25);position:relative}
.ncd-logo svg{width:38px;height:38px}
.ncd-logo::after{content:"";position:absolute;inset:-6px;border-radius:26px;border:1px solid rgba(46,123,255,.25);animation:ncdPulse 2.4s ease-out infinite}
@keyframes ncdPulse{0%{transform:scale(1);opacity:.6}100%{transform:scale(1.25);opacity:0}}
.ncd-live{position:absolute;top:-4px;right:-50px;display:inline-flex;align-items:center;gap:6px;font-size:10px;font-family:'JetBrains Mono',monospace;color:#22C55E;letter-spacing:.12em;text-transform:uppercase;font-weight:700}
.ncd-live .dot{width:7px;height:7px;border-radius:50%;background:#22C55E;box-shadow:0 0 10px rgba(34,197,94,.6);animation:ncdPulse2 1.5s ease-in-out infinite}
@keyframes ncdPulse2{0%,100%{opacity:1}50%{opacity:.4}}
.ncd-eyebrow{font-size:11px;font-family:'JetBrains Mono',monospace;color:#06B6D4;letter-spacing:.16em;text-transform:uppercase;font-weight:700;margin-top:4px}
.ncd-greet{font-size:34px;font-weight:800;letter-spacing:-.025em;line-height:1.1;background:linear-gradient(120deg,var(--ink) 0%,#1A56DB 60%,#06B6D4 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
.ncd-greet em{font-style:normal;color:#1A56DB}
html[data-theme="dark"] .ncd-greet em{color:#00E5FF}
.ncd-sub{font-size:14.5px;color:var(--muted);max-width:520px;line-height:1.6}
.ncd-iface-zone{display:flex;flex-direction:column;align-items:center;gap:12px;margin:6px 0 0}
.ncd-iface-btn{display:flex;align-items:center;gap:18px;padding:22px 32px;border-radius:22px;background:linear-gradient(135deg,#2E7BFF 0%,#8B5CFF 60%,#00E5FF 100%);color:#fff;border:0;cursor:pointer;box-shadow:0 20px 50px -14px rgba(122,60,255,.55),inset 0 1px 0 rgba(255,255,255,.2);font-family:inherit;transition:all .25s cubic-bezier(.2,.8,.2,1);position:relative;overflow:hidden;min-height:96px}
.ncd-iface-btn::before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);transform:translateX(-100%);transition:transform .8s ease}
.ncd-iface-btn:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 28px 60px -14px rgba(122,60,255,.7),inset 0 1px 0 rgba(255,255,255,.3)}
.ncd-iface-btn:hover::before{transform:translateX(100%)}
.ncd-iface-grid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:5px;width:48px;height:48px;flex-shrink:0;background:rgba(255,255,255,.18);border-radius:11px;padding:8px}
.ncd-iface-grid span{background:#fff;border-radius:3px;opacity:.95}
.ncd-iface-lbl{display:flex;flex-direction:column;text-align:left;gap:2px}
.ncd-iface-lbl b{font-size:19px;font-weight:800;letter-spacing:-.01em}
.ncd-iface-lbl small{font-size:12px;opacity:.85;font-weight:500}
.ncd-iface-hint{font-size:11.5px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:.04em}
.ncd-quick{display:grid;grid-template-columns:repeat(3,minmax(160px,1fr));gap:12px;width:100%;max-width:720px;margin-top:8px}
.ncd-quick-tile{display:flex;align-items:center;gap:14px;padding:16px 18px;border-radius:14px;background:var(--panel);border:1px solid var(--line);cursor:pointer;transition:all .2s ease;font-family:inherit;text-align:left}
.ncd-quick-tile:hover{transform:translateY(-2px);border-color:var(--blue);box-shadow:0 12px 28px -10px rgba(26,86,219,.25)}
.ncd-quick-tile .q-ic{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;color:#fff}
.ncd-quick-tile .q-info{display:flex;flex-direction:column;gap:1px;min-width:0;flex:1}
.ncd-quick-tile .q-info b{font-size:18px;font-weight:800;color:var(--ink);font-family:'JetBrains Mono',monospace;letter-spacing:-.02em}
.ncd-quick-tile .q-info small{font-size:11.5px;color:var(--muted)}
.ncd-ai-note{display:flex;align-items:center;gap:12px;padding:14px 18px;border-radius:14px;background:linear-gradient(135deg,rgba(46,123,255,.08),rgba(122,60,255,.06));border:1px solid rgba(122,60,255,.2);width:100%;max-width:720px;margin-top:4px}
.ncd-ai-ic{font-size:22px;flex-shrink:0}
.ncd-ai-text{font-size:13.5px;color:var(--ink2);line-height:1.5;text-align:left;flex:1}
.ncd-ai-text b{color:var(--ink);font-weight:700}
.ncd-ai-cta{margin-left:6px;padding:4px 10px;border-radius:7px;background:linear-gradient(135deg,#1A56DB,#7A3CFF);color:#fff;border:0;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.ncd-ai-cta:hover{transform:translateX(2px);box-shadow:0 6px 14px -4px rgba(122,60,255,.5)}
@media(max-width:640px){
  .ncd-greet{font-size:26px}
  .ncd-iface-btn{padding:18px 22px;gap:14px;min-height:80px}
  .ncd-iface-grid{width:40px;height:40px;padding:6px}
  .ncd-iface-lbl b{font-size:16px}
  .ncd-quick{grid-template-columns:1fr;max-width:420px}
}

/* Topbar icône fenêtre (toujours visible) */
.topbar-iface-btn{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:10px;background:linear-gradient(135deg,#2E7BFF,#8B5CFF);color:#fff;border:0;cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:700;transition:all .18s;box-shadow:0 6px 14px -6px rgba(46,123,255,.45);flex-shrink:0}
.topbar-iface-btn:hover{transform:translateY(-1px);box-shadow:0 10px 22px -6px rgba(122,60,255,.55)}
.topbar-iface-btn .tib-lbl{white-space:nowrap}
@media(max-width:780px){.topbar-iface-btn .tib-lbl{display:none}}

/* ============ POP-UP RICHE (selon Smart bell PDF) ============ */
.hub-overlay-hd{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,.08)}
.hoh-eyebrow{font-size:10.5px;color:#00E5FF;font-weight:700;letter-spacing:.14em;text-transform:uppercase}
.hoh-title{font-size:22px;font-weight:800;letter-spacing:-.01em;color:#fff;margin-top:4px}
.hoh-sub{font-size:12.5px;color:#B8C1CE;margin-top:4px}
.hoh-close{background:rgba(255,255,255,.12);color:#fff;flex-shrink:0;border-radius:10px;width:34px;height:34px;border:0;cursor:pointer}
.hoh-close:hover{background:rgba(255,255,255,.22)}
.hub-cell{display:flex;flex-direction:column;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:14px;transition:all .2s;min-height:200px;position:relative}
.hub-cell:hover{border-color:rgba(0,229,255,.35);background:rgba(255,255,255,.06)}
.hub-cell.c-stats{border-top:3px solid #1EFF8E}
.hub-cell.c-msg{border-top:3px solid #8B5CFF}
.hub-cell.c-camp{border-top:3px solid #F5C45E}
.hub-cell.c-crm{border-top:3px solid #2E7BFF}
.hub-cell.c-vac{border-top:3px solid #00E5FF}
.hub-cell.c-tuto{border-top:3px solid #FF6B9D}
.hcell-hd{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,.06);position:relative}
.hcell-hd b{font-size:14px;font-weight:800;color:#fff;display:block}
.hcell-hd small{font-size:10.5px;color:#8A94A6;display:block;margin-top:1px}
.hcell-ic{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.hcell-badge{position:absolute;top:0;right:0;background:rgba(245,196,94,.22);color:#F5C45E;font-size:9px;font-weight:700;padding:2px 7px;border-radius:6px;letter-spacing:.08em;text-transform:uppercase}
.hcell-body{flex:1;display:flex;flex-direction:column;gap:7px;font-size:12px;color:#C5CDE0;margin-bottom:10px}
.hcell-cta{margin-top:auto;padding:8px 12px;background:linear-gradient(135deg,rgba(46,123,255,.5),rgba(139,92,255,.5));color:#fff;border:0;border-radius:9px;font-size:11.5px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .18s}
.hcell-cta:hover{background:linear-gradient(135deg,#2E7BFF,#8B5CFF);transform:translateX(2px)}
.mini-stat{display:flex;justify-content:space-between;align-items:baseline;font-size:11.5px;padding:4px 0}
.mini-stat b{font-size:15px;font-weight:800;color:#fff;font-family:'JetBrains Mono',monospace}
.mini-stat small{color:#8A94A6;font-size:10.5px}
.mini-pending{padding:5px 10px;background:rgba(245,158,11,.14);color:#FCD34D;border-radius:7px;font-size:11px;font-weight:600}
.mini-msg{display:flex;align-items:center;gap:8px;padding:6px 4px;border-radius:7px;cursor:pointer;transition:background .15s}
.mini-msg:hover{background:rgba(255,255,255,.04)}
.mini-msg.unread{background:rgba(46,123,255,.08)}
.mm-av{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.mm-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px}
.mm-info b{font-size:11.5px;color:#fff;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mm-info small{font-size:10.5px;color:#8A94A6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-target{font-size:11.5px;color:#C5CDE0;padding:4px 0}
.mini-toggle{display:flex;align-items:center;gap:8px;font-size:11px;color:#C5CDE0;padding:4px 0}
.mini-switch{position:relative;display:inline-block;width:30px;height:16px;flex-shrink:0}
.mini-switch input{opacity:0;width:0;height:0}
.mini-switch span{position:absolute;cursor:pointer;inset:0;background:rgba(255,255,255,.15);border-radius:999px;transition:.2s}
.mini-switch span::before{position:absolute;content:"";height:12px;width:12px;left:2px;top:2px;background:#fff;border-radius:50%;transition:.2s}
.mini-switch input:checked + span{background:#22C55E}
.mini-switch input:checked + span::before{transform:translateX(14px)}
.mini-action{padding:6px 10px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#fff;font-family:inherit;text-align:left;transition:all .15s}
.mini-action:hover{background:rgba(255,255,255,.12)}
.mini-action.danger{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.3);color:#FCA5A5}
.mini-action.danger:hover{background:rgba(239,68,68,.25)}
.mini-action.primary{background:linear-gradient(135deg,#2E7BFF,#8B5CFF);border-color:transparent}
.mini-podium-title{font-size:11px;color:#8A94A6;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px}
.mini-podium-row{display:flex;align-items:center;gap:8px;padding:4px 6px;border-radius:6px;font-size:11.5px}
.mini-podium-row:hover{background:rgba(255,255,255,.05)}
.mp-rank{width:18px;height:18px;border-radius:50%;background:linear-gradient(135deg,#F5C45E,#FF7B7B);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:10px;flex-shrink:0}
.mp-name{flex:1;color:#fff;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mp-score{color:#8A94A6;font-family:'JetBrains Mono',monospace;font-size:10.5px}
.mini-config{font-size:11px;color:#00E5FF;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px}
.mini-list{display:flex;flex-direction:column;gap:2px;font-size:11.5px;color:#C5CDE0;line-height:1.5}
.mini-tuto-progress{display:flex;flex-direction:column;gap:4px;margin-bottom:4px}
.mtp-bar{height:5px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden}
.mtp-bar span{display:block;height:100%;background:linear-gradient(90deg,#1EFF8E,#00E5FF);border-radius:999px}

/* Override grille pop-up — version riche (3 lignes × 2 colonnes, max 880px) */
.hub-overlay-card{max-width:880px !important}
.hub-overlay-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* HUB OVERLAY (Interface principale) — grille 2×3, centré, max 600px */
/* Barre top "Retour Nexus Core" + "Interface principale" sur chaque section */
.back-to-core-bar{padding:18px 32px 0;max-width:1280px;margin:0 auto;width:100%;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.back-to-core-btn{display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border-radius:10px;background:linear-gradient(135deg,rgba(122,60,255,.12),rgba(0,229,255,.10));border:1px solid rgba(122,60,255,.3);color:var(--ink);font-size:13px;font-weight:600;cursor:pointer;transition:all .18s ease;font-family:inherit}
.back-to-core-btn:hover{background:linear-gradient(135deg,rgba(122,60,255,.2),rgba(0,229,255,.18));border-color:var(--violet);transform:translateX(-2px);box-shadow:0 6px 18px -8px rgba(122,60,255,.4)}
html[data-theme="dark"] .back-to-core-btn{color:#E8ECF3}
.iface-window-btn{display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border-radius:10px;background:linear-gradient(135deg,#2E7BFF,#8B5CFF);border:0;color:#fff;font-size:13px;font-weight:700;cursor:pointer;transition:all .18s ease;font-family:inherit;box-shadow:0 6px 14px -6px rgba(46,123,255,.45)}
.iface-window-btn:hover{transform:translateY(-1px);box-shadow:0 10px 22px -6px rgba(139,92,255,.55)}
.iface-window-btn svg{flex-shrink:0}
.hub-overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);-webkit-backdrop-filter:blur(6px);z-index:120;display:flex;align-items:center;justify-content:center;padding:24px;animation:slideUp .25s ease}
.hub-overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);z-index:120;display:flex;align-items:center;justify-content:center;padding:24px;animation:slideUp .25s ease}
.hub-overlay.hidden{display:none}
.hub-overlay-card{background:linear-gradient(135deg,#0F172A 0%,#1E293B 100%);border:1px solid rgba(255,255,255,.1);border-radius:20px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;padding:26px 26px 22px;box-shadow:var(--shadow-xl);color:#E8ECF3;position:relative}
.hub-overlay-card::before{content:"";position:absolute;top:-2px;left:-2px;right:-2px;bottom:-2px;background:linear-gradient(135deg,var(--violet),var(--cyan));border-radius:22px;z-index:-1;opacity:.4}
.hub-overlay-grid{display:grid;grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(3,1fr);gap:12px;margin-top:18px}
.hub-tile{padding:18px 14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:14px;cursor:pointer;transition:all .2s;text-align:left;color:#E8ECF3;display:flex;gap:12px;align-items:flex-start;position:relative;overflow:hidden}
.hub-tile:hover{background:rgba(255,255,255,.1);border-color:var(--cyan);transform:translateY(-2px);box-shadow:0 12px 30px -15px rgba(0,229,255,.5)}
.hub-tile .ic{width:42px;height:42px;flex-shrink:0;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:22px;background:rgba(255,255,255,.06)}
.hub-tile .lbl{font-weight:700;font-size:14px;line-height:1.2;color:#fff;margin-bottom:3px}
.hub-tile .desc{font-size:11px;opacity:.65;line-height:1.35}
.hub-tile .badge-mini{display:inline-block;margin-top:4px;padding:1px 6px;background:rgba(245,158,11,.25);color:#FCD34D;border-radius:999px;font-size:9.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.hub-tile.t-stats .ic{background:rgba(26,86,219,.22);color:#93C5FD}
.hub-tile.t-msg .ic{background:rgba(34,197,94,.22);color:#86EFAC}
.hub-tile.t-camp .ic{background:rgba(245,158,11,.22);color:#FCD34D}
.hub-tile.t-crm .ic{background:rgba(122,60,255,.25);color:#C4B5FD}
.hub-tile.t-vac .ic{background:rgba(6,182,212,.22);color:#67E8F9}
.hub-tile.t-tuto .ic{background:rgba(236,72,153,.25);color:#F9A8D4}

/* CTA PRIMARY GROS (Interface principale sur hub) */
.hub-cta-main{display:inline-flex;align-items:center;gap:12px;padding:16px 28px;background:linear-gradient(135deg,var(--violet) 0%,var(--blue) 50%,var(--cyan) 100%);color:#fff;border:0;border-radius:16px;font-size:16px;font-weight:800;letter-spacing:-.01em;cursor:pointer;box-shadow:0 12px 30px -10px rgba(122,60,255,.55),0 0 0 1px rgba(255,255,255,.08) inset;transition:all .2s;position:relative;overflow:hidden}
.hub-cta-main::before{content:"";position:absolute;inset:0;background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,.25) 50%,transparent 70%);transform:translateX(-100%);transition:transform .6s}
.hub-cta-main:hover{transform:translateY(-2px);box-shadow:0 18px 38px -10px rgba(122,60,255,.7),0 0 0 1px rgba(255,255,255,.12) inset}
.hub-cta-main:hover::before{transform:translateX(100%)}
.hub-cta-main .arrow{font-size:18px;transition:transform .2s}
.hub-cta-main:hover .arrow{transform:translateX(4px)}
.hub-cta-wrap{display:flex;justify-content:center;margin:18px 0 28px}

/* BOOT SCREEN */
#boot-screen{position:fixed;inset:0;background:linear-gradient(135deg,#05070A 0%,#0F172A 60%,#1E1B4B 100%);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;opacity:1;transition:opacity .5s ease;color:#fff}
#boot-screen.fade-out{opacity:0;pointer-events:none}
.boot-logo{position:relative;width:96px;height:96px;display:flex;align-items:center;justify-content:center}
.boot-logo .ring{position:absolute;inset:0;border-radius:50%;border:2px solid transparent;border-top-color:var(--cyan);border-right-color:var(--violet);animation:bootSpin 1.4s linear infinite}
.boot-logo .ring.r2{inset:-10px;border-top-color:transparent;border-right-color:transparent;border-bottom-color:var(--blue);border-left-color:var(--cyan);animation:bootSpin 2.2s linear infinite reverse;opacity:.6}
.boot-logo .pulse{position:absolute;inset:14px;border-radius:50%;background:radial-gradient(circle,rgba(122,60,255,.4) 0%,transparent 70%);animation:bootPulse 1.6s ease-in-out infinite}
.boot-logo svg{position:relative;width:48px;height:48px;z-index:2}
@keyframes bootSpin{to{transform:rotate(360deg)}}
@keyframes bootPulse{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.15);opacity:.4}}
.boot-title{font-family:'Inter',sans-serif;font-size:36px;font-weight:900;letter-spacing:.12em;background:linear-gradient(135deg,#fff 0%,var(--cyan) 60%,var(--violet) 100%);-webkit-background-clip:text;background-clip:text;color:transparent;animation:fadeIn .8s .2s both}
.boot-sub{font-size:13px;color:#94A3B8;font-weight:500;letter-spacing:.05em;animation:fadeIn .8s .4s both}
.boot-bar{width:200px;height:3px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden;margin-top:8px}
.boot-bar::after{content:"";display:block;height:100%;width:30%;background:linear-gradient(90deg,var(--cyan),var(--violet));border-radius:999px;animation:bootBar 1.5s ease-in-out forwards}
@keyframes bootBar{0%{width:0%;transform:translateX(0)}50%{width:60%}100%{width:100%;transform:translateX(0)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* SECTIONS VACANCES + TUTORIEL */
.vac-card{padding:22px;background:var(--panel);border:1px solid var(--line);border-radius:14px;margin-bottom:16px}
.vac-card h3{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.vac-card .sub{font-size:12px;color:var(--muted);margin-bottom:14px}
.vac-toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--bg2);border-radius:10px;margin-bottom:8px;gap:14px}
.vac-toggle-row .lbl{flex:1}
.vac-toggle-row .lbl b{display:block;font-size:13px;font-weight:600;margin-bottom:2px}
.vac-toggle-row .lbl small{font-size:11px;color:var(--muted);line-height:1.4}
.vac-presets{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px}
.vac-preset{padding:12px 8px;background:var(--bg2);border:1px solid var(--line);border-radius:10px;cursor:pointer;text-align:center;transition:all .15s;font-size:12px;font-weight:600;color:var(--ink2)}
.vac-preset:hover{border-color:var(--blue);color:var(--blue)}
.vac-preset.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.vac-preset .em{display:block;font-size:18px;margin-bottom:4px}
.vac-cta{width:100%;padding:18px;font-size:15px;font-weight:700;border:0;border-radius:14px;cursor:pointer;background:linear-gradient(135deg,var(--cyan),var(--blue));color:#fff;transition:all .2s;box-shadow:0 8px 24px -10px rgba(26,86,219,.5)}
.vac-cta:hover{transform:translateY(-2px);box-shadow:0 12px 30px -10px rgba(26,86,219,.7)}
.vac-cta.off{background:linear-gradient(135deg,var(--red),#B91C1C);box-shadow:0 8px 24px -10px rgba(239,68,68,.5)}

.tuto-step{padding:20px;background:var(--panel);border:1px solid var(--line);border-radius:14px;margin-bottom:12px;display:flex;gap:16px;align-items:flex-start;transition:all .2s;position:relative}
.tuto-step:hover{border-color:var(--blue);box-shadow:var(--shadow-lg)}
.tuto-step.done{background:var(--green-soft);border-color:var(--green)}
.tuto-num{width:48px;height:48px;flex-shrink:0;border-radius:14px;background:linear-gradient(135deg,var(--blue),var(--violet));color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;font-family:'JetBrains Mono',monospace}
.tuto-step.done .tuto-num{background:linear-gradient(135deg,var(--green),#15803D)}
.tuto-body{flex:1;min-width:0}
.tuto-body h4{font-size:15px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.tuto-body .desc{font-size:13px;color:var(--ink2);margin-bottom:10px;line-height:1.5}
.tuto-checks{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.tuto-check{display:flex;gap:8px;align-items:center;font-size:12px;color:var(--muted)}
.tuto-check.on{color:var(--ink2)}
.tuto-check .box{width:14px;height:14px;border:1.5px solid var(--line);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;transition:all .15s}
.tuto-check.on .box{background:var(--green);border-color:var(--green);color:#fff}
.tuto-btn{padding:8px 16px;background:var(--blue);color:#fff;border:0;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.tuto-btn:hover{background:var(--blue-ink)}
.tuto-btn.done{background:var(--green)}
.tuto-progress{padding:16px 20px;background:linear-gradient(135deg,var(--blue-soft),var(--violet-soft));border-radius:14px;margin-bottom:20px;display:flex;align-items:center;gap:14px}
.tuto-progress .bar{flex:1;height:8px;background:rgba(255,255,255,.6);border-radius:999px;overflow:hidden}
.tuto-progress .bar span{display:block;height:100%;background:linear-gradient(90deg,var(--blue),var(--violet));transition:width .4s ease}
.tuto-progress .pct{font-weight:800;color:var(--blue-ink);font-family:'JetBrains Mono',monospace}

.nav-meta.new{background:linear-gradient(135deg,var(--violet),var(--cyan));color:#fff;font-size:9px;text-transform:uppercase;letter-spacing:.05em}

/* CHIPS DÉNOMINATIONS */
.deno-bar{display:flex;gap:6px;flex-wrap:wrap;padding:10px 18px;border-bottom:1px solid var(--line2);background:var(--bg2)}
.deno-chip{padding:5px 11px;background:var(--panel);border:1px solid var(--line);border-radius:999px;font-size:11px;cursor:pointer;font-weight:600;transition:all .15s;color:var(--ink2);display:inline-flex;align-items:center;gap:6px}
.deno-chip:hover{border-color:var(--blue);color:var(--blue)}
.deno-chip.on{background:var(--blue);color:#fff;border-color:var(--blue)}
/* Pastille couleur (toujours visible, même non-actif) selon palette Augustin */
.deno-chip .seg-dot{display:inline-block;width:8px;height:8px;border-radius:50%;flex-shrink:0;background:#94A3B8}
.deno-chip.new .seg-dot{background:#22C55E}
.deno-chip.vip .seg-dot{background:#F5C45E}
.deno-chip.biz .seg-dot{background:#7A3CFF}
.deno-chip.rec .seg-dot{background:#1A56DB}
.deno-chip.occ .seg-dot{background:#F59E0B}
.deno-chip.lost .seg-dot{background:#EF4444}
/* État sélectionné = fond plein de la couleur du segment (palette Augustin) */
.deno-chip.new.on{background:#22C55E;border-color:#22C55E;color:#fff}
.deno-chip.vip.on{background:#F5C45E;border-color:#F5C45E;color:#78350F}
.deno-chip.biz.on{background:#7A3CFF;border-color:#7A3CFF;color:#fff}
.deno-chip.rec.on{background:#1A56DB;border-color:#1A56DB;color:#fff}
.deno-chip.occ.on{background:#F59E0B;border-color:#F59E0B;color:#fff}
.deno-chip.lost.on{background:#EF4444;border-color:#EF4444;color:#fff}
.deno-chip.on .seg-dot{background:#fff}

/* BEST HOURS */
.best-hours{padding:18px;background:linear-gradient(135deg,var(--blue-soft),var(--cyan-soft));border-radius:12px;border:1px solid var(--blue-ghost)}
.best-hours h4{font-size:14px;font-weight:700;color:var(--blue-ink);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.best-hours .insight{padding:12px 14px;background:var(--panel);border-radius:10px;margin-bottom:8px;font-size:13px;display:flex;gap:10px;align-items:flex-start}
.best-hours .insight .badge{flex-shrink:0;width:30px;height:30px;border-radius:8px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700}
.best-hours .insight b{color:var(--blue-ink)}
.best-hours .insight .act{margin-top:6px}
.best-hours .insight .act button{font-size:11px;padding:4px 10px;background:var(--blue);color:#fff;border:0;border-radius:5px;cursor:pointer;font-weight:600}

/* TREND ARROWS */
.trend-up{color:var(--green);font-weight:700}
.trend-dn{color:var(--red);font-weight:700}
.trend-eq{color:var(--muted);font-weight:700}

/* AUDIO CONTROLS */
.audio-bar{padding:14px 16px;background:linear-gradient(135deg,var(--blue-soft),var(--violet-soft));border-radius:12px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.audio-bar .play-btn{width:42px;height:42px;border-radius:50%;background:var(--blue);color:#fff;border:0;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.audio-bar .play-btn:hover{background:var(--blue-ink)}
.speed-btns{display:flex;gap:4px;background:var(--panel);padding:3px;border-radius:8px;border:1px solid var(--line)}
.speed-btns button{padding:4px 10px;border-radius:5px;border:0;background:transparent;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer}
.speed-btns button.on{background:var(--blue);color:#fff}

/* PRINT PDF */
@media print {
  body * { visibility: hidden; }
  #print-area, #print-area * { visibility: visible; }
  #print-area { position: absolute; top: 0; left: 0; width: 100%; padding: 30px; }
  .no-print { display: none !important; }
  .lang-btn, .topbar, .sidebar, .ai-fab, #toast-container, #modal-overlay { display: none !important; }
  .pdf-page { page-break-after: always; }
  .pdf-h1 { font-size: 28px; font-weight: 800; margin-bottom: 6px; color: #1A56DB; }
  .pdf-h2 { font-size: 18px; font-weight: 700; margin: 24px 0 10px; color: #0F172A; border-bottom: 2px solid #1A56DB; padding-bottom: 4px; }
  .pdf-meta { color: #64748B; font-size: 12px; margin-bottom: 24px; }
  .pdf-table { width: 100%; border-collapse: collapse; margin: 10px 0; }
  .pdf-table th, .pdf-table td { padding: 8px 12px; border-bottom: 1px solid #E2E8F0; text-align: left; font-size: 12px; }
  .pdf-table th { background: #F1F5F9; font-weight: 700; }
  .pdf-stat { display: inline-block; padding: 14px 18px; margin: 6px; border: 1px solid #E2E8F0; border-radius: 8px; min-width: 140px; }
  .pdf-stat .v { font-size: 20px; font-weight: 800; color: #1A56DB; }
  .pdf-stat .l { font-size: 11px; color: #64748B; text-transform: uppercase; }
}
#print-area { display: none; }

/* CATALOG ENRICHED */
.cat-prod{padding:14px;border:1px solid var(--line);border-radius:12px;background:var(--panel);transition:all .2s}
.cat-prod:hover{border-color:var(--blue);box-shadow:var(--shadow)}
.cat-prod-photo{width:100%;aspect-ratio:1.4;background:var(--bg2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:48px;margin-bottom:10px;cursor:pointer;border:2px dashed var(--line);overflow:hidden}
.cat-prod-photo img{width:100%;height:100%;object-fit:cover;border-radius:6px}
.cat-prod-photo:hover{border-color:var(--blue);background:var(--blue-soft)}
.nutri-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin-top:6px}
.nutri-cell{padding:4px 0;border-radius:4px;text-align:center;font-size:10px;font-weight:700;color:#fff;cursor:pointer;opacity:.4}
.nutri-cell.on{opacity:1;transform:scale(1.05)}
.nutri-A{background:#22C55E}.nutri-B{background:#84CC16}.nutri-C{background:#FBBF24}.nutri-D{background:#F97316}.nutri-E{background:#EF4444}

/* SEGMENTS PERSISTENT */
.seg-card{padding:14px;background:var(--panel);border:1px solid var(--line);border-radius:10px;cursor:pointer;transition:all .15s;position:relative}
.seg-card:hover{border-color:var(--blue);box-shadow:var(--shadow)}
.seg-card.custom{border-color:var(--violet);background:var(--violet-soft)}
.seg-card-del{position:absolute;top:8px;right:8px;background:transparent;border:0;cursor:pointer;color:var(--muted);font-size:14px;opacity:0;transition:opacity .15s}
.seg-card:hover .seg-card-del{opacity:1}

/* INSIGHT TREND */
.insight-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;background:var(--bg2);margin-bottom:6px}
.insight-row .arrow{font-size:14px;width:20px;text-align:center;font-weight:800}

/* API KEY MASK */
.api-key{font-family:'JetBrains Mono',monospace;background:var(--bg2);padding:8px 10px;border-radius:6px;font-size:12px;display:flex;align-items:center;gap:8px}
.api-key input{flex:1;border:0;background:transparent;font-family:inherit;color:var(--ink)}
.api-key .toggle{cursor:pointer;color:var(--muted)}

/* WIDGET HUB CLICKABLE */
.widget-hub{padding:18px;background:var(--panel);border:1px solid var(--line);border-radius:14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.widget-hub:hover{border-color:var(--blue);transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.widget-hub::before{content:"→";position:absolute;top:14px;right:14px;font-size:16px;color:var(--muted);transition:all .2s}

<!-- ⚡ MEGA FAILSAFE BOOT HIDE (Augustin 19/05 : "loading en boucle peu importe le menu")
     Force-hide le boot screen après 1.5s MAX, INDÉPENDANT de tout le JS de Nx.
     Même si init() crash, même si Nx n'existe pas, même si setLang plante,
     le user voit l'app après 1.5s garanti. -->
<script>
(function(){
  var failsafe = function(){
    var b = document.getElementById('boot-screen');
    if (b) {
      b.style.setProperty('display', 'none', 'important');
      b.style.setProperty('visibility', 'hidden', 'important');
      b.style.setProperty('opacity', '0', 'important');
      b.style.setProperty('pointer-events', 'none', 'important');
      try { sessionStorage.setItem('nx_booted_v1','1'); } catch(e){}
    }
  };
  // Skip immédiat si déjà bootée dans la session
  try {
    if (sessionStorage.getItem('nx_booted_v1') === '1') {
      // Hide direct, sans même attendre que le DOM soit prêt
      if (document.readyState !== 'loading') failsafe();
      else document.addEventListener('DOMContentLoaded', failsafe);
      return;
    }
  } catch(e){}
  // Sinon, hide après 1.5s max
  setTimeout(failsafe, 1500);
})();
</script>

  function hash(s){
    let h = 5381;
    for (let i = 0; i < s.length; i++) h = ((h << 5) + h) + s.charCodeAt(i);
    return (h >>> 0).toString(36);
  }
  function shouldTranslate(txt){
    if (!txt || typeof txt !== 'string') return false;
    const t = txt.trim();
    if (t.length < 2 || t.length > 500) return false;
    if (SKIP_TEXT.test(t)) return false;
    if (ONLY_EMOJI.test(t)) return false;
    if (PRESERVE.test(t)) return false;
    return true;
  }

  // === COLLECTE EXHAUSTIVE via TreeWalker sur TextNodes + attributs ===
  // Capture TOUT le texte visible, y compris dans les <div> non-leaf (ex: "Insight ... — texte")
  // Chaque item : { node?, el?, attr, orig }
  function collectAll(){
    const items = [];
    // 1) TextNodes (walker)
    const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {
      acceptNode(node){
        const raw = node.nodeValue;
        if (!raw || !raw.trim()) return NodeFilter.FILTER_REJECT;
        const parent = node.parentElement;
        if (!parent) return NodeFilter.FILTER_REJECT;
        if (parent.closest(SKIP_PARENT_SELECTOR)) return NodeFilter.FILTER_REJECT;
        // Stocker l'original au 1er passage
        if (!textNodeOrigs.has(node)) textNodeOrigs.set(node, raw);
        const orig = textNodeOrigs.get(node).trim();
        if (!shouldTranslate(orig)) return NodeFilter.FILTER_REJECT;
        return NodeFilter.FILTER_ACCEPT;
      }
    });
    let n;
    while ((n = walker.nextNode())) {
      const orig = textNodeOrigs.get(n).trim();
      items.push({ node: n, attr: 'textNode', orig });
    }
    // 2) Placeholders
    document.body.querySelectorAll('input[placeholder],textarea[placeholder]').forEach(el => {
      if (el.matches(SKIP_SELECTOR)) return;
      const stored = el.getAttribute(ORIG_PH);
      const orig = stored != null ? stored : (el.getAttribute('placeholder') || '').trim();
      if (!shouldTranslate(orig)) return;
      items.push({ el, attr: 'placeholder', orig });
    });
    // 3) Title (tooltips)
    document.body.querySelectorAll('[title]').forEach(el => {
      if (el.matches(SKIP_SELECTOR)) return;
      const stored = el.getAttribute(ORIG_TITLE);
      const orig = stored != null ? stored : (el.getAttribute('title') || '').trim();
      if (!shouldTranslate(orig)) return;
      items.push({ el, attr: 'title', orig });
    });
    // 4) Aria-labels
    document.body.querySelectorAll('[aria-label]').forEach(el => {
      if (el.matches(SKIP_SELECTOR)) return;
      const stored = el.getAttribute(ORIG_ARIA);
      const orig = stored != null ? stored : (el.getAttribute('aria-label') || '').trim();
      if (!shouldTranslate(orig)) return;
      items.push({ el, attr: 'aria-label', orig });
    });
    // 5) Alt sur images
    document.body.querySelectorAll('img[alt]').forEach(el => {
      if (el.matches(SKIP_SELECTOR)) return;
      const stored = el.getAttribute(ORIG_ALT);
      const orig = stored != null ? stored : (el.getAttribute('alt') || '').trim();
      if (!shouldTranslate(orig)) return;
      items.push({ el, attr: 'alt', orig });
    });
    return items;
  }

  function setOrig(item){
    if (item.attr === 'textNode') return;  // déjà stocké dans textNodeOrigs Map
    if (item.attr === 'placeholder') { if (!item.el.hasAttribute(ORIG_PH)) item.el.setAttribute(ORIG_PH, item.orig); }
    else if (item.attr === 'title')      { if (!item.el.hasAttribute(ORIG_TITLE)) item.el.setAttribute(ORIG_TITLE, item.orig); }
    else if (item.attr === 'aria-label') { if (!item.el.hasAttribute(ORIG_ARIA)) item.el.setAttribute(ORIG_ARIA, item.orig); }
    else if (item.attr === 'alt')        { if (!item.el.hasAttribute(ORIG_ALT)) item.el.setAttribute(ORIG_ALT, item.orig); }
  }
  function setTranslated(item, value){
    if (item.attr === 'textNode') {
      if (!item.node || !item.node.parentNode) return;
      // Préserve les espaces leading/trailing pour ne pas casser la mise en page
      const raw = textNodeOrigs.get(item.node) || item.node.nodeValue;
      const leading = (raw.match(/^\s*/) || [''])[0];
      const trailing = (raw.match(/\s*$/) || [''])[0];
      item.node.nodeValue = leading + value + trailing;
      return;
    }
    if (!item.el || !document.body.contains(item.el)) return;
    if (item.attr === 'placeholder') item.el.setAttribute('placeholder', value);
    else if (item.attr === 'title') item.el.setAttribute('title', value);
    else if (item.attr === 'aria-label') item.el.setAttribute('aria-label', value);
    else if (item.attr === 'alt') item.el.setAttribute('alt', value);
  }
  function restoreOrig(){
    // 1) TextNodes : restore via Map
    textNodeOrigs.forEach((orig, node) => {
      if (node.parentNode) node.nodeValue = orig;
    });
    // 2) Placeholders/title/aria/alt
    document.querySelectorAll('[' + ORIG_PH + ']').forEach(el => {
      el.setAttribute('placeholder', el.getAttribute(ORIG_PH));
      el.removeAttribute(ORIG_PH);
    });
    document.querySelectorAll('[' + ORIG_TITLE + ']').forEach(el => {
      el.setAttribute('title', el.getAttribute(ORIG_TITLE));
      el.removeAttribute(ORIG_TITLE);
    });
    document.querySelectorAll('[' + ORIG_ARIA + ']').forEach(el => {
      el.setAttribute('aria-label', el.getAttribute(ORIG_ARIA));
      el.removeAttribute(ORIG_ARIA);
    });
    document.querySelectorAll('[' + ORIG_ALT + ']').forEach(el => {
      el.setAttribute('alt', el.getAttribute(ORIG_ALT));
      el.removeAttribute(ORIG_ALT);
    });
  }

  async function translateBatch(texts, target){
    try {
      const res = await fetch('/api/translate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ texts, target, source: 'fr' })
      });
      if (!res.ok) { console.warn('DT API error', res.status); return null; }
      const data = await res.json();
      return Array.isArray(data.translations) && data.translations.length === texts.length
        ? data.translations : null;
    } catch (e) {
      console.warn('DT fetch failed', e);
      return null;
    }
  }

  // apply(lang, opts) — opts.silent = true → applique uniquement le cache, n'appelle PAS l'API
  async function apply(lang, opts){
    opts = opts || {};
    if (!lang) return;
    if (inFlight) { pendingLang = lang; return; }
    inFlight = true;
    try {
      if (lang === 'fr') { restoreOrig(); return; }
      const items = collectAll();
      if (items.length === 0) return;
      if (!cache[lang]) cache[lang] = {};
      const needTexts = [];
      const needIdx = [];
      items.forEach((it, i) => {
        setOrig(it);
        const h = hash(it.orig);
        const cached = cache[lang][h];
        if (cached) {
          setTranslated(it, cached);
        } else if (!opts.silent) {
          needTexts.push(it.orig);
          needIdx.push(i);
        }
      });
      if (opts.silent || needTexts.length === 0) return;
      const CHUNK = 60;
      for (let i = 0; i < needTexts.length; i += CHUNK) {
        const batchTexts = needTexts.slice(i, i + CHUNK);
        const batchIdx = needIdx.slice(i, i + CHUNK);
        const translated = await translateBatch(batchTexts, lang);
        if (!translated) continue;
        batchTexts.forEach((src, k) => {
          const tr = translated[k];
          if (!tr) return;
          cache[lang][hash(src)] = tr;
          setTranslated(items[batchIdx[k]], tr);
        });
      }
      saveCache();
    } finally {
      inFlight = false;
      if (pendingLang && pendingLang !== lang) {
        const next = pendingLang; pendingLang = null;
        apply(next);
      } else { pendingLang = null; }
    }
  }

  // applyNew(lang) — variante post-render : applique cache uniquement (zero API call)
  // si nouveaux nœuds DOM non couverts par le cache, ils restent en FR jusqu'au prochain switch
  // Wrapper public qui tracke la langue courante
  let currentLang = 'fr';
  async function publicApply(lang, opts){
    currentLang = lang || currentLang;
    return apply(lang, opts);
  }
  function publicApplyNew(lang){ return publicApply(lang, { silent: true }); }

  // === MutationObserver : retraduit auto les nouveaux DOM (draft IA, modals, etc.) — debounced 300ms
  let mutTimer = null;
  function startObserver(){
    if (window._dynObs) return;
    window._dynObs = new MutationObserver(() => {
      if (currentLang === 'fr') return;
      clearTimeout(mutTimer);
      mutTimer = setTimeout(() => { try { apply(currentLang); } catch(e){} }, 300);
    });
    window._dynObs.observe(document.body, { childList: true, subtree: true, characterData: false });
  }
  if (document.body) startObserver();
  else document.addEventListener('DOMContentLoaded', startObserver);

  return { apply: publicApply, applyNew: publicApplyNew, clearCache(){ cache = {}; saveCache(); textNodeOrigs.clear(); } };
})();
