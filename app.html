  // ============================================================
  // ☁️ PHASE B — Sync bidirectionnelle pour les 10 tables restantes
  // ============================================================
  // Helper UUID déterministe (Augustin 08/06/2026)
  // Convertit un id local (integer) en UUID v4 valide format Postgres
  // Pattern : 00000000-0000-4000-8000-{12 chars} → conserve l'id local en bout
  // Reverse : _uuidToLocalId retrouve l'integer original
  // Si l'id est déjà un vrai UUID Postgres, on passe transparent (round-trip safe)
  _localIdToUuid(id, prefix){
    if (id === null || id === undefined || id === '') return '00000000-0000-4000-8000-000000000000';
    const s = String(id);
    if (/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(s)) return s; // déjà UUID
    const n = parseInt(s, 10);
    if (isNaN(n)) return '00000000-0000-4000-8000-000000000000';
    const p = (prefix || '8000'); // bits 4 réservés UUID v4, ici on profite des 4 chars pour identifier le type (8000 client, 8001 conv, etc.)
    const padded = String(Math.abs(n)).padStart(12, '0').slice(-12);
    return `00000000-0000-4000-${p}-${padded}`;
  },
  _uuidToLocalId(uuid){
    if (typeof uuid !== 'string') return uuid;
    const m = uuid.match(/^00000000-0000-4000-[0-9a-f]{4}-(\d{12})$/i);
    if (m) {
      const n = parseInt(m[1], 10);
      if (!isNaN(n)) return n;
    }
    // V4.3 : vrai UUID aleatoire (client cree par le workflow n8n) -> entier STABLE.
    // Avant : on renvoyait l'UUID string -> les onclick "Nx.x(${c.id})" plantaient (pas de quotes).
    // Maintenant tous les id sont des entiers -> tous les onclick marchent (inbox, CRM, fiche).
    return this._hashId(uuid);
  },
  _hashId(s){
    let h = 0;
    for (let i = 0; i < s.length; i++) { h = ((h << 5) - h + s.charCodeAt(i)) | 0; }
    return Math.abs(h) + 1000000; // +offset : evite collision avec les petits id mock (1..999999)
  },

    // on réutilise cet UUID — sinon le hash local créerait un DOUBLON en base à chaque sync.
    return { id: c.cloudId || this._localIdToUuid(c.id, '8000'),
      name: c.name, phone: c.phone||'', email: c.email||'',
      instagram: c.instagram||'', instagram_followers: c.instagramFollowers||0,

  _fromRowClient(r){

  // Conversations + Messages (relations FK)
  _convCloudId(clientId){ return this._localIdToUuid(clientId, '8001'); },
  _toRowConversation(conv){

    return { id: this._convCloudId(conv.clientId),
      client_id: this._localIdToUuid(conv.clientId, '8000'),

  _toRowMessage(convId, msg, idx){
    // Augustin 08/06 fix : pas d'id explicite, Postgres génère via default gen_random_uuid().
    // Évite collisions entre messages de conversations différentes (DELETE-then-INSERT atomique).
    return {
      conversation_id: this._convCloudId(convId),
      from_role: (msg.from === 'me') ? 'me' : (msg.from === 'ai') ? 'ai' : 'them',
      text: msg.text||'', channel: msg.channel||'whatsapp', metadata: {} };

  // Campagnes (vraies, non auto) — id déterministe pour upsert idempotent
  _toRowCampaign(c){
    return { id: this._localIdToUuid(c.id, '8003'),
      name: c.name||'', audience: c.audience||'', sent: c.sent||0,
      opened: c.opened||0, replied: c.replied||0, status: c.status||'draft',
      message: c.message||'', sent_at: null };

  _toRowCredits(cr){ return { remaining: cr.remaining||0, total: cr.total||500, reset_label: cr.resetLabel||'' }; },
  _fromRowCredits(r){ return { remaining: r.remaining, total: r.total, resetLabel: r.reset_label }; },
  // V4.2 : descente cloud -> app des conversations + messages (avant : push seulement).
  // Map client_id (UUID cloud) -> id local via le meme _uuidToLocalId que les clients => le clientId matche.
  _fromRowMessage(r){
    // V4.3 : alignement chat du point de vue du patron.
    // Client (them) = GAUCHE. Tout ce que la boulangerie envoie (IA OU manuel) = DROITE (vert) = 'me'.
    const from = (r.from_role === 'them') ? 'them' : 'me';
    // champ 'time' formate (HH:MM) attendu par le rendu — sinon affichage "undefined"
    let time = '';
    if (r.created_at) { const d = new Date(r.created_at); if (!isNaN(d)) time = d.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}); }
    return { from, text: r.text || '', channel: r.channel || 'whatsapp', time: time || 'récent', ts: r.created_at || null };
  },
  _fromRowConversation(convRow, msgRows){
    return {
      clientId: this._uuidToLocalId(convRow.client_id),
      channel: convRow.channel || 'whatsapp',
      unread: !!convRow.unread,
      draft: convRow.draft || null,
      messages: (msgRows || []).map(m => this._fromRowMessage(m))
    };
  },
  _toRowIntegration(i){ return { key: i.k, name: i.n, status: i.s, critical: !!i.critical, description: i.desc||'', config: i.config||{} }; },
  _fromRowIntegration(r){ return { k: r.key, n: r.name, ic: '', s: r.status, critical: r.critical, desc: r.description, config: r.config }; },
  _toRowAgenda(it){
    let dueDate = null;
    if (it.dueDate) { const d = new Date(it.dueDate); if (!isNaN(d)) dueDate = d.toISOString(); }
    // Augustin 08/06 : id agenda peut être un string (fiesta_2026-09-18), un Date.now() ou un id custom. UUID déterministe si number.
    let id = it.id;
    if (typeof id === 'number' || (typeof id === 'string' && /^\d+$/.test(id))) id = this._localIdToUuid(id, '8004');
    else if (typeof id === 'string' && !/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(id)) {
      // String non-numérique (ex: 'fiesta_2026-09-18') : hash simple → UUID
      let h = 0; for (let i = 0; i < id.length; i++) { h = ((h << 5) - h + id.charCodeAt(i)) | 0; }
      id = this._localIdToUuid(Math.abs(h), '8004');
    }
    return { id, title: it.title||'', detail: it.detail||'', icon: it.icon||'🎯',
      category: it.category||'reminder', due_date: dueDate, when_label: it.when||'',
      status: it.status||'scheduled', metadata: it.metadata||{} };
  },
  _fromRowAgenda(r){
    return { id: this._uuidToLocalId(r.id), title: r.title, detail: r.detail, icon: r.icon, category: r.category,
      dueDate: r.due_date, when: r.when_label, status: r.status, metadata: r.metadata };

  _toRowEscalation(e){

  // Sync ALL : load toutes les tables au login, override state si données cloud présentes, seed sinon
  // V4.2 : param silent=true pour la synchro auto periodique (pas de toast spam toutes les 15s)
  async syncFromCloud(silent){
    if (!window.NxCloud || !window.NxCloud.isAuthed()) return;
    const NC = window.NxCloud;
    try {
      // Clients
      const cli = await NC.listAll('clients');
      if (cli.ok && cli.data.length) {
        this.state.clients = cli.data.map(r => this._fromRowClient(r));
      } else if (cli.ok && !cli.data.length && this.state.clients?.length) {
        await NC.bulkUpsert('clients', this.state.clients.map(c => this._toRowClient(c)), 'id');
      }
      // V4.2 : Conversations + Messages (descente cloud -> app, pour la Messagerie)
      const cv = await NC.listAll('conversations');
      const ms = await NC.listAll('messages');
      if (cv.ok && cv.data.length) {
        const msgsByConv = {};
        (ms.ok ? ms.data : []).forEach(m => {
          (msgsByConv[m.conversation_id] = msgsByConv[m.conversation_id] || []).push(m);
        });
        // tri chronologique des messages par conversation
        Object.values(msgsByConv).forEach(arr => arr.sort((a,b) => new Date(a.created_at||0) - new Date(b.created_at||0)));
        this.state.conversations = cv.data.map(c => this._fromRowConversation(c, msgsByConv[c.id]));
      }
      // Credits
      const cr = await NC.listAll('credits');
      if (cr.ok && cr.data.length) {
        this.state.credits = this._fromRowCredits(cr.data[0]);
      } else if (cr.ok && this.state.credits) {
        await NC.upsertOne('credits', this._toRowCredits(this.state.credits), 'tenant_id');
      }
      // Integrations
      const ig = await NC.listAll('integrations');
      if (ig.ok && ig.data.length) {
        this.state.integrations = ig.data.map(r => this._fromRowIntegration(r));
      } else if (ig.ok && this.state.integrations?.length) {
        await NC.bulkUpsert('integrations', this.state.integrations.map(i => this._toRowIntegration(i)), 'tenant_id,key');
      }
      // Agenda
      const ag = await NC.listAll('agenda_items');
      if (ag.ok && ag.data.length) {
        try { localStorage.setItem('nx_agenda', JSON.stringify(ag.data.map(r => this._fromRowAgenda(r)))); } catch(_) {}
      }
      // Escalation log
      const esc = await NC.listAll('escalation_log');
      if (esc.ok && esc.data.length) {
        this.state.escalationLog = esc.data.map(r => this._fromRowEscalation(r));
      }
      // Vacances
      const vac = await NC.listAll('vacances_config');
      if (vac.ok && vac.data.length) {
        try { localStorage.setItem('nexus_vacances', JSON.stringify(this._fromRowVacances(vac.data[0]))); } catch(_) {}
      }
      // V5.3 : données app perso (segments CRM, corrections IA CRM, templates) — suivent le compte
      try {
        const tad = await NC.listAll('tenant_app_data');
        if (tad.ok && tad.data.length) {
          const d = tad.data[0];
          if (Array.isArray(d.custom_segments)) this.state.customSegments = d.custom_segments;
          if (Array.isArray(d.crm_corrections)) this.state.crmCorrections = d.crm_corrections;
          if (Array.isArray(d.user_templates))  this.state.userTemplates  = d.user_templates;
        }
      } catch(_) {}
      // V5.2 : tire les VRAIES campagnes (logs du robot n8n) — stats + historique réels
      try {
        const camp = await NC.listAll('campaigns');
        if (camp.ok && camp.data.length) {
          this.state.campaigns = camp.data
            .sort((a,b)=>String(b.sent_at||b.created_at||'').localeCompare(String(a.sent_at||a.created_at||'')))
            .slice(0,50)
            .map(r => ({ id: this._uuidToLocalId(r.id), cloudId: r.id, name: r.name||'', audience: r.audience||'',
              sent: r.sent||0, opened: r.opened||0, replied: r.replied||0, status: r.status||'sent',
              message: r.message||'',
              date: r.sent_at ? new Date(r.sent_at).toLocaleDateString('fr-FR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : '' }));
        }
      } catch(_) {}
      this.save();
      if (!silent) this.toast('☁️ Données cloud synchronisées', 'success', `${(cli.data||[]).length} clients · ${(esc.data||[]).length} escalades`);
      this.renderView();
    } catch(e) {
      console.warn('[Cloud] syncFromCloud', e);
    }
  },
  // V4.2 : actualisation a la demande (bouton CRM) — sync + toast confirmation
  async refreshFromCloud(){
    if (!window.NxCloud || !window.NxCloud.isAuthed()) {
      this.toast('☁️ Pas connecté au cloud', 'warn', 'Connecte-toi pour actualiser');
      return;
    }
    // V5 fix persistance : POUSSER les modifs locales D'ABORD, tirer le cloud ENSUITE.
    // Avant : pull seul -> le cloud (plus vieux) écrasait ce que l'utilisateur venait de taper.
    this.toast('🔄 Sauvegarde + actualisation...', 'info');
    try { await this.syncToCloud(); } catch(_){}
    await this.syncFromCloud(); // affiche le toast "synchronisées" a la fin

  // Push debounced de tout ce qui peut être push
  _scheduleCloudSync(){
    if (!window.NxCloud || !window.NxCloud.isAuthed()) return;
    clearTimeout(this._cloudSyncTimer);
    this._cloudSyncTimer = setTimeout(() => this.syncToCloud(), 1500);
  },
  async syncToCloud(){
    if (!window.NxCloud || !window.NxCloud.isAuthed()) return;
    const NC = window.NxCloud;
    const user = NC._user;
    if (!user) return;
    try {
      const tasks = [];
      // Profil entreprise (1:1)
      tasks.push(NC.upsertProfile(this.state.business));
      // Clients (bulk upsert avec UUID déterministe)
      if (this.state.clients?.length) {
        tasks.push(NC.bulkUpsert('clients', this.state.clients.map(c => this._toRowClient(c)), 'id'));
      }
      // Crédits (1:1)
      if (this.state.credits) tasks.push(NC.upsertOne('credits', this._toRowCredits(this.state.credits), 'tenant_id'));
      // Intégrations (PK composite tenant_id,key)
      if (this.state.integrations?.length) {
        tasks.push(NC.bulkUpsert('integrations', this.state.integrations.map(i => this._toRowIntegration(i)), 'tenant_id,key'));
      }
      // Auto-campagnes (PK composite tenant_id,id)
      if (this.state.autoCampaignDetails) {
        const autoRows = Object.keys(this.state.autoCampaignDetails).map(id => {
          const det = this.state.autoCampaignDetails[id];
          const status = (this.state.autoCampaignStatus||{})[id] || 'active';
          return this._toRowAutoCamp(id, det, status);
        });
        if (autoRows.length) tasks.push(NC.bulkUpsert('auto_campaigns', autoRows, 'tenant_id,id'));
      }
      // Vacances (1:1)
      try {
        const vacRaw = localStorage.getItem('nexus_vacances');
        if (vacRaw) tasks.push(NC.upsertOne('vacances_config', this._toRowVacances(JSON.parse(vacRaw)), 'tenant_id'));
      } catch(_) {}
      // V5.3 : données app perso (segments CRM, corrections IA CRM, templates) → suivent le compte
      tasks.push(NC.upsertOne('tenant_app_data', {
        custom_segments: this.state.customSegments || [],
        crm_corrections: this.state.crmCorrections || [],
        user_templates: this.state.userTemplates || []
      }, 'tenant_id'));
      // Agenda items (bulk upsert)
      try {
        const agRaw = localStorage.getItem('nx_agenda');
        if (agRaw) {
          const items = JSON.parse(agRaw);
          if (Array.isArray(items) && items.length) tasks.push(NC.bulkUpsert('agenda_items', items.map(it => this._toRowAgenda(it)), 'id'));
        }
      } catch(_) {}
      // Campagnes envoyées (bulk upsert)
      if (this.state.campaigns?.length) {
        // V5.2 : ne JAMAIS re-pousser les campagnes venues du cloud (robot = proprietaire),
        // sinon doublons a chaque cycle push+pull. On ne pousse que les locales (mode demo).
        const localCamps = this.state.campaigns.filter(c => !c.cloudId);
        if (localCamps.length) tasks.push(NC.bulkUpsert('campaigns', localCamps.map(c => this._toRowCampaign(c)), 'id'));
      }

      await Promise.allSettled(tasks);

      // Tables append-only sans clé d'idempotence : DELETE-then-INSERT pour éviter duplications
      // (escalation_log + cart_recovery_runs)
      try {
        if (this.state.escalationLog?.length) {
          await NC.client.from('escalation_log').delete().eq('tenant_id', user.id);
          const rows = this.state.escalationLog.slice(0, 50).map(e => Object.assign(this._toRowEscalation(e), { tenant_id: user.id }));
          if (rows.length) await NC.client.from('escalation_log').insert(rows);
        }
      } catch(e) { console.warn('[Cloud] escalation_log sync', e); }
      try {
        if (this.state.cartRecoveryRuns?.length) {
          await NC.client.from('cart_recovery_runs').delete().eq('tenant_id', user.id);
          const rows = this.state.cartRecoveryRuns.slice(0, 30).map(r => ({
            tenant_id: user.id,
            triggered_at: r.ts ? new Date(r.ts).toISOString() : new Date().toISOString(),
            count: r.count||0,
            items: r.items||[]
          }));
          if (rows.length) await NC.client.from('cart_recovery_runs').insert(rows);
        }
      } catch(e) { console.warn('[Cloud] cart_recovery_runs sync', e); }

      // V4.2 : PUSH conversations/messages DESACTIVE cote app.
      // Raison : les workflows n8n (WhatsApp Inbound) sont PROPRIETAIRES des conversations.
      // L'ancien code faisait DELETE-then-INSERT -> il EFFACAIT les conversations creees par
      // le workflow et les remplacait par les mocks locaux (bug : conversations WhatsApp perdues).
      // Desormais l'app LIT les conversations (syncFromCloud) mais ne les ECRASE plus.
      // (Si besoin futur de push depuis l'app : upsert par id, jamais DELETE global.)
    } catch(e) {
      console.warn('[Cloud] syncToCloud', e);
    }
  },

  renderPaletteResults(q){

      {g:'Navigation',items:[
        {ic:'🏠',label:'Tableau de bord',meta:'G D',fn:()=>this.navigate('dashboard')},
        {ic:'💬',label:'Messagerie',meta:'G I',fn:()=>this.navigate('inbox')},

        {ic:'💳',label:'Paiement & Plan',meta:'G P',fn:()=>this.navigate('payments')},
        {ic:'👤',label:'Profil entreprise',meta:'G U',fn:()=>this.navigate('profile')},
      ]},
      {g:'Actions',items:[
        {ic:'✨',label:'Ouvrir Nexus AI',fn:()=>this.openAiChat()},
        {ic:'📢',label:'Créer une campagne',fn:()=>{this.navigate('campaigns');setTimeout(()=>Nx.openCampaignBuilder(),200)}},
        {ic:'🆘',label:'SOS Augustin',fn:()=>this.openModal('sos')},
        {ic:'🔌',label:'Partage 1-clic',fn:()=>this.openModal('share-data')},
        {ic:'✈️',label:'Toggle mode vacances',fn:()=>{this.toggleVacation();document.getElementById('vacationToggle').checked=this.state.vacation}},
        {ic:'🌙',label:'Toggle thème',fn:()=>this.toggleTheme()},

        {ic:'📄',label:'Exporter stats en PDF',fn:()=>{this.toast('PDF en préparation','info');setTimeout(()=>window.print(),600)}},
      ]},
      {g:'Clients',items:this.state.clients.slice(0,8).map(c=>({ic:'👤',label:c.name,meta:'Score '+c.score,fn:()=>this.openClientCard(c.id)}))},
    ];
    let html = '';
    actions.forEach(group=>{
      const filtered = group.items.filter(i => !q || i.label.toLowerCase().includes(q));
      if (filtered.length) {
        html += `<div class="cp-group"><div class="cp-group-title">${group.g}</div>`;
        filtered.forEach((it,idx)=>{
          html += `<div class="cp-item" onclick='Nx._cpRun(${actions.indexOf(group)},${group.items.indexOf(it)})'><span class="ic">${it.ic}</span><span>${it.label}</span>${it.meta?`<span class="meta">${it.meta}</span>`:''}</div>`;
        });
        html += '</div>';
      }
    });
    this._cpCache = actions;
    document.getElementById('cpResults').innerHTML = html || '<div style="padding:30px;text-align:center;color:var(--muted);font-size:13px">Aucun résultat</div>';
  },
  _cpRun(gi,ii){ this._cpCache[gi].items[ii].fn(); this.closePalette(); },

  globalKeys(e){
    // Ne pas intercepter si user tape dans un input/textarea
    const tag = (e.target.tagName||'').toLowerCase();
    if (tag === 'input' || tag === 'textarea' || e.target.isContentEditable) return;
    if ((e.metaKey || e.ctrlKey) && e.key === 'k'){ e.preventDefault(); this.openPalette(); }
    if (e.key === 'Escape'){ this.closePalette(); this.closeModal(); }
    // Raccourci I = ouvre l'interface principale (pop-up)
    if (e.key === 'i' || e.key === 'I'){ e.preventDefault(); this.openHubOverlay(); }
    // Raccourci H = retour au Nexus Core (Hub)
    if (e.key === 'h' || e.key === 'H'){ e.preventDefault(); this.navigate('dashboard'); }
  },

  openAiChat(){ this.openModal('ai-chat'); },
  // Coach Nexus connecté à /api/claude (priorité Groq Llama 3.3 70B GRATUIT)
  // Augustin 19/05 : "connecte a groq sinon ca va trop couter"
  async askAi(preset){
    const input = document.getElementById('aiInput');
    const q = (preset || (input && input.value.trim()) || '').trim();
    if (!q) return;
    const msgs = document.getElementById('aiMessages');
    if (!msgs) return;
    // Affiche le message user immédiatement
    msgs.innerHTML += `<div class="bubble me">${q}</div>`;
    if (input) input.value = '';
    msgs.scrollTop = msgs.scrollHeight;
    // Indicateur de typing
    const typingId = 'typing_' + Date.now();
    msgs.innerHTML += `<div class="bubble them" id="${typingId}"><span style="opacity:.6">🤖 Nexus réfléchit<span style="display:inline-block;animation:dotsBlink 1.4s infinite">…</span></span></div>`;
    msgs.scrollTop = msgs.scrollHeight;
    // Historique pour contexte (les 6 derniers messages)
    if (!this._aiHistory) this._aiHistory = [];
    this._aiHistory.push({ role:'user', content: q });
    // === FIX Augustin 20/05 : injecter le PROFIL ENTREPRISE RÉEL ===
    // Avant : IA inventait les chiffres (ex: créée 2003 au lieu de 1997)
    // Après : on lui envoie le state.business complet, elle répond avec les VRAIES infos user
    const b = this.state.business || {};
    const ctx = `
[PROFIL ENTREPRISE — utiliser UNIQUEMENT ces données pour répondre, JAMAIS inventer]
Nom : ${b.name || '?'}
Propriétaire : ${b.owner || '?'}
Ville : ${b.city || '?'} ${b.country || ''}
Industrie : ${b.industry || '?'}
Description : ${b.description || '?'}
Historique / dates clés : ${b.dataArchives || '?'}
Équipe / composition : ${b.composition || '?'}
Site web : ${b.webPage || '?'}
Ton de communication : ${b.tone || '?'}
Mode paiement : ${b.payment || '?'}
Livraison : ${b.delivery || '?'}
Catalogue produits : ${(b.catalog||[]).slice(0,15).map(p=>`${p.name} (${p.price} ${p.unit||'CLP'})`).join(', ') || '?'}
FAQ existante : ${(b.faq||[]).slice(0,8).map(f=>`Q: ${f.q} → R: ${f.a}`).join(' | ') || '?'}
[FIN PROFIL]`;
    const fullQuestion = q + ctx;
    try {
      const r = await fetch('/api/claude', {
        method:'POST',
        headers: { 'Content-Type':'application/json' },
        body: JSON.stringify({ question: fullQuestion, history: this._aiHistory.slice(-6) })
      });
      const data = await r.json();
      const answer = data.answer || data.error || '🤖 Réponse vide';
      this._aiHistory.push({ role:'assistant', content: answer });
      // Retire le typing + ajoute la vraie réponse
      const typEl = document.getElementById(typingId);
      if (typEl) typEl.remove();
      const modelTag = data.model ? `<div style="font-size:9.5px;color:var(--muted);margin-top:6px;text-align:right">⚡ ${data.model}</div>` : '';
      msgs.innerHTML += `<div class="bubble them">${answer}${modelTag}</div>`;
      msgs.scrollTop = msgs.scrollHeight;
    } catch(e) {
      const typEl = document.getElementById(typingId);
      if (typEl) typEl.innerHTML = `<span style="color:var(--red)">⚠️ Erreur : ${String(e).slice(0,100)}</span>`;
    }
  },

  // Graphique dynamique selon chartType + chartRange (Augustin 19/05 + 21/05/2026)
  chartSvg(){
    // V5.4 : graphique branché sur les VRAIES données (voir _chartSvgReal). Ancien mock ci-dessous = inerte.
    return this._chartSvgReal();
    const type = this.state.chartType || 'conv';
    const chartRange = this.state.chartRange || '30d';
    const W = 760, H = 220, PAD_BOTTOM = 30;
    // Données mock cohérentes par type
    const datasets = {
      conv:    { values:[145,158,142,170,165,180,195,178,210,205,220,240,235,248,260,255,272,268,285,290,275,295,310,302,318,328,335,342,350,358], color:'#1A56DB', unit:'conv/j', label:'Conversations' },
      seg:     null, // multi-séries en dessous
      resp:    { values:[88,89,87,90,91,89,92,91,93,92,91,93,94,93,94,95,94,93,95,94,94,95,93,94,95,94,95,94,95,94], color:'#22C55E', unit:'%', label:'Taux de réponse' },
      hours:   null, // bars hours of week
      camp:    null, // bars campagnes
      newlost: null  // 2 séries
    };
    // Helper : transforme valeurs → polyline points
    const pts = (vals) => {
      const max = Math.max(...vals);
      const min = Math.min(...vals);
      const range = max - min || 1;
      const innerH = H - PAD_BOTTOM - 20;
      return vals.map((v, i) => {
        const x = (i / (vals.length - 1)) * W;
        const y = 20 + (1 - (v - min) / range) * innerH;
        return [x, y];
      });
    };
    const pathFromPts = (points, closed = false) => {
      if (!points.length) return '';
      let d = `M${points[0][0]},${points[0][1]}`;
      for (let i = 1; i < points.length; i++) {
        const [px, py] = points[i - 1];
        const [x, y] = points[i];
        const cx1 = px + (x - px) * 0.5;
        const cx2 = x - (x - px) * 0.5;
        d += ` C${cx1},${py} ${cx2},${y} ${x},${y}`;
      }
      if (closed) {
        d += ` L${points[points.length - 1][0]},${H - PAD_BOTTOM} L${points[0][0]},${H - PAD_BOTTOM} Z`;
      }
      return d;
    };
    const xLabels = (lbls) => {
      const step = W / (lbls.length - 1);
      return lbls.map((l, i) => `<text x="${Math.max(2, i * step - 8)}" y="${H - 6}" font-family="JetBrains Mono,monospace" font-size="10" fill="#94A3B8">${l}</text>`).join('');
    };
    const yLines = `<g stroke="#F1F5F9" stroke-width="1">
      <line x1="0" y1="50" x2="${W}" y2="50"/>
      <line x1="0" y1="110" x2="${W}" y2="110"/>
      <line x1="0" y1="170" x2="${W}" y2="170"/>
    </g>`;
    // Labels axe X selon période (Augustin 21/05/2026)
    const labelsByRange = {
      '30d':     ['1avr','5','10','15','20','25','30','5mai','10','15','19'],
      'quarter': ['Mar','15 Mar','Avr','15 Avr','Mai','15 Mai','Juin'],
      'all':     ['Jan','Fév','Mar','Avr','Mai','Juin','Juil','Août','Sep','Oct','Nov','Déc']
    };
    const monthLabels = labelsByRange[chartRange] || labelsByRange['30d'];

    // ====== TYPE 1: COURBE SIMPLE (conv, resp) ======
    if (datasets[type] && datasets[type].values) {
      const ds = datasets[type];
      const p = pts(ds.values);
      const id = 'grad_' + type;
      return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px">
        <defs><linearGradient id="${id}" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stop-color="${ds.color}" stop-opacity=".30"/>
          <stop offset="100%" stop-color="${ds.color}" stop-opacity="0"/>
        </linearGradient></defs>
        ${yLines}
        <path d="${pathFromPts(p, true)}" fill="url(#${id})"/>
        <path d="${pathFromPts(p, false)}" fill="none" stroke="${ds.color}" stroke-width="2.5" stroke-linecap="round"/>
        ${p.filter((_,i)=>i%6===0).map(([x,y])=>`<circle cx="${x}" cy="${y}" r="3.5" fill="${ds.color}"/>`).join('')}
        ${xLabels(monthLabels)}
        <text x="${W-90}" y="22" font-family="JetBrains Mono,monospace" font-size="11" fill="${ds.color}" font-weight="700">${ds.values[ds.values.length-1]}${ds.unit==='conv/j'?'':ds.unit}</text>
      </svg>`;
    }

    // ====== TYPE 2: SEGMENTS CLIENTS (multi-courbes empilées) ======
    if (type === 'seg') {
      const series = [
        { name:'VIP',         color:'#F5C45E', values:[8,9,9,10,11,11,12,13,13,14,15,15,16,16,17,17,18,18,19,19,20,21,21,22,22,23,23,24,25,25] },
        { name:'Récurrent',   color:'#1A56DB', values:[42,44,45,48,50,52,55,57,60,62,65,68,70,72,75,77,80,82,85,87,90,93,95,98,100,103,106,108,110,113] },
        { name:'Nouveau',     color:'#22C55E', values:[5,6,8,9,11,12,14,15,17,18,20,22,23,25,27,28,30,31,33,34,36,38,39,41,42,44,45,47,48,50] },
        { name:'Business',    color:'#7A3CFF', values:[3,3,4,4,5,5,6,7,7,8,8,9,10,10,11,11,12,13,13,14,14,15,16,16,17,17,18,19,19,20] },
        { name:'Occasionnel', color:'#F59E0B', values:[30,31,29,32,30,31,33,32,34,33,35,34,36,35,37,36,38,37,39,38,40,39,41,40,42,41,43,42,44,43] },
        { name:'Perdu',       color:'#EF4444', values:[12,12,13,13,14,14,15,15,16,16,17,17,18,18,19,19,20,20,21,21,22,22,23,23,24,24,25,25,26,26] }
      ];
      const allMax = Math.max(...series.flatMap(s=>s.values));
      const innerH = H - PAD_BOTTOM - 20;
      const xy = (v, i, n) => [ (i/(n-1))*W, 20 + (1 - v/allMax) * innerH ];
      const lines = series.map(s => {
        const p = s.values.map((v,i)=>xy(v,i,s.values.length));
        return `<path d="${pathFromPts(p, false)}" fill="none" stroke="${s.color}" stroke-width="2" stroke-linecap="round" stroke-opacity=".85"/>`;
      }).join('');
      const legend = series.map((s,i)=>`<g transform="translate(${i*110},0)">
        <rect width="10" height="10" fill="${s.color}" rx="2"/>
        <text x="14" y="9" font-family="Inter,sans-serif" font-size="11" fill="#475569" font-weight="600">${s.name}</text>
      </g>`).join('');
      return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px">
        ${yLines}
        ${lines}
        ${xLabels(monthLabels)}
        <g transform="translate(8,4)">${legend}</g>
      </svg>`;
    }

    // ====== TYPE 3: BEST HOURS (barres heures de semaine) ======
    if (type === 'hours') {
      // 24 heures, intensité variable, pic vendredi 19-21h simulé via barres globales
      const hours = [0,0,0,1,2,4,8,15,22,28,30,28,25,22,20,18,22,30,42,55,65,52,30,12];
      const max = Math.max(...hours);
      const bw = W / hours.length;
      const innerH = H - PAD_BOTTOM - 20;
      const bars = hours.map((v,i) => {
        const h = (v/max) * innerH;
        const x = i * bw + 2;
        const y = 20 + innerH - h;
        const intensity = v/max;
        const fill = intensity > .7 ? '#EF4444' : intensity > .4 ? '#F59E0B' : intensity > .15 ? '#3B82F6' : '#CBD5E1';
        return `<rect x="${x}" y="${y}" width="${bw-4}" height="${h}" fill="${fill}" rx="3"><title>${i}h : ${v} messages</title></rect>`;
      }).join('');
      const hourLabels = [0,3,6,9,12,15,18,21].map(h => `<text x="${h*bw + bw/2 - 8}" y="${H-6}" font-family="JetBrains Mono,monospace" font-size="10" fill="#94A3B8">${h}h</text>`).join('');
      return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px">
        ${yLines}
        ${bars}
        ${hourLabels}
        <text x="${W-180}" y="22" font-family="Inter,sans-serif" font-size="11" fill="#EF4444" font-weight="700">🔥 Pic vendredi 19-21h</text>
      </svg>`;
    }

    // ====== TYPE 4: CAMPAGNES (barres horizontales taux d'ouverture) ======
    if (type === 'camp') {
      const camps = [
        { name:'Promo Pâques',           open:78, color:'#22C55E' },
        { name:'Recup -15% VIP',         open:64, color:'#1A56DB' },
        { name:'Newsletter Avril',       open:52, color:'#7A3CFF' },
        { name:'Lancement nouveaux pains', open:71, color:'#F59E0B' },
        { name:'Mère Fête',              open:58, color:'#EF4444' },
        { name:'Anniversaire boutique',  open:82, color:'#F5C45E' }
      ];
      const rowH = (H - 30) / camps.length;
      const innerW = W - 200;
      const rows = camps.map((c,i) => {
        const y = i * rowH + 8;
        const bw = (c.open/100) * innerW;
        return `<g transform="translate(0,${y})">
          <text x="0" y="${rowH/2 + 4}" font-family="Inter,sans-serif" font-size="11.5" fill="#334155" font-weight="600">${c.name}</text>
          <rect x="160" y="${rowH/2 - 8}" width="${innerW}" height="16" fill="#F1F5F9" rx="8"/>
          <rect x="160" y="${rowH/2 - 8}" width="${bw}" height="16" fill="${c.color}" rx="8"/>
          <text x="${160 + bw + 6}" y="${rowH/2 + 4}" font-family="JetBrains Mono,monospace" font-size="11" fill="${c.color}" font-weight="700">${c.open}%</text>
        </g>`;
      }).join('');
      return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px">${rows}</svg>`;
    }

    // ====== TYPE 5: NOUVEAUX VS PERDUS (2 courbes) ======
    if (type === 'newlost') {
      const newcl  = [3,4,5,4,6,5,7,6,8,7,9,8,10,9,11,10,12,11,13,12,14,13,15,14,16,15,17,16,18,17];
      const lost   = [2,2,3,2,3,2,3,2,3,2,2,3,2,3,2,3,2,3,2,3,2,2,3,2,3,2,2,3,2,2];
      const max = Math.max(...newcl, ...lost);
      const innerH = H - PAD_BOTTOM - 20;
      const xy = (v,i,n) => [ (i/(n-1))*W, 20 + (1 - v/max) * innerH ];
      const pNew  = newcl.map((v,i)=>xy(v,i,newcl.length));
      const pLost = lost.map((v,i)=>xy(v,i,lost.length));
      return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px">
        <defs>
          <linearGradient id="g_new" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#22C55E" stop-opacity=".25"/><stop offset="100%" stop-color="#22C55E" stop-opacity="0"/></linearGradient>
        </defs>
        ${yLines}
        <path d="${pathFromPts(pNew, true)}" fill="url(#g_new)"/>
        <path d="${pathFromPts(pNew, false)}" fill="none" stroke="#22C55E" stroke-width="2.5"/>
        <path d="${pathFromPts(pLost, false)}" fill="none" stroke="#EF4444" stroke-width="2.5" stroke-dasharray="5 4"/>
        ${xLabels(monthLabels)}
        <g transform="translate(${W-220},4)">
          <rect width="10" height="10" fill="#22C55E" rx="2"/><text x="14" y="9" font-family="Inter,sans-serif" font-size="11" fill="#475569" font-weight="600">Nouveaux (+${newcl.reduce((a,b)=>a+b,0)})</text>
          <rect y="16" width="10" height="10" fill="#EF4444" rx="2"/><text x="14" y="25" font-family="Inter,sans-serif" font-size="11" fill="#475569" font-weight="600">Perdus (-${lost.reduce((a,b)=>a+b,0)})</text>
        </g>
      </svg>`;
    }

    // Fallback : conv
    return this.chartSvg.call({ state: { chartType: 'conv' }, chartSvg: this.chartSvg });
  },

  // Génère 5 nouvelles suggestions de FAQ via Groq, basées sur le contexte business
  // Augustin 19/05 : "il faut ajouter un bouton pour générer des suggestions aussi"
  async generateFaqSuggestions(){
    const btn = document.getElementById('genFaqBtn');
    if (btn) { btn.disabled = true; btn.textContent = '⏳ Génération en cours…'; }
    const b = this.state.business || {};
    const existingFaqs = (b.faq||[]).map(f => f.q).slice(0, 10).join(' | ');
    const prompt = `Tu es expert en service client pour une PME. Pour ${b.name||'cette entreprise'} (${b.industry||'commerce'}, ${b.city||'Santiago'}), génère 5 NOUVELLES questions fréquentes pertinentes que des clients pourraient poser (différentes de celles déjà existantes).

Contexte entreprise :
- Description : ${(b.description||'').slice(0,250)}
- Catalogue principal : ${(b.catalog||[]).slice(0,5).map(p=>p.name).join(', ')}
- FAQ déjà couvertes (ne pas dupliquer) : ${existingFaqs}

Réponds en espagnol (clients chiliens). Format STRICT JSON uniquement, pas de texte autour :
{"suggestions":[{"q":"question 1","a":"réponse courte 1-2 phrases"},{"q":"question 2","a":"réponse"},...]}

Génère 5 suggestions variées et utiles. Réponses courtes, naturelles, ton chaleureux.`;
    try {
      const r = await fetch('/api/claude', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ question: prompt })
      });
      const data = await r.json();
      const raw = data.answer || '';
      // Tente de parser le JSON depuis la réponse
      let suggestions = [];
      try {
        const match = raw.match(/\{[\s\S]*\}/);
        if (match) {
          const parsed = JSON.parse(match[0]);
          suggestions = parsed.suggestions || [];
        }
      } catch(e) {
        // Fallback : tente regex sur Q: / R: ou question/réponse
        const lines = raw.split(/\n+/);
        let curQ = null;
        for (const line of lines) {
          const qMatch = line.match(/(?:^|^\d+\.\s*)(?:Q[:.]\s*|question\s*:?\s*|¿)(.+?)(?:\?|$)/i);
          if (qMatch) { curQ = qMatch[1].trim() + '?'; continue; }
          if (curQ && line.trim()) { suggestions.push({ q: curQ, a: line.trim() }); curQ = null; }
        }
      }
      if (!suggestions.length) {
        this.toast('⚠️ Aucune suggestion générée','warn','Réponse IA non parsable, réessaie');
        if (btn) { btn.disabled = false; btn.textContent = '✨ Générer des suggestions'; }
        return;
      }
      // Limite à 5 + ajoute des IDs uniques
      const newSuggestions = suggestions.slice(0, 5).map((s, idx) => ({
        id: 'ai_' + Date.now() + '_' + idx,
        q: s.q || '',
        a: s.a || ''
      })).filter(s => s.q && s.a);
      // Append aux existantes (ou remplace selon préférence — ici append)
      const existing = this.state.faqSuggestions || [];
      this.state.faqSuggestions = [...newSuggestions, ...existing].slice(0, 12); // max 12
      this.save();
      this.toast(`✨ ${newSuggestions.length} suggestion(s) générée(s)`,'success','Adopte ou élimine selon ton choix');
      this.renderView();
    } catch(e) {
      this.toast('Erreur génération','warn', String(e).slice(0,80));
      if (btn) { btn.disabled = false; btn.textContent = '✨ Générer des suggestions'; }
    }
  },

  // POINT PROFIL PERSO (b) — Upload PDF/archives + liste avec retrait
  // Fix Augustin 19/05 : "il faut pouvoir visualiser les pdf"
  // Lit le file en base64 + stocke dans state.profilePdfs[i].dataUrl
  uploadProfilePdf(){
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.pdf,.doc,.docx,.zip,.txt,.xls,.xlsx,.png,.jpg,.jpeg';
    input.multiple = true;
    input.onchange = (e) => {
      const files = Array.from(e.target.files || []);
      if (!files.length) return;
      if (!this.state.profilePdfs) this.state.profilePdfs = [];
      let processed = 0, tooBig = 0;
      files.forEach(file => {
        // Limite 4 Mo par fichier (localStorage ~5-10 Mo total)
        if (file.size > 4 * 1024 * 1024) {
          tooBig++;
          processed++;
          if (processed === files.length) {
            this.save(); this.renderView();
            if (tooBig === files.length) this.toast('⚠️ Tous les fichiers > 4 Mo','warn','Compresse-les avant');
            else this.toast(`📎 ${files.length-tooBig} ajouté(s)`,'success',`${tooBig} ignoré(s) (> 4 Mo)`);
          }
          return;
        }
        const reader = new FileReader();
        reader.onload = (ev) => {
          const sizeKb = Math.round(file.size / 1024);
          this.state.profilePdfs.push({
            id: Date.now() + Math.random(),
            name: file.name,
            type: file.type,
            size: sizeKb < 1024 ? sizeKb + ' Ko' : (sizeKb/1024).toFixed(1) + ' Mo',
            date: new Date().toLocaleDateString('fr-FR'),
            dataUrl: ev.target.result // base64 pour visualisation
          });
          processed++;
          if (processed === files.length) {
            try {
              this.save();
            } catch(err) {
              // localStorage plein : retire les data et garde juste métadonnées
              this.state.profilePdfs.forEach(p => { if (p.dataUrl) delete p.dataUrl; });
              this.save();
              this.toast('⚠️ Stockage plein','warn','Métadonnées gardées, visualisation indisponible');
              this.renderView();
              return;
            }
            this.renderView();
            this.toast(`📎 ${files.length-tooBig} document(s) ajouté(s)`,'success', files.map(f=>f.name).join(', ').slice(0,80));
          }
        };
        reader.readAsDataURL(file);
      });
    };
    input.click();
  },

  // Ouvre le PDF/image dans un nouvel onglet (utilise le dataUrl base64)
  viewProfilePdf(i){
    const pdf = (this.state.profilePdfs||[])[i];
    if (!pdf) return;
    if (!pdf.dataUrl) {
      this.toast('Visualisation indisponible','warn','Ce fichier n\'a pas de contenu stocké (ré-importe-le)');
      return;
    }
    // PDF et images : ouvrir dans nouvel onglet
    const win = window.open();
    if (!win) {
      this.toast('Popup bloquée','warn','Autorise les popups pour visualiser');
      return;
    }
    const isImg = /^image\//.test(pdf.type) || /\.(png|jpg|jpeg|gif|webp)$/i.test(pdf.name);
    const isPdf = pdf.type === 'application/pdf' || /\.pdf$/i.test(pdf.name);
    if (isImg) {
      win.document.write(`<!DOCTYPE html><html><head><title>${pdf.name}</title><style>body{margin:0;background:#0F172A;display:flex;align-items:center;justify-content:center;min-height:100vh}img{max-width:100%;max-height:100vh;object-fit:contain}</style></head><body><img src="${pdf.dataUrl}" alt="${pdf.name}"></body></html>`);
    } else if (isPdf) {
      win.document.write(`<!DOCTYPE html><html><head><title>${pdf.name}</title><style>body,html{margin:0;height:100%}iframe{width:100%;height:100vh;border:0}</style></head><body><iframe src="${pdf.dataUrl}"></iframe></body></html>`);
    } else {
      // Téléchargement direct pour autres formats
      const a = document.createElement('a');
      a.href = pdf.dataUrl;
      a.download = pdf.name;
      a.click();
      win.close();
      this.toast('💾 Téléchargement lancé','success',pdf.name);
    }
  },

              conv = { clientId: r.clientId, channel: (r.channel||'whatsapp').toLowerCase(), unread: false, messages: [], draft: null };

            conv.messages.push({ from:'me', text: r.text, time: 'À l\'instant', viaPopup: true });

  // Suggestions IA fonctionnelles
  suggestAiReply(clientId){
    const conv = this.state.conversations.find(c=>c.clientId===clientId);
    const c = this.state.clients.find(x=>x.id===clientId);
    const lastMsg = conv.messages[conv.messages.length-1].text.toLowerCase();
    let suggestion = '';
    if (lastMsg.includes('hora') || lastMsg.includes('horario')) {
      suggestion = `Hola ${c.name.split(' ')[0]}! Estamos abiertos lunes a sábado de 7h a 20h. Domingo cerrado. ¿Te puedo guardar algo? 🥖`;
    } else if (lastMsg.includes('precio') || lastMsg.includes('cuánto') || lastMsg.includes('cuanto')) {
      suggestion = `Hola ${c.name.split(' ')[0]}! Te paso los precios actuales : pan amasado 3 500 CLP/kg, empanadas 2 200 CLP, tortas desde 28 000 CLP. ¿Algo te interesa?`;
    } else if (lastMsg.includes('delivery') || lastMsg.includes('entrega')) {
      suggestion = `Sí ${c.name.split(' ')[0]}, hacemos delivery gratis sobre 15 000 CLP en Providencia y Santiago centro. ¿Dónde te lo enviamos?`;
    } else if (lastMsg.includes('gracias') || lastMsg.includes('merci')) {
      suggestion = `¡A ti ${c.name.split(' ')[0]}! Cualquier cosa estoy aquí. Buen día 💛`;
    } else {
      suggestion = `Hola ${c.name.split(' ')[0]}! Gracias por tu mensaje 😊 ¿En qué te puedo ayudar hoy?`;
    }
    document.getElementById('chatInputField').value = suggestion;
    this.toast('✨ Suggestion IA prête','success','Modifie ou envoie tel quel');
  },

  createDraft(clientId){
    const conv = this.state.conversations.find(c=>c.clientId===clientId);
    const c = this.state.clients.find(x=>x.id===clientId);
    conv.draft = `Hola ${c.name.split(' ')[0]} 👋 Brouillon généré par l'IA basé sur ton ton "${this.state.business.tone.split(',')[0]}". Modifie-moi avant d'envoyer.`;
    this.save();
    this.renderView();
    this.toast('📝 Brouillon créé','success');
  },

  // Vraie traduction du dernier message — multi-langues (Augustin 19/05/2026)
  async translateMsg(clientId, targetLangOverride){
    const conv = this.state.conversations.find(c=>c.clientId===clientId);
    if (!conv || !conv.messages || !conv.messages.length) return this.toast('Aucun message à traduire','error');
    const lastMsg = conv.messages[conv.messages.length-1];
    const sourceLang = 'es';
    let savedTarget = null;
    try { savedTarget = localStorage.getItem('nx_translate_target'); } catch(e){}
    const targetLang = targetLangOverride || savedTarget || (this.state.lang === 'es' ? 'fr' : this.state.lang) || 'fr';
    try { localStorage.setItem('nx_translate_target', targetLang); } catch(e){}
    const LANG_OPTS = [
      {k:'fr',f:'🇫🇷',l:'Français'},{k:'en',f:'🇬🇧',l:'English'},{k:'es',f:'🇨🇱',l:'Español'},
      {k:'pt',f:'🇧🇷',l:'Português'},{k:'it',f:'🇮🇹',l:'Italiano'},{k:'de',f:'🇩🇪',l:'Deutsch'},
      {k:'nl',f:'🇳🇱',l:'Nederlands'},{k:'ja',f:'🇯🇵',l:'日本語'},{k:'zh',f:'🇨🇳',l:'中文'}
    ];
    const flagOf = (k) => (LANG_OPTS.find(o=>o.k===k)||{f:'',l:k}).f + ' ' + (LANG_OPTS.find(o=>o.k===k)||{l:k}).l;
    const langSwitcher = LANG_OPTS.filter(o=>o.k!==sourceLang).map(o =>
      `<button onclick="Nx.translateMsg(${clientId},'${o.k}')" style="padding:5px 10px;font-size:11.5px;font-weight:600;border-radius:8px;border:1px solid ${o.k===targetLang?'var(--blue)':'var(--line)'};background:${o.k===targetLang?'var(--blue)':'var(--bg2)'};color:${o.k===targetLang?'#fff':'var(--ink2)'};cursor:pointer">${o.f} ${o.l}</button>`
    ).join('');
    this.openModal('translation');
    const mc = document.getElementById('modal-content');
    const renderShell = (innerBody) => `
      <div class="modal-hd"><h3>🌐 Traduction du dernier message</h3><button class="modal-close" onclick="Nx.closeModal()">✕</button></div>
      <div class="modal-body" style="max-height:70vh;overflow-y:auto">
        <div style="margin-bottom:14px"><div style="font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;font-weight:700">Traduire vers</div><div style="display:flex;flex-wrap:wrap;gap:6px">${langSwitcher}</div></div>
        ${innerBody}
      </div>
      <div class="modal-foot"><button class="btn btn-p" onclick="Nx.closeModal()">OK</button></div>`;
    mc.innerHTML = renderShell(`<div style="text-align:center;padding:30px;color:var(--muted)"><div style="font-size:24px;margin-bottom:8px">⏳</div>Traduction en cours via Claude…</div>`);
    try {
      const r = await fetch('/api/translate', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ texts: [lastMsg.text], target: targetLang, source: sourceLang })
      });
      const data = await r.json();
      const translated = (data.translations && data.translations[0]) || lastMsg.text;
      const body = `
        <div style="margin-bottom:14px"><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">${flagOf(sourceLang)} (original)</div><div style="padding:12px 14px;background:var(--bg2);border-radius:8px;font-size:13.5px">${lastMsg.text}</div></div>
        <div><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">${flagOf(targetLang)} (auto)</div><div style="padding:12px 14px;background:var(--blue-soft);border-radius:8px;font-size:13.5px;color:var(--blue-ink)">${translated}</div></div>
        <div style="margin-top:10px;font-size:10px;color:var(--muted);text-align:right">${data.model||''}</div>`;
      mc.innerHTML = renderShell(body);
    } catch(e) {
      mc.innerHTML = renderShell(`<div style="padding:30px;text-align:center;color:var(--red)">❌ Erreur : ${String(e).slice(0,100)}</div>`);
    }
  },

  // Augustin 28/05/2026 : Instagram vraiment ajoutable sans devoir basculer toute la fiche en édition
  _normalizeIg(raw){
    let h = String(raw||'').trim();
    if (!h) return '';
    h = h.replace(/^https?:\/\/(www\.)?instagram\.com\//i, '').replace(/\/.*$/, '');
    if (!h.startsWith('@')) h = '@' + h;
    return h;
  },
  addInstagramInline(clientId){
    const c = this.state.clients.find(x=>x.id===clientId);
    if (!c) return;
    const input = document.getElementById('igAddInput_'+clientId);
    if (!input) return;
    const h = this._normalizeIg(input.value);
    if (!h || h === '@') { input.focus(); return this.toast('Saisis un handle Instagram','warn'); }
    c.instagram = h;
    this.save();
    this.openModal('client-v2', c);
    this.toast('✓ Instagram ajouté','success', h + ' lié à ' + c.name);
  },
  promptInstagram(clientId){
    const c = this.state.clients.find(x=>x.id===clientId);
    if (!c) return;
    const cur = c.instagram || '';
    const raw = window.prompt('Compte Instagram de ' + c.name + ' (handle ou URL)', cur);
    if (raw === null) return;
    const h = this._normalizeIg(raw);

  // Vraie traduction des 5 derniers messages — multi-langues (FR/ES/EN/PT/IT/DE/+)
  // Augustin 19/05/2026 : "il faut aussi en anglais et en plusieurs langues"
  async translateConv(clientId, targetLangOverride){
    const conv = this.state.conversations.find(c => c.clientId === clientId);
    if (!conv || !conv.messages || !conv.messages.length) return this.toast('Aucun message à traduire','error');
    const sourceLang = 'es';
    // Langue cible : override (clic sur switcher) > localStorage > langue app > FR
    let savedTarget = null;
    try { savedTarget = localStorage.getItem('nx_translate_target'); } catch(e){}
    const targetLang = targetLangOverride || savedTarget || (this.state.lang === 'es' ? 'fr' : this.state.lang) || 'fr';
    try { localStorage.setItem('nx_translate_target', targetLang); } catch(e){}
    const lastMsgs = conv.messages.slice(-5);
    const cl = (this.state.clients||[]).find(x=>x.id===clientId)||{};
    const LANG_OPTS = [
      {k:'fr',f:'🇫🇷',l:'Français'},{k:'en',f:'🇬🇧',l:'English'},{k:'es',f:'🇨🇱',l:'Español'},
      {k:'pt',f:'🇧🇷',l:'Português'},{k:'it',f:'🇮🇹',l:'Italiano'},{k:'de',f:'🇩🇪',l:'Deutsch'},
      {k:'nl',f:'🇳🇱',l:'Nederlands'},{k:'ja',f:'🇯🇵',l:'日本語'},{k:'zh',f:'🇨🇳',l:'中文'}
    ];
    const langSwitcher = LANG_OPTS.filter(o=>o.k!==sourceLang).map(o =>
      `<button onclick="Nx.translateConv(${clientId},'${o.k}')" style="padding:5px 10px;font-size:11.5px;font-weight:600;border-radius:8px;border:1px solid ${o.k===targetLang?'var(--blue)':'var(--line)'};background:${o.k===targetLang?'var(--blue)':'var(--bg2)'};color:${o.k===targetLang?'#fff':'var(--ink2)'};cursor:pointer;transition:all .15s">${o.f} ${o.l}</button>`
    ).join('');
    this.openModal('translation');
    const mc = document.getElementById('modal-content');
    const renderShell = (innerBody) => `
      <div class="modal-hd"><h3>🌐 Traduction · ${cl.name||'Client'}</h3><button class="modal-close" onclick="Nx.closeModal()">✕</button></div>
      <div class="modal-body" style="max-height:70vh;overflow-y:auto">
        <div style="margin-bottom:14px"><div style="font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;font-weight:700">Traduire vers</div><div style="display:flex;flex-wrap:wrap;gap:6px">${langSwitcher}</div></div>
        ${innerBody}
      </div>
      <div class="modal-foot"><button class="btn btn-s" onclick="Nx.closeModal()">Fermer</button></div>`;
    mc.innerHTML = renderShell(`<div style="text-align:center;padding:40px;color:var(--muted)"><div style="font-size:24px;margin-bottom:8px">⏳</div>Traduction en cours via Claude…</div>`);
    try {
      const r = await fetch('/api/translate', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ texts: lastMsgs.map(m=>m.text), target: targetLang, source: sourceLang })
      });
      const data = await r.json();
      const translations = data.translations || lastMsgs.map(m=>m.text);
      const flagOf = (k) => (LANG_OPTS.find(o=>o.k===k)||{f:'',l:k}).f + ' ' + (LANG_OPTS.find(o=>o.k===k)||{l:k}).l;
      const body = `
        <div style="font-size:11px;color:var(--muted);margin-bottom:12px">${flagOf(sourceLang)} → ${flagOf(targetLang)} · ${data.model||''}</div>
        ${lastMsgs.map((m,i)=>`
          <div style="margin-bottom:14px;padding:12px 14px;border:1px solid var(--line);border-radius:10px">
            <div style="font-size:11px;color:var(--muted);margin-bottom:4px">${m.from==='client'?'👤 '+(cl.name||'Client'):'🥖 Toi'} · ${m.time||''}</div>
            <div style="font-size:13px;margin-bottom:8px;color:var(--ink)">${m.text}</div>
            <div style="font-size:13px;padding:8px 10px;background:var(--blue-soft);border-radius:6px;color:var(--blue-ink)"><b style="font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--blue);display:block;margin-bottom:3px">${flagOf(targetLang)}</b>${translations[i]||m.text}</div>
          </div>
        `).join('')}`;
      mc.innerHTML = renderShell(body);
    } catch (e) {
      mc.innerHTML = renderShell(`<div style="padding:30px;text-align:center;color:var(--red)">❌ Erreur de traduction : ${String(e).slice(0,100)}</div>`);
    }
  },

  confirmDeleteClient(id, ev){
    if (ev) ev.stopPropagation();
    const c = this.state.clients.find(x => x.id === id);
    if (!c) return;
    if (!confirm(`Éliminer ${c.name} du CRM ?\n\nNexus se trompe parfois. Tu peux retirer ce client si ce n'en est pas un (ex : ta mère, un fournisseur, une erreur).\n\nL'historique sera conservé 30 jours en cas de regret.`)) return;
    this.state.clients = this.state.clients.filter(x => x.id !== id);
    this.save();
    this.renderView();
    this.toast(`✓ ${c.name} retiré du CRM`, 'success', 'Tu peux le restaurer dans Paramètres > Corbeille pendant 30 jours');

  saveMeeting(){
    const client = (document.getElementById('mtgClient')||{}).value || '';
    const dateStr = (document.getElementById('mtgDate')||{}).value || '';
    const timeStr = (document.getElementById('mtgTime')||{}).value || '10:00';
    const place = (document.getElementById('mtgPlace')||{}).value || '';
    const topic = (document.getElementById('mtgTopic')||{}).value || '';
    if (!client || !dateStr) {
      this.toast('Client + date requis','warn');
      return;
    }
    if (!this.state.meetings) this.state.meetings = [];
    const newMeeting = {
      id: Date.now(),
      dateISO: dateStr + 'T' + timeStr,
      client, place, topic
    };
    this.state.meetings.push(newMeeting);
    this.save();
    this.closeModal();
    this.toast('✓ Réunion ajoutée','success', `${client} · ${dateStr} ${timeStr}`);
    this.renderView();

    setTimeout(() => {

        this.openMeetingInCalendar(newMeeting.id);

  // Ouvre Google Calendar (vraie URL) avec l'event pré-rempli
  openMeetingInCalendar(id){
    const m = (this.state.meetings||[]).find(x => x.id === id);
    if (!m) return;
    // Format Google Calendar : YYYYMMDDTHHMMSS
    const start = new Date(m.dateISO);
    const end = new Date(start.getTime() + 60 * 60 * 1000); // +1h
    const fmt = (d) => d.toISOString().replace(/[-:]/g,'').replace(/\.\d{3}/,'');
    const params = new URLSearchParams({
      action: 'TEMPLATE',
      text: `${m.client} — ${m.topic||'Réunion'}`,
      dates: `${fmt(start)}/${fmt(end)}`,
      details: `Réunion programmée via Nexus.\n\nClient: ${m.client}\nSujet: ${m.topic||'—'}\nLieu: ${m.place||'—'}`,
      location: m.place || ''
    });
    const url = 'https://calendar.google.com/calendar/u/0/r/eventedit?' + params.toString();
    window.open(url, '_blank', 'noopener');
    this.toast('📅 Google Calendar ouvert','success','Vérifie l\'onglet ouvert');
  },

  deleteMeeting(id){
    if (!confirm('Supprimer cette réunion ?')) return;
    this.state.meetings = (this.state.meetings||[]).filter(m => m.id !== id);
    this.save();
    this.renderView();
    this.toast('🗑 Réunion supprimée','info');
  },

  saveNewClient(){

  exportCsvDo(){
    const filter = document.getElementById('csvFilter').value;
    const fmt = this.state._csvFmt || 'excel';
    let list = this.state.clients;
    if (filter === 'vip') list = list.filter(c=>c.tags.includes('VIP'));
    else if (filter === 'lost') list = list.filter(c=>c.status==='lost');
    else if (filter === 'rec') list = list.filter(c=>c.tag==='rec');
    else if (filter === 'occ') list = list.filter(c=>c.tag==='');
    else if (filter === 'biz') list = list.filter(c=>c.tag==='biz');
    else if (filter === 'new') list = list.filter(c=>c.tag==='new'||c.status==='prospect');

    const headers = ['Nom','Téléphone','Email','Score','Commandes','Total CLP','Statut','Dernière interaction'];
    const rows = list.map(c=>[c.name, c.phone, c.email||'', c.score, c.orders, c.spent, c.status, c.lastSeen]);
    const csv = [headers.join(','), ...rows.map(r=>r.map(x=>`"${(''+x).replace(/"/g,'""')}"`).join(','))].join('\n');
    const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `nexus-clients-${filter}-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    this.closeModal();
    this.toast('✓ '+list.length+' clients exportés', 'success', fmt === 'sheet' ? 'Importez ce fichier dans Google Sheets' : 'CSV téléchargé');

  async askCrmAi(preset){
    const input = document.getElementById('crmAiInput');
    const q = (preset || (input && input.value.trim()) || '').trim();
    if (!q) return;
    const msgs = document.getElementById('crmAiMessages');
    if (!msgs) return;
    // Message user
    msgs.innerHTML += `<div class="crmai-bubble me">${q}</div>`;
    if (input) input.value = '';
    msgs.scrollTop = msgs.scrollHeight;
    // Typing indicator
    const typId = 'typ_' + Date.now();
    msgs.innerHTML += `<div class="crmai-bubble them" id="${typId}"><span style="opacity:.6">🤖 Analyse de ta base CRM en cours…</span></div>`;
    msgs.scrollTop = msgs.scrollHeight;
    // Construit le contexte CRM résumé (pas tout, mais l'essentiel)
    const clients = this.state.clients || [];
    const summary = {
      total: clients.length,
      actifs: clients.filter(c=>c.status==='active').length,
      perdus: clients.filter(c=>c.status==='lost').length,
      prospects: clients.filter(c=>c.status==='prospect').length,
      vip: clients.filter(c=>c.tags && c.tags.includes('VIP')).length,
      ca_total: clients.reduce((s,c)=>s+(c.spent||0),0),
      top5_ca: clients.slice().sort((a,b)=>(b.spent||0)-(a.spent||0)).slice(0,5).map(c=>({nom:c.name,ca:c.spent,commandes:c.orders,score:c.score,tags:c.tags||[]})),
      a_relancer: clients.filter(c=>c.status==='lost').slice(0,5).map(c=>({nom:c.name,ex_ca:c.spent,derniere:c.lastSeen}))
    };
    const corrections = (this.state.crmCorrections || []).slice(-5);
    const ctx = `\n\n[CONTEXTE CRM RÉEL - utilise UNIQUEMENT ces données pour répondre]\n${JSON.stringify(summary, null, 2)}\n${corrections.length ? `\n[CORRECTIONS APPRISES de l'utilisateur, à respecter]\n${corrections.map(c=>`- Q: ${c.question} → Correction: ${c.userCorrection}`).join('\n')}` : ''}`;
    try {
      const r = await fetch('/api/claude', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ question: q + ctx, history: [] })
      });
      const data = await r.json();
      const answer = data.answer || data.error || '🤖 Réponse vide';
      const typEl = document.getElementById(typId);
      if (typEl) typEl.remove();
      // Actions inline : Corriger + Créer campagne (si relance) + Voir clients (si liste)
      const isRelanceQ = /relance|perdu|silence|inactif/i.test(q);

        `<button class="crmai-act" onclick="Nx.copyToClipboard(${JSON.stringify(answer).replace(/"/g,'&quot;')})">📋 Copier</button>`

  // ============================================================
  // V5.4 — STATISTIQUES RÉELLES (calculées depuis les données Supabase synchronisées)
  // Aucune donnée inventée : si pas de données -> 0 / vide. Tout en try/catch.
  // ============================================================
  _statsCompute(range){
    try {
      const days = range==='7d'?7 : range==='30d'?30 : range==='90d'?90 : null;
      const cutoff = days ? Date.now() - days*86400000 : 0;
      const convs = this.state.conversations || [];
      const clients = this.state.clients || [];
      const inRange = (ts) => { if(!ts) return false; const t=new Date(ts).getTime(); return !isNaN(t) && (!days || t>=cutoff); };
      let msgs = [];
      convs.forEach(c => (c.messages||[]).forEach(m => { if(m.ts){ const t=new Date(m.ts).getTime(); if(!isNaN(t) && (!days || t>=cutoff)) msgs.push({from:m.from, text:m.text||'', t}); } }));
      msgs.sort((a,b)=>a.t-b.t);
      const them = msgs.filter(m=>m.from==='them');
      const replies = msgs.filter(m=>m.from!=='them');
      const convActive = convs.filter(c => (c.messages||[]).some(m=>inRange(m.ts))).length;
      const newClients = clients.filter(c => inRange(c.createdAt)).length;
      const responseRate = them.length ? Math.round(replies.length/them.length*100) : null;
      let deltas=[];
      convs.forEach(c=>{ const ms=(c.messages||[]).filter(m=>m.ts).map(m=>({from:m.from,t:new Date(m.ts).getTime()})).filter(m=>!isNaN(m.t)).sort((a,b)=>a.t-b.t); for(let i=0;i<ms.length;i++){ if(ms[i].from==='them'){ for(let j=i+1;j<ms.length;j++){ if(ms[j].from!=='them'){ const dl=ms[j].t-ms[i].t; if(dl>=0 && dl<86400000 && (!days||ms[j].t>=cutoff)) deltas.push(dl); break; } } } } });
      const avgRespMin = deltas.length ? Math.round(deltas.reduce((a,b)=>a+b,0)/deltas.length/60000) : null;
      const slot={}; them.forEach(m=>{ const d=new Date(m.t); const k=d.getDay()+'_'+d.getHours(); slot[k]=(slot[k]||0)+1; });
      let top=null; Object.entries(slot).forEach(([k,n])=>{ if(!top||n>top.n) top={k,n}; });
      let peak=null; if(top){ const J=['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi']; const parts=top.k.split('_').map(Number); peak={day:J[parts[0]],hour:parts[1],n:top.n}; }
      const hourBuckets=Array(24).fill(0); them.forEach(m=>hourBuckets[new Date(m.t).getHours()]++);
      const freq={}; them.forEach(m=>{ const disp=(m.text||'').trim().replace(/\s+/g,' ').slice(0,90); if(!disp) return; const k=disp.toLowerCase(); if(!freq[k]) freq[k]={c:0,disp}; freq[k].c++; });
      const topQuestions=Object.values(freq).sort((a,b)=>b.c-a.c).slice(0,5).map(o=>({q:o.disp,count:o.c}));
      const dayMap={}; msgs.forEach(m=>{ const key=new Date(m.t).toISOString().slice(0,10); dayMap[key]=(dayMap[key]||0)+1; });
      const dayKeys=Object.keys(dayMap).sort();
      return { convActive, msgCount:msgs.length, thems:them.length, replies:replies.length, newClients, responseRate, avgRespMin, peak, hourBuckets, topQuestions, convPerDay:dayKeys.map(k=>dayMap[k]), dayLabels:dayKeys.map(k=>k.slice(5)), hasData:(msgs.length>0||clients.length>0), hasMsg:msgs.length>0 };
    } catch(e){ return { error:String(e), convActive:0, newClients:0, responseRate:null, avgRespMin:null, peak:null, hourBuckets:[], topQuestions:[], convPerDay:[], dayLabels:[], hasData:false, hasMsg:false }; }
  },
  _statsSegDefs(){
    return [
      {l:'VIP', c:'#F5C45E', test:c=>(c.tags||[]).some(x=>String(x).toLowerCase()==='vip')},
      {l:'Récurrents', c:'#1A56DB', test:c=>c.tag==='rec' || (c.tags||[]).some(x=>/recurr/i.test(String(x)))},
      {l:'Business', c:'#7A3CFF', test:c=>(c.tags||[]).some(x=>/business|empresa/i.test(String(x)))},
      {l:'Nouveaux', c:'#22C55E', test:c=>c.status==='prospect'},
      {l:'Actifs', c:'#F59E0B', test:c=>c.status==='active'},
      {l:'Perdus', c:'#FF6B6B', test:c=>c.status==='lost'}
    ];
  },
  _statsSegments(){
    try {
      const clients=this.state.clients||[]; const defs=this._statsSegDefs(); const used=new Set();
      const segs=defs.map(d=>{ const list=clients.filter(c=>!used.has(c)&&d.test(c)); list.forEach(c=>used.add(c)); return {label:d.l,color:d.c,count:list.length}; });
      const total=clients.length;
      return { segs:segs.filter(s=>s.count>0).map(s=>({label:s.label,color:s.color,count:s.count,pct: total?Math.round(s.count/total*100):0})), total };
    } catch(e){ return {segs:[],total:0}; }
  },
  _chartSvgReal(){
    try {
      const type=this.state.chartType||'conv';
      const rangeKey=this.state.chartRange||'30d';
      const range= rangeKey==='quarter'?'90d': rangeKey==='all'?null:'30d';
      const S=this._statsCompute(range);
      const W=760,H=220,PAD_BOTTOM=30,innerH=H-PAD_BOTTOM-20;
      const empty=(msg)=>`<div style="height:${H}px;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--muted);font-size:13px;padding:24px;line-height:1.6">${msg}</div>`;
      if(!S.hasMsg) return empty("📊 Pas encore assez de données.<br>Le graphique se construit tout seul avec tes vraies conversations.");
      const yLines=`<g stroke="#F1F5F9" stroke-width="1"><line x1="0" y1="50" x2="${W}" y2="50"/><line x1="0" y1="110" x2="${W}" y2="110"/><line x1="0" y1="170" x2="${W}" y2="170"/></g>`;
      const pathFromPts=(p,closed)=>{ if(!p.length) return ''; let d=`M${p[0][0]},${p[0][1]}`; for(let i=1;i<p.length;i++){ const a=p[i-1],b=p[i]; d+=` C${a[0]+(b[0]-a[0])*.5},${a[1]} ${b[0]-(b[0]-a[0])*.5},${b[1]} ${b[0]},${b[1]}`; } if(closed) d+=` L${p[p.length-1][0]},${H-PAD_BOTTOM} L${p[0][0]},${H-PAD_BOTTOM} Z`; return d; };
      if(type==='hours'){
        const hours=S.hourBuckets||[]; const max=Math.max(1,...hours); const bw=W/24;
        const bars=hours.map((v,i)=>{ const h=(v/max)*innerH; const x=i*bw+2; const y=20+innerH-h; const it=v/max; const fill=it>.7?'#EF4444':it>.4?'#F59E0B':it>.15?'#3B82F6':'#CBD5E1'; return `<rect x="${x}" y="${y}" width="${bw-4}" height="${h}" fill="${fill}" rx="3"><title>${i}h : ${v} messages</title></rect>`; }).join('');
        const hl=[0,3,6,9,12,15,18,21].map(h=>`<text x="${h*bw+bw/2-8}" y="${H-6}" font-family="JetBrains Mono,monospace" font-size="10" fill="#94A3B8">${h}h</text>`).join('');
        return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px">${yLines}${bars}${hl}</svg>`;
      }
      if(type!=='conv') return empty("Ce graphique sera basé sur tes vraies données — bientôt.<br>Pour l'instant, l'onglet « Conversations » montre ton activité réelle.");
      const vals=S.convPerDay||[], labels=S.dayLabels||[];
      if(!vals.length) return empty("Pas encore de messages sur cette période.");
      const max=Math.max(...vals),min=Math.min(...vals),span=(max-min)||1;
      const pts=vals.map((v,i)=>[ vals.length>1?(i/(vals.length-1))*W:W/2, 20+(1-(v-min)/span)*innerH ]);
      const stepN=Math.max(1,Math.ceil(labels.length/8));
      const xlab=labels.map((l,i)=> i%stepN===0?`<text x="${Math.max(2,(labels.length>1?(i/(labels.length-1))*W:W/2)-8)}" y="${H-6}" font-family="JetBrains Mono,monospace" font-size="10" fill="#94A3B8">${l}</text>`:'').join('');
      return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px"><defs><linearGradient id="gstr" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#1A56DB" stop-opacity=".30"/><stop offset="100%" stop-color="#1A56DB" stop-opacity="0"/></linearGradient></defs>${yLines}<path d="${pathFromPts(pts,true)}" fill="url(#gstr)"/><path d="${pathFromPts(pts,false)}" fill="none" stroke="#1A56DB" stroke-width="2.5" stroke-linecap="round"/>${pts.map(p=>`<circle cx="${p[0]}" cy="${p[1]}" r="3" fill="#1A56DB"/>`).join('')}${xlab}<text x="${W-90}" y="22" font-family="JetBrains Mono,monospace" font-size="11" fill="#1A56DB" font-weight="700">${vals[vals.length-1]} msg/j</text></svg>`;
    } catch(e){ return `<div style="padding:24px;color:var(--muted);text-align:center">Graphique momentanément indisponible.</div>`; }
  },

  // Helper texte brief par période × langue (Augustin 21/05/2026)
  getBriefText(range, lang){
    // V5.4 : brief généré depuis les VRAIS chiffres (plus de texte inventé).
    try {
      const r = range || (this.state.briefRange || 'today');
      const days = r==='7d'?'7d' : r==='30d'?'30d' : r==='always'?null : '7d';
      const S = this._statsCompute(days);
      if (!S.hasData) return "Pas encore de données à résumer. Dès que tes clients t'écrivent, je te ferai un vrai brief de ton activité.";
      const parts = [];
      parts.push(`${S.convActive} conversation${S.convActive>1?'s':''} active${S.convActive>1?'s':''}`);
      if (S.newClients) parts.push(`${S.newClients} nouveau${S.newClients>1?'x':''} client${S.newClients>1?'s':''}`);
      if (S.responseRate!=null) parts.push(`un taux de réponse de ${S.responseRate} pour cent`);
      let txt = "Voici ton brief Nexus. " + parts.join(', ') + ".";
      if (S.avgRespMin!=null) txt += ` Temps de réponse moyen : ${S.avgRespMin} minute${S.avgRespMin>1?'s':''}.`;
      if (S.peak) txt += ` Ton pic d'activité est le ${S.peak.day} vers ${S.peak.hour} heures.`;
      if (S.topQuestions && S.topQuestions.length) txt += ` Question la plus fréquente de tes clients : ${S.topQuestions[0].q}.`;
      return txt;
    } catch(e) { return "Brief momentanément indisponible."; }
  },

  setBriefRange(r){
    this.state.briefRange = r;
    this.save();
    // Stop current playback (text change)
    if ('speechSynthesis' in window) speechSynthesis.cancel();
    this.state.audioPlayState.playing = false;
    this.state.audioPlayState.paused = false;
    const btn = document.getElementById('briefPlayBtn');
    if (btn) btn.textContent = '▶';
    this.renderView();
    const lbl = {today:'Brief du jour','7d':'7 derniers jours','30d':'30 derniers jours',always:'Depuis toujours'}[r] || r;
    this.toast('🎙 '+lbl,'info','Texte adapté à la période');
  },

  toggleBriefAudio(){
    if (!('speechSynthesis' in window)) { this.toast('Synthèse vocale non supportée','warn'); return; }
    const btn = document.getElementById('briefPlayBtn');
    if (this.state.audioPlayState.playing && !this.state.audioPlayState.paused) {
      speechSynthesis.pause();
      this.state.audioPlayState.paused = true;
      if (btn) btn.textContent = '▶';
      this.toast('⏸ Pause','info');
    } else if (this.state.audioPlayState.paused) {
      speechSynthesis.resume();
      this.state.audioPlayState.paused = false;
      if (btn) btn.textContent = '⏸';
      this.toast('▶ Reprise','info');
    } else {
      speechSynthesis.cancel();
      const range = this.state.briefRange || 'today';
      const lang = this.state.lang || 'fr';
      const txt = this.getBriefText(range, lang);
      const msg = new SpeechSynthesisUtterance(txt);
      msg.lang = {fr:'fr-FR',es:'es-CL',en:'en-US'}[lang] || 'fr-FR';
      msg.rate = this.state.audioPlayState.speed || 1;
      msg.onend = () => {
        this.state.audioPlayState.playing = false;
        this.state.audioPlayState.paused = false;
        const b = document.getElementById('briefPlayBtn');
        if (b) b.textContent = '▶';
      };
      speechSynthesis.speak(msg);
      this.state.audioPlayState.playing = true;
      this.state.audioPlayState.paused = false;
      if (btn) btn.textContent = '⏸';
      const lbl = {today:'Aujourd\'hui','7d':'7j','30d':'30j',always:'Depuis toujours'}[range] || range;
      this.toast('🎙 Lecture · '+lbl,'info','Vitesse '+(this.state.audioPlayState.speed||1)+'×');
    }
    this.save();
  },
  stopBriefAudio(){
    if ('speechSynthesis' in window) speechSynthesis.cancel();
    this.state.audioPlayState.playing = false;
    this.state.audioPlayState.paused = false;
    const btn = document.getElementById('briefPlayBtn');
    if (btn) btn.textContent = '▶';
    this.save();
    this.toast('⏹ Arrêté','info');
  },
  setAudioSpeed(s){
    this.state.audioPlayState.speed = s;
    this.save();
    ['spd-slow','spd-norm','spd-fast','spd-2x'].forEach(id => { const el = document.getElementById(id); if (el) el.classList.remove('on'); });
    const map = {0.75:'spd-slow', 1:'spd-norm', 1.5:'spd-fast', 2:'spd-2x'};
    const el = document.getElementById(map[s]); if (el) el.classList.add('on');
    this.toast('🎙 Vitesse : '+s+'×','info');
  },

  // PDF dynamique selon période (Augustin 21/05/2026)
  buildPdfReport(scope, period){
    const b = this.state.business;
    const date = new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});
    const periodKey = ['7d','30d','always'].includes(period) ? period : '30d';
    const periodLabel = {'7d':'7 derniers jours','30d':'30 derniers jours','always':'Depuis le début'}[periodKey];
    // V5.4 : chiffres RÉELS depuis Supabase (plus de mock)
    const S = this._statsCompute(periodKey==='always'?null:periodKey);
    const revenueSum = (this.state.clients||[]).reduce((s,c)=>s+(Number(c.spent)||0),0);
    const data = {
      conv: String(S.convActive||0),
      clients: S.newClients||0,
      response: (S.responseRate!=null? S.responseRate+'%':'—'),
      avgTime: (S.avgRespMin!=null? S.avgRespMin+' min':'—'),
      revenue: revenueSum ? revenueSum.toLocaleString('fr-FR').replace(/,/g,' ') : '—',
      prevLabel: periodLabel
    };
    let html = `
      <div class="pdf-page">
        <div class="pdf-h1">📊 Rapport Nexus — ${b.name}</div>
        <div class="pdf-meta">Généré le ${date} · Période : <b>${periodLabel}</b> · ${b.city}, Chile</div>
    `;
    if (scope === 'stats' || scope === 'all') {
      html += `
        <div class="pdf-h2">📈 Métriques clés — ${periodLabel}</div>
        <div>
          <div class="pdf-stat"><div class="v">${data.conv}</div><div class="l">Conversations</div></div>
          <div class="pdf-stat"><div class="v">${data.clients}</div><div class="l">Nouveaux clients</div></div>
          <div class="pdf-stat"><div class="v">${data.response}</div><div class="l">Taux réponse</div></div>
          <div class="pdf-stat"><div class="v">${data.avgTime}</div><div class="l">Temps moyen</div></div>
        </div>
        <div class="pdf-h2">💰 Économique — ${periodLabel}</div>
        <ul style="font-size:12.5px;line-height:1.8;color:#0F172A">
          <li>Chiffre d'affaires cumulé (fiches clients) : <b>${data.revenue} CLP</b></li>
          <li>Période : ${data.prevLabel}</li>
        </ul>
        <div class="pdf-h2">🔥 Heure de pointe — ${periodLabel}</div>
        <ul style="font-size:12.5px;line-height:1.8;color:#0F172A">
          ${S.peak ? `<li>Pic d'activité : <b>${S.peak.day} vers ${S.peak.hour}h</b> (${S.peak.n} message${S.peak.n>1?'s':''}).</li>` : `<li>Pas encore assez de données pour détecter les heures de pointe.</li>`}
        </ul>
        <div class="pdf-h2">❓ Top questions ${periodKey==='7d'?'semaine':periodKey==='30d'?'mois':'depuis le début'}</div>
        <table class="pdf-table">
          <thead><tr><th>#</th><th>Question</th><th>Fréquence</th><th>Tendance</th></tr></thead>
          <tbody>${(S.topQuestions||[]).length ? S.topQuestions.map((q,i)=>`<tr><td>${i+1}</td><td>${q.q}</td><td>${q.count}×</td><td>—</td></tr>`).join('') : '<tr><td colspan="4" style="text-align:center;color:#64748B">Pas encore de questions clients enregistrées</td></tr>'}</tbody>

  getNextChileanHoliday(maxDaysAhead = 30){
    const list = this.getChileanHolidays();
    const now = new Date(); now.setHours(0,0,0,0);
    let best = null, bestDiff = Infinity;
    list.forEach(h => {
      const d = new Date(h.date + 'T00:00:00');
      const diffMs = d - now;
      const diffDays = Math.ceil(diffMs / 86400000);
      if (diffDays >= 0 && diffDays <= maxDaysAhead && diffDays < bestDiff) {
        best = h; bestDiff = diffDays;
      }
    });
    if (!best) return null;
    return {
      ...best,
      daysLeft: bestDiff,
      dateLabel: new Date(best.date + 'T00:00:00').toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long' })
    };
  },
  // Parse "when" en Date best-effort (ex: "Vendredi 18 h", "Demain 9 h", "Dans 2 h", "À l'instant")
  parseAgendaDate(it){
    const now = new Date();
    if (!it) return now;
    if (it.dueDate) { const d = new Date(it.dueDate); if (!isNaN(d)) return d; }
    const w = (it.when||'').toLowerCase().trim();
    const refDate = it.createdAt ? new Date(it.createdAt) : now;
    if (!w || w === '—') return refDate;
    // "à l'instant", "ahora", "just now", "envoyé maintenant"
    if (/instant|maintenant|ahora|just now|envoyé/i.test(w)) return now;
    // "hier", "ayer", "yesterday"
    if (/^hier|^ayer|^yesterday/i.test(w)) { const d=new Date(now); d.setDate(d.getDate()-1); return d; }
    // "demain", "mañana", "tomorrow"
    if (/^demain|^mañana|^tomorrow/i.test(w)) {
      const d=new Date(now); d.setDate(d.getDate()+1);
      const hm = w.match(/(\d{1,2})\s*h?\s*(\d{2})?/); if (hm) d.setHours(parseInt(hm[1]), parseInt(hm[2]||'0'), 0, 0);
      return d;
    }
    // "dans 2 h", "en 2 h", "in 2 h"
    const inH = w.match(/^(dans|en|in)\s+(\d+)\s*h/i);
    if (inH) { const d=new Date(now); d.setHours(d.getHours()+parseInt(inH[2])); return d; }
    // jour de la semaine français
    const dayMap = { 'lundi':1,'mardi':2,'mercredi':3,'jeudi':4,'vendredi':5,'samedi':6,'dimanche':0,
                     'lunes':1,'martes':2,'miércoles':3,'miercoles':3,'jueves':4,'viernes':5,'sábado':6,'sabado':6,'domingo':0,
                     'monday':1,'tuesday':2,'wednesday':3,'thursday':4,'friday':5,'saturday':6,'sunday':0 };
    for (const [name, dow] of Object.entries(dayMap)) {
      if (w.startsWith(name)) {
        const d = new Date(now);
        const cur = d.getDay();
        let diff = (dow - cur + 7) % 7; if (diff === 0) diff = 7; // next occurrence (semaine prochaine si même jour)
        d.setDate(d.getDate() + diff);
        const hm = w.match(/(\d{1,2})\s*h?\s*(\d{2})?/); if (hm) d.setHours(parseInt(hm[1]), parseInt(hm[2]||'0'), 0, 0);
        return d;
      }
    }
    // Date ISO directe
    const iso = new Date(w); if (!isNaN(iso)) return iso;
    return refDate;
  },

        }).join('')}</div>`;

    // ----------- VIEW : CALENDRIER -----------
    // Génère 6 semaines × 7 jours autour du mois courant
    const monthNames = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
    const dayNames = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
    const firstDay = new Date(cM.year, cM.month, 1);
