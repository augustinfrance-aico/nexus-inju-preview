      msgUrgent:'¡Hola! Para urgencias contactar a [TEL] o esperar mi vuelta el [FECHA]. Gracias por tu paciencia 🙏',
      lang:'auto',
      perm_orders:false, perm_prices:true, perm_calendar:true, perm_escalate:true, perm_promo:false
    };
  },

  updateVac(key, value){
    let vac = {};
    try { vac = JSON.parse(localStorage.getItem('nexus_vacances') || 'null') || this.defaultVacances(); }
    catch(e){ vac = this.defaultVacances(); }
    vac[key] = value;
    localStorage.setItem('nexus_vacances', JSON.stringify(vac));
    // Re-render uniquement pour preset (UI change)
    if (key === 'preset') this.renderView();
  },

  toggleVacancesActive(){
    let vac = {};
    try { vac = JSON.parse(localStorage.getItem('nexus_vacances') || 'null') || this.defaultVacances(); }
    catch(e){ vac = this.defaultVacances(); }
    vac.active = !vac.active;
    localStorage.setItem('nexus_vacances', JSON.stringify(vac));
    // Synchronise avec le toggle sidebar
    this.state.vacation = vac.active;
    this.state.vacationDetails.enabled = vac.active;
    this.save();
    const t = document.getElementById('vacationToggle');
    if (t) t.checked = vac.active;
    const row = document.getElementById('vacationRow');
    if (row) row.classList.toggle('warn', vac.active);
    this.toast(vac.active ? '✈️ Mode vacances activé — l\'IA prend le relais' : '🛑 Mode vacances désactivé — tu reprends les commandes', 'success');
    this.renderView();
  },

  viewSettings(){
    const p = this.state.preferences;
    return `
      <div class="view">
        <div class="page-hd">
          <div><h1>⚙️ Paramètres</h1><div class="sub">Personnalise ton Nexus aux petits oignons.</div></div>
        </div>
        <div class="grid2">
          <div class="card" style="padding:22px">
            <h3 style="margin-bottom:16px">🎨 Apparence</h3>
            ${this.toggleRow('Thème sombre',this.state.theme==='dark','Nx.toggleTheme()')}
            <div class="form-row mt16"><label class="form-lbl">Couleur d'accent</label>
              <div style="display:flex;gap:8px;flex-wrap:wrap">
                ${['#1A56DB','#7A3CFF','#22C55E','#F59E0B','#EF4444','#06B6D4'].map(c=>`<div style="width:34px;height:34px;border-radius:10px;background:${c};cursor:pointer;border:3px solid ${this.state.accent===c?'var(--ink)':'transparent'}" onclick="Nx.setAccent('${c}')"></div>`).join('')}
              </div></div>
            <div class="form-row"><label class="form-lbl">Langue d'interface</label>
              <div class="lang-btn" style="width:fit-content">
                <button onclick="Nx.setLang('fr')" class="${this.state.lang==='fr'?'on':''}">Français</button>
                <button onclick="Nx.setLang('es')" class="${this.state.lang==='es'?'on':''}">Español</button>
                <button onclick="Nx.setLang('en')" class="${this.state.lang==='en'?'on':''}">English</button>
              </div></div>
          </div>

          <div class="card" style="padding:22px">
            <h3 style="margin-bottom:16px">🔔 Notifications</h3>
            ${this.toggleRow('Son des notifications',p.soundNotif,'Nx.togglePref("soundNotif")')}
            ${this.toggleRow('Notifications bureau',p.desktopNotif,'Nx.togglePref("desktopNotif")')}
            ${this.toggleRow('Brouillon IA automatique',p.autoDraft,'Nx.togglePref("autoDraft")')}
            <div class="form-row mt16"><label class="form-lbl">Signature auto</label><input class="form-ctrl" value="${p.signature}" oninput="Nx.state.preferences.signature=this.value;Nx.save()"></div>
          </div>

          <div class="card" style="padding:22px">
            <h3 style="margin-bottom:16px">🔒 Sécurité & données</h3>
            ${this.toggleRow('Partager mes données anonymisées pour améliorer Nexus',p.dataSharingOptIn,'Nx.togglePref("dataSharingOptIn")')}
            <div class="mt16"><button class="btn btn-s" style="width:100%" onclick="Nx.toast('Export initié','info','Archive ZIP prête dans 2 min')">📤 Exporter toutes mes données</button></div>
            <div class="mt8"><button class="btn btn-s" style="width:100%" onclick="Nx.toast('2FA activée','success')">🔐 Activer 2FA</button></div>
            <div class="mt8"><button class="btn btn-danger" style="width:100%" onclick="if(confirm('Vraiment réinitialiser?'))Nx.reset()">🗑 Réinitialiser le compte</button></div>
          </div>

          <div class="card" style="padding:22px">
            <h3 style="margin-bottom:16px">🔌 Intégrations</h3>
            ${[
              {n:'WhatsApp Business API',s:'connected',ic:'📱'},
              {n:'Google Calendar',s:'connected',ic:'📅'},
              {n:'Gmail',s:'connected',ic:'✉️'},
              {n:'Instagram DM',s:'pending',ic:'📸'},
              {n:'Stripe',s:'connected',ic:'💳'},
              {n:'Mercado Pago',s:'available',ic:'🇨🇱'},
              {n:'Google Analytics',s:'available',ic:'📊'},
              {n:'Zapier',s:'available',ic:'⚡'},
            ].map(i=>`<div style="padding:10px 0;display:flex;gap:10px;align-items:center;border-bottom:1px solid var(--line2)">
              <span style="font-size:18px">${i.ic}</span>
              <span style="flex:1;font-size:13px">${i.n}</span>
              <span class="chip ${i.s==='connected'?'green':i.s==='pending'?'amber':''}">${i.s==='connected'?'Connecté':i.s==='pending'?'En attente':'Connecter'}</span>
            </div>`).join('')}
          </div>
        </div>
      </div>`;
  },

  toggleRow(label,checked,onchange){
    return `<div class="toggle-row" style="margin-bottom:8px"><span>${label}</span>
      <label class="switch"><input type="checkbox" ${checked?'checked':''} onchange="${onchange}"><span class="slider"></span></label>
    </div>`;
  },

  togglePref(k){
    this.state.preferences[k] = !this.state.preferences[k];
    this.save();
    this.toast('Préférence mise à jour','success');
  },

  setAccent(c){
    this.state.accent = c;
    document.documentElement.style.setProperty('--blue',c);
    this.save();
    this.renderView();
  },

  // ---------- TIP ACTIONS ----------
  tipAction(action){
    switch(action){
      case 'createRecoveryCampaign': this.openCampaignBuilder('Récupération clients perdus -15%'); break;
      case 'showLostClients': this.state.crmFilter='lost'; this.navigate('crm'); break;
      case 'createWeatherCampaign': this.openCampaignBuilder('Promo jour de pluie'); break;
      case 'showPricingAnalysis': this.openModal('pricing-analysis'); break;
      case 'prepareBirthday': this.openCampaignBuilder('Joyeux anniversaire María'); break;
      case 'showHeatmap': this.navigate('stats'); break;
      case 'dismissTip': this.state.tipIndex = (this.state.tipIndex+1) % TIPS_ROTATION.length; this.save(); this.renderView(); break;
    }
  }
};

// Boot
window.addEventListener('DOMContentLoaded', () => Nx.init());
</script>
</body>
</html>
