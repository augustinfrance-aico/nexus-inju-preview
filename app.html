      localStorage.setItem('nexus_app_version', APP_VERSION);
    }
    // Reset via URL : ?reset=1 → clear total
    if (location.search.includes('reset=1')) {
      localStorage.removeItem(STORAGE_KEY);
      location.search = '';
      return;
    }
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try {
        this.state = JSON.parse(saved);
        // Sanity check : si state corrompu, fallback
        if (!this.state || !this.state.business || !this.state.lang) {
          this.state = JSON.parse(JSON.stringify(DEFAULT_STATE));
        }
      } catch(e){ this.state = JSON.parse(JSON.stringify(DEFAULT_STATE)); }
    } else {
      this.state = JSON.parse(JSON.stringify(DEFAULT_STATE));
    }
    // Sync langue avec core.html (clé partagée nexus_core_lang)
    const sharedLang = localStorage.getItem('nexus_core_lang');
    if (sharedLang && ['fr','es','en'].includes(sharedLang)) {
      this.state.lang = sharedLang;
    }
    // MIGRATION : champs ajoutés post-v1, garantis présents même si state ancien
    const ensure = (k, defaultVal) => { if (this.state[k] === undefined) this.state[k] = JSON.parse(JSON.stringify(defaultVal)); };
    ensure('customSegments', []);
    ensure('userTemplates', []);
    ensure('crmCorrections', []);
    ensure('campaignHistory', []);
    ensure('statsRange', '30d');
    ensure('audioPlayState', { playing:false, speed:1, paused:false });
    ensure('vacationDetails', DEFAULT_STATE.vacationDetails);
    ensure('apiKeys', DEFAULT_STATE.apiKeys);
    // Enrichir business si ancien
    if (this.state.business && !this.state.business.description) this.state.business.description = DEFAULT_STATE.business.description;
    if (this.state.business && !this.state.business.dataArchives) this.state.business.dataArchives = DEFAULT_STATE.business.dataArchives;
    if (this.state.business && !this.state.business.composition) this.state.business.composition = DEFAULT_STATE.business.composition;
    if (this.state.business && !this.state.business.webPage) this.state.business.webPage = DEFAULT_STATE.business.webPage;
    if (this.state.business && !this.state.business.catalogUrl) this.state.business.catalogUrl = '';
    // Enrichir catalogue
    if (this.state.business && this.state.business.catalog) {
      this.state.business.catalog.forEach(p => {
        if (p.photo === undefined) p.photo = '';
        if (p.miniDesc === undefined) p.miniDesc = '';
        if (p.nutriScore === undefined) p.nutriScore = '';
        if (p.ingredients === undefined) p.ingredients = '';
        if (p.allergens === undefined) p.allergens = '';
      });
    }
    this.renderNav();
    this.setLang(this.state.lang);
    this.applyTheme();
    document.getElementById('vacationToggle').checked = this.state.vacation;
    document.getElementById('themeToggle').checked = this.state.theme === 'dark';
    window.addEventListener('hashchange', () => this.routeFromHash());
    window.addEventListener('keydown', this.globalKeys.bind(this));
    this.routeFromHash();

    // Live counters simulation
    this.startLive();
    // Boot screen : si déjà chargé une fois (sessionStorage), on cache IMMÉDIATEMENT
    // Sinon (1ère fois user), petit fade 800ms+500ms. Augus 19/05 : "loading en boucle"
    const boot = document.getElementById('boot-screen');
    if (boot) {
      const alreadyBooted = sessionStorage.getItem('nx_booted_v1') === '1';
      if (alreadyBooted) {
        // Skip total : aucun délai visible
        boot.style.display = 'none';
      } else {
        setTimeout(() => {
          boot.classList.add('fade-out');
          setTimeout(() => {
            boot.style.display = 'none';
            try { sessionStorage.setItem('nx_booted_v1', '1'); } catch(e){}
          }, 500);
        }, 800);
      }
    }
    // Welcome toast — après le boot
    setTimeout(() => this.toast('Bienvenue sur Nexus, Carlos ☀️', 'success', 'Ton agent IA veille sur tes conversations.'), 2200);
    } catch(err) {
      console.error('[init] CRASH:', err);
      // Force-hide le boot même si init plante en route
      const b = document.getElementById('boot-screen');
      if (b) b.style.display = 'none';
    }
  },

  save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(this.state)); },
  reset(){ localStorage.removeItem(STORAGE_KEY); location.reload(); },

  startLive(){
    // Simulate random micro-events
    let ticks = 0;
    setInterval(() => {
      ticks++;
      if (ticks % 12 === 0) {
        // Nouveau message aléatoire
        const evs = ['📩 Nouveau WhatsApp reçu','🎯 Tip IA mis à jour','💰 Nouvelle vente détectée','📈 Streak maintenu'];
        this.toast(evs[Math.floor(Math.random()*evs.length)], 'info');
      }
    }, 10000);
  },

  navigate(view){
    this.state.view = view;
    this.save();
    location.hash = '#/' + view;
    if (window.matchMedia('(max-width:1024px)').matches) this.toggleSidebar(false);
  },

  toggleSidebar(forceState){
    const sb = document.getElementById('sidebar');
    const bd = document.getElementById('sidebarBackdrop');
    if (!sb || !bd) return;
    const open = (typeof forceState === 'boolean') ? forceState : !sb.classList.contains('open');
    sb.classList.toggle('open', open);
    bd.classList.toggle('show', open);
    document.body.style.overflow = open ? 'hidden' : '';
  },

  routeFromHash(){
    const hash = location.hash.replace('#/','') || 'dashboard';
    this.state.view = hash;
    this.renderView();
    this.updateBreadcrumb();
    document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.view === hash));
  },

  updateBreadcrumb(){
    const map = {dashboard:'Hub',profile:t('nav.profile'),inbox:t('nav.inbox'),crm:t('nav.crm'),stats:t('nav.stats'),campaigns:t('nav.campaigns'),pilotage:t('nav.pilotage'),payments:t('nav.payments'),tutorial:'Tutoriel',vacances:'Mode vacances',settings:t('nav.settings')};
    document.getElementById('breadcrumb').textContent = map[this.state.view] || this.state.view;
  },

  renderNav(){
    const items = [
      {view:'dashboard',ic:'🏠',label:'Hub'},
      {view:'profile',ic:'👤',label:'nav.profile',meta:'80%'},
      {view:'inbox',ic:'📬',label:'nav.inbox',meta:'5'},
      {view:'crm',ic:'👥',label:'nav.crm'},
      {view:'stats',ic:'📊',label:'nav.stats'},
      {view:'campaigns',ic:'📢',label:'nav.campaigns'},
      {view:'pilotage',ic:'🎯',label:'nav.pilotage',meta:'Nouveau',metaCls:'new'},
      {view:'vacances',ic:'✈️',label:'Mode vacances',meta:'Nouveau',metaCls:'new'},
      {view:'tutorial',ic:'🎓',label:'Tutoriel',meta:'Nouveau',metaCls:'new'},
      {view:'payments',ic:'💳',label:'nav.payments'},
    ];
    document.getElementById('navContainer').innerHTML = items.map(i => `
      <div class="nav-item" data-view="${i.view}" onclick="Nx.navigate('${i.view}')">
        <div class="nav-ic">${i.ic}</div>
        <div class="nav-lbl"${i.label.startsWith('nav.')?` data-i18n="${i.label}"`:''}>${i.label.startsWith('nav.')?t(i.label):i.label}</div>
        ${i.meta ? `<span class="nav-meta ${i.metaCls||''}">${i.meta}</span>` : ''}
      </div>
    `).join('');
  },

  setLang(l){
    this.state.lang = l;
    // Sync avec core.html (langue partagée)
    try { localStorage.setItem('nexus_core_lang', l); } catch(e) {}
    // Topbar lang buttons highlight
    document.querySelectorAll('.lang-btn button').forEach(b => b.classList.remove('on'));
    const btn = document.getElementById('lang-'+l); if (btn) btn.classList.add('on');
    // Apply all i18n: textContent, placeholder, aria-label, title, innerHTML
    document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
    document.querySelectorAll('[data-i18n-ph]').forEach(el => { el.placeholder = t(el.dataset.i18nPh); });
    document.querySelectorAll('[data-i18n-aria]').forEach(el => { el.setAttribute('aria-label', t(el.dataset.i18nAria)); });
    document.querySelectorAll('[data-i18n-title]').forEach(el => { el.setAttribute('title', t(el.dataset.i18nTitle)); });
    document.querySelectorAll('[data-i18n-html]').forEach(el => { el.innerHTML = t(el.dataset.i18nHtml); });
    document.documentElement.lang = l;
    // Update dynamic theme label
    const themeLbl = document.getElementById('themeLbl');
    if (themeLbl) themeLbl.textContent = (this.state.theme === 'dark') ? t('theme.dark') : t('theme.light');
    // Update boot screen text if visible
    const bootLoad = document.getElementById('bootLoading'); if (bootLoad) bootLoad.textContent = t('boot.loading');
    // Update vacation toggle label if exists
    const vacBtn = document.getElementById('vacToggleBtn');
    if (vacBtn) vacBtn.textContent = this.state.vacation ? t('vac.deactivate') : t('vac.activate');
    this.updateBreadcrumb();
    this.save();
    this.renderView();
    // === DYNAMIC TRANSLATE via /api/translate (Groq) — couvre les textes non-i18n
    // FIX 19/05 : ancien nom NexusTranslate.translate n'existait pas → restoreOrig jamais appelé
    if (window.NexusDynTranslate) {
      setTimeout(() => { try { window.NexusDynTranslate.apply(l); } catch (e) { console.warn('[DT]', e); } }, 80);
    }
  },

  toggleTheme(){
    this.state.theme = this.state.theme === 'light' ? 'dark' : 'light';
    this.applyTheme();
    this.save();
  },
  applyTheme(){
    document.documentElement.dataset.theme = this.state.theme;
    const isDark = this.state.theme === 'dark';
    const themeLbl = document.getElementById('themeLbl');
    if (themeLbl) themeLbl.textContent = isDark ? '🌙 Thème sombre' : '🌞 Thème clair';
    const themeToggle = document.getElementById('themeToggle');
    if (themeToggle) themeToggle.checked = isDark;
    // Update topbar theme icon (soleil pour passer dark / lune pour passer light)
    const tbIc = document.getElementById('topbarThemeIc');
    if (tbIc) {
      if (isDark) {
        // En mode sombre, montre l'icône lune (clic = revenir à clair)
        tbIc.innerHTML = '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>';
      } else {
        // En mode clair, montre l'icône soleil (clic = passer en sombre)
        tbIc.innerHTML = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>';
      }
    }
  },

  onVacationDurationChange(dur){
    const msgEs = document.getElementById('vMsgEs');
    const msgFr = document.getElementById('vMsgFr');
    if (!msgEs || !msgFr) return;
    if (dur === 'short') {
      msgEs.value = 'Hola! Estoy fuera unos días, vuelvo pronto. Para urgencias escribir al [TEL]. Gracias!';
      msgFr.value = 'Salut ! Je suis absent quelques jours, je reviens vite. Pour les urgences, écrire au [TEL]. Merci !';
    } else if (dur === 'medium') {
      msgEs.value = 'Hola, estoy de vacaciones hasta el [FECHA]. Para pedidos urgentes contactar a [TEL]. Te respondo a mi vuelta. Saludos!';
      msgFr.value = 'Bonjour, je suis en vacances jusqu\'au [DATE]. Pour les commandes urgentes, contacter [TEL]. Je vous réponds à mon retour. Cordialement.';
    } else {
      msgEs.value = 'Estimado cliente, le informo que estaré ausente por un periodo prolongado, hasta el [FECHA]. Durante mi ausencia, las solicitudes serán gestionadas por [NOMBRE] al [TEL]. Quedo a su disposición a mi regreso. Cordialmente.';
      msgFr.value = 'Cher client, je vous informe que je serai absent pour une période prolongée, jusqu\'au [DATE]. Pendant mon absence, [NOM] gère les demandes au [TEL]. Je reste à votre disposition à mon retour. Cordialement.';

  },

  translateVacation(){
    const msgEs = document.getElementById('vMsgEs');
    const msgFr = document.getElementById('vMsgFr');
    if (!msgEs || !msgFr) return;
    if (msgEs.value && !msgFr.value) {
      msgFr.value = msgEs.value
        .replace('Hola','Bonjour')
        .replace('vacaciones','vacances')
        .replace('hasta el','jusqu\'au')
        .replace('Para','Pour les')
        .replace('contactar','contacter')
        .replace('Saludos','Cordialement');
      this.toast('🌐 Traduit ES → FR','success');
    } else if (msgFr.value && !msgEs.value) {
      msgEs.value = msgFr.value
        .replace('Bonjour','Hola')
        .replace('vacances','vacaciones')
        .replace('jusqu\'au','hasta el')
        .replace('Pour les','Para')
        .replace('Cordialement','Saludos');
      this.toast('🌐 Traduit FR → ES','success');
    } else {
      this.toast('Les deux champs sont déjà remplis','info');
    }
  },

  cancelVacation(){

    const c = this.state.clients.find(x => x.id === clientId);
    const first = c ? c.name.split(' ')[0] : '';
    const variants = [
      `¡Mil gracias ${first}! 🙏 Aprecio mucho tu confianza. Cualquier cosa estoy aquí.`,
      `${first}, gracias por tu apoyo 💛 Eres un cliente que vale oro. Hasta pronto.`,
      `¡Gracias ${first}! 🙌 Por clientes como tú vale la pena cada día. Un abrazo.`
    ];
    const txt = variants[Math.floor(Math.random() * variants.length)];
    let conv = this.state.conversations.find(x => x.clientId === clientId);
    if (!conv) {
      conv = { clientId, channel:'whatsapp', unread:false, messages:[] };
      this.state.conversations.push(conv);
    }
    conv.messages.push({ from:'me', text: txt, time: 'À l\'instant' });
    conv.unread = false;
    this.save();
    this.toast('💌 Merci envoyé','success', 'Message envoyé dans la conversation');

      ]},
      {g:'Actions',items:[
        {ic:'✨',label:'Ouvrir Nexus AI',fn:()=>this.openAiChat()},

        {ic:'✈️',label:'Toggle mode vacances',fn:()=>{this.toggleVacation();document.getElementById('vacationToggle').checked=this.state.vacation}},
        {ic:'🌙',label:'Toggle thème',fn:()=>this.toggleTheme()},

    ];
    let html = '';
    actions.forEach(group=>{
      const filtered = group.items.filter(i => !q || i.label.toLowerCase().includes(q));
      if (filtered.length) {
        html += `<div class="cp-group"><div class="cp-group-title">${group.g}</div>`;
        filtered.forEach((it,idx)=>{
          html += `<div class="cp-item" onclick='Nx._cpRun(${actions.indexOf(group)},${group.items.indexOf(it)})'><span class="ic">${it.ic}</span><span>${it.label}</span>${it.meta?`<span class="meta">${it.meta}</span>`:''}</div>`;
        });
        html += '</div>';
      }
    });
    this._cpCache = actions;
    document.getElementById('cpResults').innerHTML = html || '<div style="padding:30px;text-align:center;color:var(--muted);font-size:13px">Aucun résultat</div>';

  globalKeys(e){
    // Ne pas intercepter si user tape dans un input/textarea
    const tag = (e.target.tagName||'').toLowerCase();
    if (tag === 'input' || tag === 'textarea' || e.target.isContentEditable) return;
    if ((e.metaKey || e.ctrlKey) && e.key === 'k'){ e.preventDefault(); this.openPalette(); }
    if (e.key === 'Escape'){ this.closePalette(); this.closeModal(); }
    // Raccourci I = ouvre l'interface principale (pop-up)
    if (e.key === 'i' || e.key === 'I'){ e.preventDefault(); this.openHubOverlay(); }
    // Raccourci H = retour au Nexus Core (Hub)
    if (e.key === 'h' || e.key === 'H'){ e.preventDefault(); this.navigate('dashboard'); }
  },

  // Coach Nexus connecté à /api/claude (priorité Groq Llama 3.3 70B GRATUIT)
  // Augustin 19/05 : "connecte a groq sinon ca va trop couter"
  async askAi(preset){
    const input = document.getElementById('aiInput');
    const q = (preset || (input && input.value.trim()) || '').trim();
    if (!q) return;
    const msgs = document.getElementById('aiMessages');
    if (!msgs) return;
    // Affiche le message user immédiatement
    msgs.innerHTML += `<div class="bubble me">${q}</div>`;
    if (input) input.value = '';
    msgs.scrollTop = msgs.scrollHeight;
    // Indicateur de typing
    const typingId = 'typing_' + Date.now();
    msgs.innerHTML += `<div class="bubble them" id="${typingId}"><span style="opacity:.6">🤖 Nexus réfléchit<span style="display:inline-block;animation:dotsBlink 1.4s infinite">…</span></span></div>`;
    msgs.scrollTop = msgs.scrollHeight;
    // Historique pour contexte (les 6 derniers messages)
    if (!this._aiHistory) this._aiHistory = [];
    this._aiHistory.push({ role:'user', content: q });
    try {
      const r = await fetch('/api/claude', {
        method:'POST',
        headers: { 'Content-Type':'application/json' },
        body: JSON.stringify({ question: q, history: this._aiHistory.slice(-6) })
      });
      const data = await r.json();
      const answer = data.answer || data.error || '🤖 Réponse vide';
      this._aiHistory.push({ role:'assistant', content: answer });
      // Retire le typing + ajoute la vraie réponse
      const typEl = document.getElementById(typingId);
      if (typEl) typEl.remove();
      const modelTag = data.model ? `<div style="font-size:9.5px;color:var(--muted);margin-top:6px;text-align:right">⚡ ${data.model}</div>` : '';
      msgs.innerHTML += `<div class="bubble them">${answer}${modelTag}</div>`;
      msgs.scrollTop = msgs.scrollHeight;
    } catch(e) {
      const typEl = document.getElementById(typingId);
      if (typEl) typEl.innerHTML = `<span style="color:var(--red)">⚠️ Erreur : ${String(e).slice(0,100)}</span>`;
    }
  },

  renderView(){

    let html = '';
    // try/catch défensif : si une vue plante, on affiche une page d'erreur au lieu de crasher (Augus 19/05 : "loading en boucle")
    try {
      if (v === 'dashboard') html = this.viewDashboard();
      else if (v === 'profile') html = this.viewProfile();
      else if (v === 'inbox') html = this.viewInbox();
      else if (v === 'crm') html = this.viewCrm();
      else if (v === 'stats') html = this.viewStats();
      else if (v === 'campaigns') html = this.viewCampaigns();
      else if (v === 'pilotage') html = this.viewPilotage();
      else if (v === 'payments') html = this.viewPayments();
      else if (v === 'tutorial') html = this.viewTutorial();
      else if (v === 'vacances') html = this.viewVacances();
      else if (v === 'settings') html = this.viewSettings();
      else html = '<div class="view"><h1>Page introuvable</h1><p>Retourner au <a href="#/dashboard" style="color:var(--blue)">tableau de bord</a>.</p></div>';
    } catch(err) {
      console.error('[renderView crash] view='+v, err);
      html = `<div class="view"><div class="card" style="padding:20px"><h2>⚠️ Erreur de rendu</h2><p>Vue : <code>${v}</code></p><pre style="font-size:11px;color:var(--red);background:#FEE;padding:10px;border-radius:6px;overflow:auto">${String(err.stack || err).slice(0,500)}</pre><button class="btn btn-p" onclick="Nx.navigate('dashboard')">← Retour au tableau de bord</button></div></div>`;
    }
    // Barre top sur toutes les sections sauf dashboard :
    // 1) Bouton "← Retour Nexus Core"  2) Icône fenêtre = ouvre pop-up pour basculer entre modules
    if (v !== 'dashboard') {
      // Bouton "Menus" retiré ici (Augustin 19/05/2026) — doublon avec celui en haut à droite à côté du switcher de langue
      html = `<div class="back-to-core-bar">

          <span style="font-size:18px">←</span>
          <span>Retour au Nexus Core</span>
        </button>
      </div>` + html;
    }
    vc.innerHTML = html;
    // === DYNAMIC TRANSLATE post-render via Groq (gratuit)
    // Cache hit = instant zéro API. Cache miss = 1 batch Groq (~1-2s, $0)
    const _lang = (this.state && this.state.lang) || localStorage.getItem('nexus_core_lang') || 'fr';
    if (window.NexusDynTranslate && _lang !== 'fr') {
      setTimeout(() => { try { window.NexusDynTranslate.apply(_lang); } catch (e) { console.warn('[DT]', e); } }, 80);
    }
  },

  // Graphique dynamique selon chartType (Augustin 19/05/2026 — les courbes doivent vraiment changer)
  chartSvg(){
    const type = this.state.chartType || 'conv';
    const W = 760, H = 220, PAD_BOTTOM = 30;
    // Données mock cohérentes par type
    const datasets = {
      conv:    { values:[145,158,142,170,165,180,195,178,210,205,220,240,235,248,260,255,272,268,285,290,275,295,310,302,318,328,335,342,350,358], color:'#1A56DB', unit:'conv/j', label:'Conversations' },
      seg:     null, // multi-séries en dessous
      resp:    { values:[88,89,87,90,91,89,92,91,93,92,91,93,94,93,94,95,94,93,95,94,94,95,93,94,95,94,95,94,95,94], color:'#22C55E', unit:'%', label:'Taux de réponse' },
      hours:   null, // bars hours of week
      camp:    null, // bars campagnes
      newlost: null  // 2 séries
    };
    // Helper : transforme valeurs → polyline points
    const pts = (vals) => {
      const max = Math.max(...vals);
      const min = Math.min(...vals);
      const range = max - min || 1;
      const innerH = H - PAD_BOTTOM - 20;
      return vals.map((v, i) => {
        const x = (i / (vals.length - 1)) * W;
        const y = 20 + (1 - (v - min) / range) * innerH;
        return [x, y];
      });
    };
    const pathFromPts = (points, closed = false) => {
      if (!points.length) return '';
      let d = `M${points[0][0]},${points[0][1]}`;
      for (let i = 1; i < points.length; i++) {
        const [px, py] = points[i - 1];
        const [x, y] = points[i];
        const cx1 = px + (x - px) * 0.5;
        const cx2 = x - (x - px) * 0.5;
        d += ` C${cx1},${py} ${cx2},${y} ${x},${y}`;
      }
      if (closed) {
        d += ` L${points[points.length - 1][0]},${H - PAD_BOTTOM} L${points[0][0]},${H - PAD_BOTTOM} Z`;
      }
      return d;
    };
    const xLabels = (lbls) => {
      const step = W / (lbls.length - 1);
      return lbls.map((l, i) => `<text x="${Math.max(2, i * step - 8)}" y="${H - 6}" font-family="JetBrains Mono,monospace" font-size="10" fill="#94A3B8">${l}</text>`).join('');
    };
    const yLines = `<g stroke="#F1F5F9" stroke-width="1">
      <line x1="0" y1="50" x2="${W}" y2="50"/>
      <line x1="0" y1="110" x2="${W}" y2="110"/>
      <line x1="0" y1="170" x2="${W}" y2="170"/>
    </g>`;
    const monthLabels = ['1avr','5','10','15','20','25','30','5mai','10','15','19'];

    // ====== TYPE 1: COURBE SIMPLE (conv, resp) ======
    if (datasets[type] && datasets[type].values) {
      const ds = datasets[type];
      const p = pts(ds.values);
      const id = 'grad_' + type;
      return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px">
        <defs><linearGradient id="${id}" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stop-color="${ds.color}" stop-opacity=".30"/>
          <stop offset="100%" stop-color="${ds.color}" stop-opacity="0"/>
        </linearGradient></defs>
        ${yLines}
        <path d="${pathFromPts(p, true)}" fill="url(#${id})"/>
        <path d="${pathFromPts(p, false)}" fill="none" stroke="${ds.color}" stroke-width="2.5" stroke-linecap="round"/>
        ${p.filter((_,i)=>i%6===0).map(([x,y])=>`<circle cx="${x}" cy="${y}" r="3.5" fill="${ds.color}"/>`).join('')}
        ${xLabels(monthLabels)}
        <text x="${W-90}" y="22" font-family="JetBrains Mono,monospace" font-size="11" fill="${ds.color}" font-weight="700">${ds.values[ds.values.length-1]}${ds.unit==='conv/j'?'':ds.unit}</text>
      </svg>`;
    }

    // ====== TYPE 2: SEGMENTS CLIENTS (multi-courbes empilées) ======
    if (type === 'seg') {
      const series = [
        { name:'VIP',         color:'#F5C45E', values:[8,9,9,10,11,11,12,13,13,14,15,15,16,16,17,17,18,18,19,19,20,21,21,22,22,23,23,24,25,25] },
        { name:'Récurrent',   color:'#1A56DB', values:[42,44,45,48,50,52,55,57,60,62,65,68,70,72,75,77,80,82,85,87,90,93,95,98,100,103,106,108,110,113] },
        { name:'Nouveau',     color:'#22C55E', values:[5,6,8,9,11,12,14,15,17,18,20,22,23,25,27,28,30,31,33,34,36,38,39,41,42,44,45,47,48,50] },
        { name:'Business',    color:'#7A3CFF', values:[3,3,4,4,5,5,6,7,7,8,8,9,10,10,11,11,12,13,13,14,14,15,16,16,17,17,18,19,19,20] },
        { name:'Occasionnel', color:'#F59E0B', values:[30,31,29,32,30,31,33,32,34,33,35,34,36,35,37,36,38,37,39,38,40,39,41,40,42,41,43,42,44,43] },
        { name:'Perdu',       color:'#EF4444', values:[12,12,13,13,14,14,15,15,16,16,17,17,18,18,19,19,20,20,21,21,22,22,23,23,24,24,25,25,26,26] }
      ];
      const allMax = Math.max(...series.flatMap(s=>s.values));
      const innerH = H - PAD_BOTTOM - 20;
      const xy = (v, i, n) => [ (i/(n-1))*W, 20 + (1 - v/allMax) * innerH ];
      const lines = series.map(s => {
        const p = s.values.map((v,i)=>xy(v,i,s.values.length));
        return `<path d="${pathFromPts(p, false)}" fill="none" stroke="${s.color}" stroke-width="2" stroke-linecap="round" stroke-opacity=".85"/>`;
      }).join('');
      const legend = series.map((s,i)=>`<g transform="translate(${i*110},0)">
        <rect width="10" height="10" fill="${s.color}" rx="2"/>
        <text x="14" y="9" font-family="Inter,sans-serif" font-size="11" fill="#475569" font-weight="600">${s.name}</text>
      </g>`).join('');
      return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px">
        ${yLines}
        ${lines}
        ${xLabels(monthLabels)}
        <g transform="translate(8,4)">${legend}</g>
      </svg>`;
    }

    // ====== TYPE 3: BEST HOURS (barres heures de semaine) ======
    if (type === 'hours') {
      // 24 heures, intensité variable, pic vendredi 19-21h simulé via barres globales
      const hours = [0,0,0,1,2,4,8,15,22,28,30,28,25,22,20,18,22,30,42,55,65,52,30,12];
      const max = Math.max(...hours);
      const bw = W / hours.length;
      const innerH = H - PAD_BOTTOM - 20;
      const bars = hours.map((v,i) => {
        const h = (v/max) * innerH;
        const x = i * bw + 2;
        const y = 20 + innerH - h;
        const intensity = v/max;
        const fill = intensity > .7 ? '#EF4444' : intensity > .4 ? '#F59E0B' : intensity > .15 ? '#3B82F6' : '#CBD5E1';
        return `<rect x="${x}" y="${y}" width="${bw-4}" height="${h}" fill="${fill}" rx="3"><title>${i}h : ${v} messages</title></rect>`;
      }).join('');
      const hourLabels = [0,3,6,9,12,15,18,21].map(h => `<text x="${h*bw + bw/2 - 8}" y="${H-6}" font-family="JetBrains Mono,monospace" font-size="10" fill="#94A3B8">${h}h</text>`).join('');
      return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px">
        ${yLines}
        ${bars}
        ${hourLabels}
        <text x="${W-180}" y="22" font-family="Inter,sans-serif" font-size="11" fill="#EF4444" font-weight="700">🔥 Pic vendredi 19-21h</text>
      </svg>`;
    }

    // ====== TYPE 4: CAMPAGNES (barres horizontales taux d'ouverture) ======
    if (type === 'camp') {
      const camps = [
        { name:'Promo Pâques',           open:78, color:'#22C55E' },
        { name:'Recup -15% VIP',         open:64, color:'#1A56DB' },
        { name:'Newsletter Avril',       open:52, color:'#7A3CFF' },
        { name:'Lancement nouveaux pains', open:71, color:'#F59E0B' },
        { name:'Mère Fête',              open:58, color:'#EF4444' },
        { name:'Anniversaire boutique',  open:82, color:'#F5C45E' }
      ];
      const rowH = (H - 30) / camps.length;
      const innerW = W - 200;
      const rows = camps.map((c,i) => {
        const y = i * rowH + 8;
        const bw = (c.open/100) * innerW;
        return `<g transform="translate(0,${y})">
          <text x="0" y="${rowH/2 + 4}" font-family="Inter,sans-serif" font-size="11.5" fill="#334155" font-weight="600">${c.name}</text>
          <rect x="160" y="${rowH/2 - 8}" width="${innerW}" height="16" fill="#F1F5F9" rx="8"/>
          <rect x="160" y="${rowH/2 - 8}" width="${bw}" height="16" fill="${c.color}" rx="8"/>
          <text x="${160 + bw + 6}" y="${rowH/2 + 4}" font-family="JetBrains Mono,monospace" font-size="11" fill="${c.color}" font-weight="700">${c.open}%</text>
        </g>`;
      }).join('');
      return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px">${rows}</svg>`;
    }

    // ====== TYPE 5: NOUVEAUX VS PERDUS (2 courbes) ======
    if (type === 'newlost') {
      const newcl  = [3,4,5,4,6,5,7,6,8,7,9,8,10,9,11,10,12,11,13,12,14,13,15,14,16,15,17,16,18,17];
      const lost   = [2,2,3,2,3,2,3,2,3,2,2,3,2,3,2,3,2,3,2,3,2,2,3,2,3,2,2,3,2,2];
      const max = Math.max(...newcl, ...lost);
      const innerH = H - PAD_BOTTOM - 20;
      const xy = (v,i,n) => [ (i/(n-1))*W, 20 + (1 - v/max) * innerH ];
      const pNew  = newcl.map((v,i)=>xy(v,i,newcl.length));
      const pLost = lost.map((v,i)=>xy(v,i,lost.length));
      return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px">
        <defs>
          <linearGradient id="g_new" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#22C55E" stop-opacity=".25"/><stop offset="100%" stop-color="#22C55E" stop-opacity="0"/></linearGradient>
        </defs>
        ${yLines}
        <path d="${pathFromPts(pNew, true)}" fill="url(#g_new)"/>
        <path d="${pathFromPts(pNew, false)}" fill="none" stroke="#22C55E" stroke-width="2.5"/>
        <path d="${pathFromPts(pLost, false)}" fill="none" stroke="#EF4444" stroke-width="2.5" stroke-dasharray="5 4"/>
        ${xLabels(monthLabels)}
        <g transform="translate(${W-220},4)">
          <rect width="10" height="10" fill="#22C55E" rx="2"/><text x="14" y="9" font-family="Inter,sans-serif" font-size="11" fill="#475569" font-weight="600">Nouveaux (+${newcl.reduce((a,b)=>a+b,0)})</text>
          <rect y="16" width="10" height="10" fill="#EF4444" rx="2"/><text x="14" y="25" font-family="Inter,sans-serif" font-size="11" fill="#475569" font-weight="600">Perdus (-${lost.reduce((a,b)=>a+b,0)})</text>
        </g>
      </svg>`;
    }

    // Fallback : conv
    return this.chartSvg.call({ state: { chartType: 'conv' }, chartSvg: this.chartSvg });
  },

  // Suggestions IA fonctionnelles
  suggestAiReply(clientId){
    const conv = this.state.conversations.find(c=>c.clientId===clientId);
    const c = this.state.clients.find(x=>x.id===clientId);
    const lastMsg = conv.messages[conv.messages.length-1].text.toLowerCase();
    let suggestion = '';
    if (lastMsg.includes('hora') || lastMsg.includes('horario')) {
      suggestion = `Hola ${c.name.split(' ')[0]}! Estamos abiertos lunes a sábado de 7h a 20h. Domingo cerrado. ¿Te puedo guardar algo? 🥖`;
    } else if (lastMsg.includes('precio') || lastMsg.includes('cuánto') || lastMsg.includes('cuanto')) {
      suggestion = `Hola ${c.name.split(' ')[0]}! Te paso los precios actuales : pan amasado 3 500 CLP/kg, empanadas 2 200 CLP, tortas desde 28 000 CLP. ¿Algo te interesa?`;
    } else if (lastMsg.includes('delivery') || lastMsg.includes('entrega')) {
      suggestion = `Sí ${c.name.split(' ')[0]}, hacemos delivery gratis sobre 15 000 CLP en Providencia y Santiago centro. ¿Dónde te lo enviamos?`;
    } else if (lastMsg.includes('gracias') || lastMsg.includes('merci')) {
      suggestion = `¡A ti ${c.name.split(' ')[0]}! Cualquier cosa estoy aquí. Buen día 💛`;
    } else {
      suggestion = `Hola ${c.name.split(' ')[0]}! Gracias por tu mensaje 😊 ¿En qué te puedo ayudar hoy?`;
    }
    document.getElementById('chatInputField').value = suggestion;
    this.toast('✨ Suggestion IA prête','success','Modifie ou envoie tel quel');
  },

  createDraft(clientId){
    const conv = this.state.conversations.find(c=>c.clientId===clientId);
    const c = this.state.clients.find(x=>x.id===clientId);
    conv.draft = `Hola ${c.name.split(' ')[0]} 👋 Brouillon généré par l'IA basé sur ton ton "${this.state.business.tone.split(',')[0]}". Modifie-moi avant d'envoyer.`;
    this.save();
    this.renderView();
    this.toast('📝 Brouillon créé','success');
  },

  // Vraie traduction du dernier message — multi-langues (Augustin 19/05/2026)
  async translateMsg(clientId, targetLangOverride){
    const conv = this.state.conversations.find(c=>c.clientId===clientId);
    if (!conv || !conv.messages || !conv.messages.length) return this.toast('Aucun message à traduire','error');
    const lastMsg = conv.messages[conv.messages.length-1];
    const sourceLang = 'es';
    let savedTarget = null;
    try { savedTarget = localStorage.getItem('nx_translate_target'); } catch(e){}
    const targetLang = targetLangOverride || savedTarget || (this.state.lang === 'es' ? 'fr' : this.state.lang) || 'fr';
    try { localStorage.setItem('nx_translate_target', targetLang); } catch(e){}
    const LANG_OPTS = [
      {k:'fr',f:'🇫🇷',l:'Français'},{k:'en',f:'🇬🇧',l:'English'},{k:'es',f:'🇨🇱',l:'Español'},
      {k:'pt',f:'🇧🇷',l:'Português'},{k:'it',f:'🇮🇹',l:'Italiano'},{k:'de',f:'🇩🇪',l:'Deutsch'},
      {k:'nl',f:'🇳🇱',l:'Nederlands'},{k:'ja',f:'🇯🇵',l:'日本語'},{k:'zh',f:'🇨🇳',l:'中文'}
    ];
    const flagOf = (k) => (LANG_OPTS.find(o=>o.k===k)||{f:'',l:k}).f + ' ' + (LANG_OPTS.find(o=>o.k===k)||{l:k}).l;
    const langSwitcher = LANG_OPTS.filter(o=>o.k!==sourceLang).map(o =>
      `<button onclick="Nx.translateMsg(${clientId},'${o.k}')" style="padding:5px 10px;font-size:11.5px;font-weight:600;border-radius:8px;border:1px solid ${o.k===targetLang?'var(--blue)':'var(--line)'};background:${o.k===targetLang?'var(--blue)':'var(--bg2)'};color:${o.k===targetLang?'#fff':'var(--ink2)'};cursor:pointer">${o.f} ${o.l}</button>`
    ).join('');
    this.openModal('translation');
    const mc = document.getElementById('modal-content');
    const renderShell = (innerBody) => `
      <div class="modal-hd"><h3>🌐 Traduction du dernier message</h3><button class="modal-close" onclick="Nx.closeModal()">✕</button></div>
      <div class="modal-body" style="max-height:70vh;overflow-y:auto">
        <div style="margin-bottom:14px"><div style="font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;font-weight:700">Traduire vers</div><div style="display:flex;flex-wrap:wrap;gap:6px">${langSwitcher}</div></div>
        ${innerBody}
      </div>
      <div class="modal-foot"><button class="btn btn-p" onclick="Nx.closeModal()">OK</button></div>`;
    mc.innerHTML = renderShell(`<div style="text-align:center;padding:30px;color:var(--muted)"><div style="font-size:24px;margin-bottom:8px">⏳</div>Traduction en cours via Claude…</div>`);
    try {
      const r = await fetch('/api/translate', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ texts: [lastMsg.text], target: targetLang, source: sourceLang })
      });
      const data = await r.json();
      const translated = (data.translations && data.translations[0]) || lastMsg.text;
      const body = `
        <div style="margin-bottom:14px"><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">${flagOf(sourceLang)} (original)</div><div style="padding:12px 14px;background:var(--bg2);border-radius:8px;font-size:13.5px">${lastMsg.text}</div></div>
        <div><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">${flagOf(targetLang)} (auto)</div><div style="padding:12px 14px;background:var(--blue-soft);border-radius:8px;font-size:13.5px;color:var(--blue-ink)">${translated}</div></div>
        <div style="margin-top:10px;font-size:10px;color:var(--muted);text-align:right">${data.model||''}</div>`;
      mc.innerHTML = renderShell(body);
    } catch(e) {
      mc.innerHTML = renderShell(`<div style="padding:30px;text-align:center;color:var(--red)">❌ Erreur : ${String(e).slice(0,100)}</div>`);
    }
  },

  openClientCard(clientId){
    const c = this.state.clients.find(x=>x.id===clientId);
    if (c) this.openModal('client-v2', c);
  },

  sendMessage(clientId){
    const input = document.getElementById('chatInputField');
    const txt = input.value.trim();
    if (!txt) return;
    const conv = this.state.conversations.find(c=>c.clientId===clientId);
    conv.messages.push({from:'me',text:txt,time:'À l\'instant'});
    conv.unread = false;
    conv.draft = null;
    this.save();
    input.value = '';
    this.renderView();
    this.toast('Message envoyé','success');

    // Simulate AI response 2s later
    setTimeout(() => {
      const autoReplies = ['Perfecto, gracias Carlos! 😊','Dale, lo anoto.','Mil gracias! Nos vemos mañana 🥖','Genial, ¿a qué hora?'];
      conv.messages.push({from:'them',text:autoReplies[Math.floor(Math.random()*autoReplies.length)],time:'À l\'instant'});
      conv.unread = true;
      this.save();
      if (this.state.view === 'inbox' && this.state.activeConv === clientId) this.renderView();
      this.toast('💬 Nouvelle réponse','info');
    }, 2000);
  },

  sendDraft(clientId){
    const conv = this.state.conversations.find(c=>c.clientId===clientId);
    if (conv.draft) {
      conv.messages.push({from:'me',text:conv.draft,time:'À l\'instant'});
      conv.draft = null;
      conv.unread = false;
      this.save();
      this.renderView();
      this.toast('✓ Brouillon envoyé','success');
    }
  },

  editDraft(clientId){
    const conv = this.state.conversations.find(c=>c.clientId===clientId);
    document.getElementById('chatInputField').value = conv.draft;
    conv.draft = null;
    this.save();
    this.renderView();
  },

  regenDraft(clientId){
    const conv = this.state.conversations.find(c=>c.clientId===clientId);
    const alts = [
      'Hola! Con gusto te guardo lo que necesitas para mañana 🥖',
      'Claro que sí! Pásame la hora y lo dejo listo 😊',
      'Perfecto, te lo confirmo. Nos vemos mañana!'
    ];
    conv.draft = alts[Math.floor(Math.random()*alts.length)];
    this.save();
    this.renderView();
    this.toast('🔄 Brouillon reformulé','info');
  },

  // Vraie traduction des 5 derniers messages — multi-langues (FR/ES/EN/PT/IT/DE/+)
  // Augustin 19/05/2026 : "il faut aussi en anglais et en plusieurs langues"
  async translateConv(clientId, targetLangOverride){
    const conv = this.state.conversations.find(c => c.clientId === clientId);
    if (!conv || !conv.messages || !conv.messages.length) return this.toast('Aucun message à traduire','error');
    const sourceLang = 'es';
    // Langue cible : override (clic sur switcher) > localStorage > langue app > FR
    let savedTarget = null;
    try { savedTarget = localStorage.getItem('nx_translate_target'); } catch(e){}
    const targetLang = targetLangOverride || savedTarget || (this.state.lang === 'es' ? 'fr' : this.state.lang) || 'fr';
    try { localStorage.setItem('nx_translate_target', targetLang); } catch(e){}
    const lastMsgs = conv.messages.slice(-5);
    const cl = (this.state.clients||[]).find(x=>x.id===clientId)||{};
    const LANG_OPTS = [
      {k:'fr',f:'🇫🇷',l:'Français'},{k:'en',f:'🇬🇧',l:'English'},{k:'es',f:'🇨🇱',l:'Español'},
      {k:'pt',f:'🇧🇷',l:'Português'},{k:'it',f:'🇮🇹',l:'Italiano'},{k:'de',f:'🇩🇪',l:'Deutsch'},
      {k:'nl',f:'🇳🇱',l:'Nederlands'},{k:'ja',f:'🇯🇵',l:'日本語'},{k:'zh',f:'🇨🇳',l:'中文'}
    ];
    const langSwitcher = LANG_OPTS.filter(o=>o.k!==sourceLang).map(o =>
      `<button onclick="Nx.translateConv(${clientId},'${o.k}')" style="padding:5px 10px;font-size:11.5px;font-weight:600;border-radius:8px;border:1px solid ${o.k===targetLang?'var(--blue)':'var(--line)'};background:${o.k===targetLang?'var(--blue)':'var(--bg2)'};color:${o.k===targetLang?'#fff':'var(--ink2)'};cursor:pointer;transition:all .15s">${o.f} ${o.l}</button>`
    ).join('');
    this.openModal('translation');
    const mc = document.getElementById('modal-content');
    const renderShell = (innerBody) => `
      <div class="modal-hd"><h3>🌐 Traduction · ${cl.name||'Client'}</h3><button class="modal-close" onclick="Nx.closeModal()">✕</button></div>
      <div class="modal-body" style="max-height:70vh;overflow-y:auto">
        <div style="margin-bottom:14px"><div style="font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;font-weight:700">Traduire vers</div><div style="display:flex;flex-wrap:wrap;gap:6px">${langSwitcher}</div></div>
        ${innerBody}
      </div>
      <div class="modal-foot"><button class="btn btn-s" onclick="Nx.closeModal()">Fermer</button></div>`;
    mc.innerHTML = renderShell(`<div style="text-align:center;padding:40px;color:var(--muted)"><div style="font-size:24px;margin-bottom:8px">⏳</div>Traduction en cours via Claude…</div>`);
    try {
      const r = await fetch('/api/translate', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ texts: lastMsgs.map(m=>m.text), target: targetLang, source: sourceLang })
      });
      const data = await r.json();
      const translations = data.translations || lastMsgs.map(m=>m.text);
      const flagOf = (k) => (LANG_OPTS.find(o=>o.k===k)||{f:'',l:k}).f + ' ' + (LANG_OPTS.find(o=>o.k===k)||{l:k}).l;
      const body = `
        <div style="font-size:11px;color:var(--muted);margin-bottom:12px">${flagOf(sourceLang)} → ${flagOf(targetLang)} · ${data.model||''}</div>
        ${lastMsgs.map((m,i)=>`
          <div style="margin-bottom:14px;padding:12px 14px;border:1px solid var(--line);border-radius:10px">
            <div style="font-size:11px;color:var(--muted);margin-bottom:4px">${m.from==='client'?'👤 '+(cl.name||'Client'):'🥖 Toi'} · ${m.time||''}</div>
            <div style="font-size:13px;margin-bottom:8px;color:var(--ink)">${m.text}</div>
            <div style="font-size:13px;padding:8px 10px;background:var(--blue-soft);border-radius:6px;color:var(--blue-ink)"><b style="font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--blue);display:block;margin-bottom:3px">${flagOf(targetLang)}</b>${translations[i]||m.text}</div>
          </div>
        `).join('')}`;
      mc.innerHTML = renderShell(body);
    } catch (e) {
      mc.innerHTML = renderShell(`<div style="padding:30px;text-align:center;color:var(--red)">❌ Erreur de traduction : ${String(e).slice(0,100)}</div>`);
    }
  },

  confirmDeleteClient(id, ev){
    if (ev) ev.stopPropagation();
    const c = this.state.clients.find(x => x.id === id);
    if (!c) return;
    if (!confirm(`Éliminer ${c.name} du CRM ?\n\nNexus se trompe parfois. Tu peux retirer ce client si ce n'en est pas un (ex : ta mère, un fournisseur, une erreur).\n\nL'historique sera conservé 30 jours en cas de regret.`)) return;
    this.state.clients = this.state.clients.filter(x => x.id !== id);
    this.save();
    this.renderView();
    this.toast(`✓ ${c.name} retiré du CRM`, 'success', 'Tu peux le restaurer dans Paramètres > Corbeille pendant 30 jours');
  },

  // POINT CRM (d) — Scroll vers le podium top 3 (ou ouvre la fiche du #1)
  scrollToTopClients(){
    const el = document.getElementById('crmPodium');
    if (el) { el.scrollIntoView({behavior:'smooth', block:'start'}); el.style.outline='3px solid var(--blue)'; setTimeout(()=>{el.style.outline=''},1400); }
    else {
      const top = this.state.clients.filter(c=>c.status==='active').sort((a,b)=>b.score-a.score)[0];
      if (top) this.openClientCard(top.id);
    }
  },

  // POINT CRM (a) — Input debouncé (250ms) + restore focus + cursor
  onCrmSearchInput(value){
    this.state.crmSearch = value;
    if (this._crmSearchTimer) clearTimeout(this._crmSearchTimer);
    this._crmSearchTimer = setTimeout(() => {
      this.renderView();
      // Restore focus + cursor to the end after re-render
      const input = document.getElementById('crmSearchInput');
      if (input) {
        input.focus();
        const v = input.value;
        input.value = '';
        input.value = v;
      }
    }, 250);
  },

  // ---------- CRM VIEW ----------
  viewCrm(){
    const filter = this.state.crmFilter || 'all';
    const search = (this.state.crmSearch || '').toLowerCase();
    let clients = this.state.clients;
    if (filter==='active') clients = clients.filter(c=>c.status==='active');
    else if (filter==='prospect') clients = clients.filter(c=>c.status==='prospect');
    else if (filter==='lost') clients = clients.filter(c=>c.status==='lost');
    else if (filter==='vip') clients = clients.filter(c=>c.tags&&c.tags.includes('VIP'));
    else if (filter==='biz') clients = clients.filter(c=>c.tag==='biz'||(c.tags&&c.tags.includes('Business')));
    else if (filter==='occ') clients = clients.filter(c=>c.tag==='occ');
    else if (filter.startsWith('custom_')) {
      const idx = parseInt(filter.slice(7), 10);
      const seg = (this.state.customSegments||[])[idx];
      if (seg && seg.clientIds) clients = clients.filter(c => seg.clientIds.includes(c.id));
    }
    if (search) clients = clients.filter(c=>c.name.toLowerCase().includes(search) || c.notes.toLowerCase().includes(search));

    const sortMode = this.state.crmSort || 'score';
    if (sortMode === 'score') clients.sort((a,b)=>b.score-a.score);
    else if (sortMode === 'name') clients.sort((a,b)=>a.name.localeCompare(b.name));
    else if (sortMode === 'recent') clients.sort((a,b)=>(b.spent||0)-(a.spent||0));
    else if (sortMode === 'orders') clients.sort((a,b)=>b.orders-a.orders);

    const visible = this.state.crmShowAll ? clients : clients.slice(0, 8);

    return `
      <div class="view">
        <div class="page-hd">
          <div><h1>👥 Clients & CRM</h1><div class="sub">${this.state.clients.length} clients · ${this.state.clients.filter(c=>c.status==='active').length} actifs · ${this.state.clients.filter(c=>c.status==='lost').length} perdus</div></div>
          <div class="flex">
            <!-- POINT CRM (d) — Bouton Top client : scroll vers podium top 3 -->
            <button class="btn btn-s" onclick="Nx.scrollToTopClients()">🏆 Top client</button>

            <button class="btn btn-p" onclick="Nx.openAddClientModal()">+ Ajouter un client</button>
          </div>
        </div>
        <!-- POINT CRM (c) — Chat Claude CRM en floating button bas-droit (conseils IA) -->
        <button onclick="Nx.openCrmAiChat()" title="Conseils IA · Chat Claude branché à ton CRM" aria-label="Chat Claude CRM" style="position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--violet));color:#fff;border:0;cursor:pointer;font-size:24px;box-shadow:0 8px 24px -8px rgba(122,60,255,.5);z-index:80;transition:transform .2s" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">🤖</button>

        <div class="filter-bar">
          <div style="flex:1;max-width:320px">
            <!-- POINT CRM (a) — input debouncé, ne re-render pas à chaque touche -->
            <input id="crmSearchInput" class="form-ctrl" placeholder="${t('crm.search')}" value="${this.state.crmSearch||''}" oninput="Nx.onCrmSearchInput(this.value)">
          </div>
          <!-- Filter pills CRM : pastilles couleur unifiées (Augustin 19/05) — sans emoji thématique -->
          <button class="filter-pill ${filter==='all'?'on':''}" onclick="Nx.state.crmFilter='all';Nx.renderView()">Tous (${this.state.clients.length})</button>
          <button class="filter-pill seg-rec ${filter==='active'?'on':''}" onclick="Nx.state.crmFilter='active';Nx.renderView()"><span class="seg-dot"></span>Actifs (${this.state.clients.filter(c=>c.status==='active').length})</button>
          <button class="filter-pill seg-new ${filter==='prospect'?'on':''}" onclick="Nx.state.crmFilter='prospect';Nx.renderView()"><span class="seg-dot"></span>Prospects (${this.state.clients.filter(c=>c.status==='prospect').length})</button>
          <button class="filter-pill seg-lost ${filter==='lost'?'on':''}" onclick="Nx.state.crmFilter='lost';Nx.renderView()"><span class="seg-dot"></span>Perdus (${this.state.clients.filter(c=>c.status==='lost').length})</button>
          <button class="filter-pill seg-vip ${filter==='vip'?'on':''}" onclick="Nx.state.crmFilter='vip';Nx.renderView()"><span class="seg-dot"></span>VIP (${this.state.clients.filter(c=>c.tags&&c.tags.includes('VIP')).length})</button>
          <button class="filter-pill seg-biz ${filter==='biz'?'on':''}" onclick="Nx.state.crmFilter='biz';Nx.renderView()"><span class="seg-dot"></span>Business (${this.state.clients.filter(c=>c.tag==='biz'||(c.tags&&c.tags.includes('Business'))).length})</button>
          <button class="filter-pill seg-occ ${filter==='occ'?'on':''}" onclick="Nx.state.crmFilter='occ';Nx.renderView()"><span class="seg-dot"></span>Occasionnels (${this.state.clients.filter(c=>c.tag==='occ').length})</button>
          <!-- Segments personnalisés (créés par l'user) -->
          ${(this.state.customSegments||[]).map((s,i) => `

          `).join('')}
          <button class="filter-pill" style="border-style:dashed;color:var(--violet);border-color:var(--violet)" onclick="Nx.openCreateSegmentModal()" title="Créer un segment personnalisé">+ Nouveau segment</button>

            <h3 style="color:#78350F">🏆 Podium — Top 3 du mois</h3>
            <span style="font-size:11px;color:#92400E;background:#FCD34D;padding:4px 10px;border-radius:999px;font-weight:700">★ Tes meilleurs ambassadeurs</span>
          </div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px">
            ${this.state.clients.filter(c=>c.status==='active').sort((a,b)=>b.score-a.score).slice(0,3).map((c,i)=>`

                <div style="position:absolute;top:-12px;left:18px;width:34px;height:34px;border-radius:50%;background:${i===0?'#F59E0B':i===1?'#94A3B8':'#B45309'};color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;box-shadow:0 4px 12px rgba(0,0,0,.2)">${i===0?'🥇':i===1?'🥈':'🥉'}</div>
                <div style="display:flex;gap:14px;align-items:center;margin-top:6px;margin-bottom:14px">

  saveMeeting(){
    const client = (document.getElementById('mtgClient')||{}).value || '';
    const dateStr = (document.getElementById('mtgDate')||{}).value || '';
    const timeStr = (document.getElementById('mtgTime')||{}).value || '10:00';
    const place = (document.getElementById('mtgPlace')||{}).value || '';
    const topic = (document.getElementById('mtgTopic')||{}).value || '';
    if (!client || !dateStr) {
      this.toast('Client + date requis','warn');
      return;
    }
    if (!this.state.meetings) this.state.meetings = [];
    const newMeeting = {
      id: Date.now(),
      dateISO: dateStr + 'T' + timeStr,
      client, place, topic
    };
    this.state.meetings.push(newMeeting);
    this.save();
    this.closeModal();
    this.toast('✓ Réunion ajoutée','success', `${client} · ${dateStr} ${timeStr}`);
    this.renderView();
    // Propose d'ouvrir Google Calendar pour synchroniser
    setTimeout(() => {
      if (confirm('Ouvrir Google Calendar pour synchroniser cette réunion ?')) {
        this.openMeetingInCalendar(newMeeting.id);
      }
    }, 400);
  },

  // Ouvre Google Calendar (vraie URL) avec l'event pré-rempli
  openMeetingInCalendar(id){
    const m = (this.state.meetings||[]).find(x => x.id === id);
    if (!m) return;
    // Format Google Calendar : YYYYMMDDTHHMMSS
    const start = new Date(m.dateISO);
    const end = new Date(start.getTime() + 60 * 60 * 1000); // +1h
    const fmt = (d) => d.toISOString().replace(/[-:]/g,'').replace(/\.\d{3}/,'');
    const params = new URLSearchParams({
      action: 'TEMPLATE',
      text: `${m.client} — ${m.topic||'Réunion'}`,
      dates: `${fmt(start)}/${fmt(end)}`,
      details: `Réunion programmée via Nexus.\n\nClient: ${m.client}\nSujet: ${m.topic||'—'}\nLieu: ${m.place||'—'}`,
      location: m.place || ''
    });
    const url = 'https://calendar.google.com/calendar/u/0/r/eventedit?' + params.toString();
    window.open(url, '_blank', 'noopener');
    this.toast('📅 Google Calendar ouvert','success','Vérifie l\'onglet ouvert');
  },

  deleteMeeting(id){
    if (!confirm('Supprimer cette réunion ?')) return;
    this.state.meetings = (this.state.meetings||[]).filter(m => m.id !== id);
    this.save();
    this.renderView();
    this.toast('🗑 Réunion supprimée','info');
  },

  exportCsvDo(){
    const filter = document.getElementById('csvFilter').value;
    const fmt = this.state._csvFmt || 'excel';
    let list = this.state.clients;
    if (filter === 'vip') list = list.filter(c=>c.tags.includes('VIP'));
    else if (filter === 'lost') list = list.filter(c=>c.status==='lost');
    else if (filter === 'rec') list = list.filter(c=>c.tag==='rec');
    else if (filter === 'occ') list = list.filter(c=>c.tag==='');
    else if (filter === 'biz') list = list.filter(c=>c.tag==='biz');
    else if (filter === 'new') list = list.filter(c=>c.tag==='new'||c.status==='prospect');

    const headers = ['Nom','Téléphone','Email','Score','Commandes','Total CLP','Statut','Dernière interaction'];
    const rows = list.map(c=>[c.name, c.phone, c.email||'', c.score, c.orders, c.spent, c.status, c.lastSeen]);
    const csv = [headers.join(','), ...rows.map(r=>r.map(x=>`"${(''+x).replace(/"/g,'""')}"`).join(','))].join('\n');
    const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `nexus-clients-${filter}-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    this.closeModal();
    this.toast('✓ '+list.length+' clients exportés', 'success', fmt === 'sheet' ? 'Importez ce fichier dans Google Sheets' : 'CSV téléchargé');
  },

  askCrmAi(preset){

    const msgs = document.getElementById('crmAiMessages');

    if (input) input.value = '';

    setTimeout(() => {
      const qLow = q.toLowerCase();
      let answer = '';
      if (qLow.includes('top') || qLow.includes('meilleur')) {
        const top3 = this.state.clients.filter(c=>c.status==='active').sort((a,b)=>b.spent-a.spent).slice(0,3);
        answer = `🏆 Top 3 par CA cumulé :<br>${top3.map((c,i)=>`${i+1}. <b>${c.name}</b> — ${(c.spent/1000).toFixed(0)}k CLP · ${c.orders} commandes · score ${c.score}/100`).join('<br>')}`;
      } else if (qLow.includes('relancer') || qLow.includes('perdu')) {
        const lost = this.state.clients.filter(c=>c.status==='lost');
        answer = `💔 ${lost.length} clients à relancer :<br>${lost.map(c=>`• <b>${c.name}</b> (${c.lastSeen}) — ex-CA ${(c.spent/1000).toFixed(0)}k CLP`).join('<br>')}<br><br>Veux-tu que je crée une campagne de récupération ?`;
      } else if (qLow.includes('anniv')) {
        answer = `📅 1 anniversaire cette semaine : <b>María González</b> (14 août). Préparer un message personnalisé ?`;
      } else if (qLow.includes('segment') || qLow.includes('ca')) {
        const vip = this.state.clients.filter(c=>c.tags.includes('VIP'));
        const totalVip = vip.reduce((s,c)=>s+c.spent,0);
        answer = `💰 CA par segment ce mois (estimé) :<br>• VIP : ${(totalVip/1000).toFixed(0)}k CLP (${vip.length} clients)<br>• Récurrents : ~840k CLP<br>• Nouveaux : ~120k CLP<br>• Occasionnels : ~340k CLP`;
      } else {
        answer = `🤖 Bonne question. Je peux te donner : top clients, ceux à relancer, anniversaires, CA par segment, ou recommandations personnalisées. Reformule si besoin.`;

  toggleBriefAudio(){

      this.state.audioPlayState.paused = true;
      if (btn) btn.textContent = '▶';

      this.state.audioPlayState.paused = false;
      if (btn) btn.textContent = '⏸';

      this.state.audioPlayState.paused = false;
      if (btn) btn.textContent = '⏸';

  // Donut dynamique selon repRange (Augustin 19/05/2026 — les segments doivent changer)
  donutSvg(){
    const range = this.state.repRange || 'month';
    // Doit matcher exactement renderRepartition() pour cohérence visuelle
    const data = {
      month:   { segs:[{c:'#1A56DB',p:68},{c:'#22C55E',p:18},{c:'#F59E0B',p:10},{c:'#FF6B6B',p:4}], total:342 },
      quarter: { segs:[{c:'#1A56DB',p:62},{c:'#22C55E',p:22},{c:'#F59E0B',p:11},{c:'#FF6B6B',p:5}], total:1096 },
      all:     { segs:[{c:'#1A56DB',p:58},{c:'#22C55E',p:24},{c:'#F59E0B',p:12},{c:'#FF6B6B',p:6}], total:3415 }
    };
    const d = data[range] || data.month;
    // Calcule offsets cumulatifs (chaque segment commence où le précédent finit)
    // stroke-dasharray = "longueur 100-longueur" ; stroke-dashoffset = -cumulatif
    let cumul = 25; // décalage initial pour partir en haut (rotate -90 + offset 25)
    const circles = d.segs.map(s => {
      const c = `<circle cx="21" cy="21" r="15.915" fill="transparent" stroke="${s.c}" stroke-width="4" stroke-dasharray="${s.p} ${100-s.p}" stroke-dashoffset="${cumul}" transform="rotate(-90 21 21)"/>`;
      cumul -= s.p;
      return c;
    }).join('');
    const totalStr = d.total.toLocaleString('fr-FR').replace(',', ' ');
    return `<svg width="140" height="140" viewBox="0 0 42 42">
      <circle cx="21" cy="21" r="15.915" fill="transparent" stroke="#F1F5F9" stroke-width="4"/>
      ${circles}
      <text x="21" y="22" text-anchor="middle" dominant-baseline="middle" font-size="${totalStr.length>4?'4':'5'}" font-weight="800" fill="currentColor">${totalStr}</text>

    </svg>`;
  },

  // Lit l'agenda depuis localStorage (partagé avec core.html)
  getAgendaItems(){
    try {
      const raw = localStorage.getItem('nx_agenda');
      return raw ? JSON.parse(raw) : [];
    } catch(e){ return []; }
  },
  saveAgendaItems(items){
    try { localStorage.setItem('nx_agenda', JSON.stringify(items)); } catch(e){}
  },

  cancelAgendaItem(id){
    const items = this.getAgendaItems();
    const idx = items.findIndex(i => i.id === id);
    if (idx < 0) return;
    items[idx].status = 'cancelled';
    items[idx].cancelledAt = new Date().toISOString();
    this.saveAgendaItems(items);
    this.toast(t('pilotage.toast.cancelled'), 'info');
    this.renderView();
  },
  reactivateAgendaItem(id){
    const items = this.getAgendaItems();
    const idx = items.findIndex(i => i.id === id);
    if (idx < 0) return;
    items[idx].status = 'scheduled';
    delete items[idx].cancelledAt;
    this.saveAgendaItems(items);
    this.toast(t('pilotage.toast.reactivated'), 'success');
    this.renderView();
  },
  modifyAgendaItem(id){
    const items = this.getAgendaItems();
    const it = items.find(i => i.id === id);
    if (!it) return;
    const newWhen = prompt('Nouvelle date/heure (ex: Vendredi 19h) :', it.when || '');
    if (newWhen === null) return;
    it.when = newWhen.trim() || it.when;
    it.modifiedAt = new Date().toISOString();
    this.saveAgendaItems(items);
    this.toast(t('pilotage.toast.modified'), 'success');
    this.renderView();
  },
  duplicateAgendaItem(id){
    const items = this.getAgendaItems();
    const src = items.find(i => i.id === id);
    if (!src) return;
    const copy = Object.assign({}, src, {
      id: 'agd_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
      status: 'scheduled',
      createdAt: new Date().toISOString()
    });
    delete copy.cancelledAt;
    delete copy.doneAt;
    items.push(copy);
    this.saveAgendaItems(items);
    this.state.pilotageTab = 'scheduled';
    this.save();
    this.toast('Action dupliquée → onglet Programmé', 'success');
    this.renderView();
  },

  // RENDER CAMPAGNE AUTO — lit state.autoCampaignDetails pour les overrides user
  // Fix Augustin 19/05 : quand on modifie le nom dans le builder, ça s'actualise vraiment ici
  renderAutoCampaign(id, ic, color, title, desc, status){
    const stored = (this.state.autoCampaignStatus||{})[id];
    if (stored === 'deleted') return '';
    const realStatus = stored || status;
    // Override depuis state si l'utilisateur a modifié cette campagne
    const det = (this.state.autoCampaignDetails||{})[id];
    let realTitle = title, realDesc = desc;
    if (det) {
      if (det.name) realTitle = det.name;
      // Reconstruit desc depuis cfg + trigger + target
      const targetLabels = { vip:'VIP', rec:'Récurrents', new:'Nouveaux', norm:'Normaux', lost:'Perdus', all:'Tous' };
      const tgt = targetLabels[det.target] || det.target || '';
      const parts = [];
      if (det.trigger === 'monthly' && det.cfg)      parts.push(`Le ${det.cfg.day||'?'} de chaque mois à ${det.cfg.time||'09:00'}`);
      else if (det.trigger === 'weekly' && det.cfg)  parts.push(`Chaque ${det.cfg.weekday||'?'} à ${det.cfg.time||'17:00'}`);
      else if (det.trigger === 'birthday')           parts.push(`Veille des anniversaires à ${(det.cfg&&det.cfg.time)||'09:00'}`);
      else if (det.trigger === 'silence' && det.cfg) parts.push(`Si silence > ${det.cfg.silenceDays||'?'} jours`);
      else if (det.trigger === 'weather')            parts.push('Selon météo');
      else if (det.trigger === 'stat')               parts.push('Selon stat seuil');
      if (tgt) parts.push(`cible ${tgt}`);
      if (parts.length) realDesc = parts.join(' · ');
    }
    return `
      <div style="padding:14px 16px;background:var(--bg2);border:1px solid var(--line);border-radius:11px;display:flex;align-items:center;gap:14px;margin-bottom:8px">
        <div style="width:42px;height:42px;border-radius:11px;background:${color}22;color:${color};display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">${ic}</div>
        <div style="flex:1">
          <div style="font-weight:700;font-size:13.5px">${realTitle}</div>
          <div style="font-size:11.5px;color:var(--muted);margin-top:2px">${realDesc}</div>
        </div>
        <span class="chip ${realStatus==='active'?'green':''}" style="font-size:11px;${realStatus!=='active'?'background:#94A3B822;color:#475569':''}">${realStatus==='active'?'● Active':'○ Pause'}</span>
        <button class="btn-g" onclick="Nx.toggleAutoStatus('${id}')" title="${realStatus==='active'?'Mettre en pause':'Activer'}">${realStatus==='active'?'⏸ Pause':'▶ Activer'}</button>
        <button class="btn-g" onclick="Nx.editAutoCampaign('${id}')" title="Modifier">✏️</button>
        <button class="btn-g" style="color:var(--red)" onclick="Nx.deleteAutoCampaign('${id}')" title="Supprimer">🗑</button>
      </div>`;
  },

  toggleAutoStatus(id){
    // POINT CAMPAGNES (e) — Activer/Pause fonctionnel pour les 3 auto-campagnes
    if (!this.state.autoCampaignStatus) this.state.autoCampaignStatus = {};
    const labelMap = {'recovery-lost':'Récupération clients perdus','anniv-clients':'Anniversaires clients','promo-fin-mois':'Promo fin de mois'};
    if (id === 'recovery-lost') {
      this.state.recoveryStatus = (this.state.recoveryStatus === 'active') ? 'paused' : 'active';
      this.state.autoCampaignStatus[id] = this.state.recoveryStatus;
    } else {
      const cur = this.state.autoCampaignStatus[id] || 'active';
      this.state.autoCampaignStatus[id] = (cur === 'active') ? 'paused' : 'active';
    }
    this.save();
    this.renderView();
    const newState = this.state.autoCampaignStatus[id] || (id==='recovery-lost'?this.state.recoveryStatus:'active');
    this.toast(newState==='active'?'✓ '+(labelMap[id]||id)+' ACTIVÉE':'⏸ '+(labelMap[id]||id)+' mise en pause','success');
  },
  editAutoCampaign(id){
    // Fix Augustin 19/05 : avec le crayon, ça modifie pas le contenu
    // → on passe l'id à openAutoCampaign pour qu'il pré-remplisse TOUS les champs depuis state
    this.openAutoCampaign(id);
    this.toast('✏️ Édition en cours', 'info', id);
  },
  deleteAutoCampaign(id){
    // POINT CAMPAGNES (e) — Suppression réelle (marque l'auto comme deleted)
    if (!confirm('Supprimer cette automatisation ?\n\nElle ne sera plus jamais déclenchée.')) return;
    if (!this.state.autoCampaignStatus) this.state.autoCampaignStatus = {};
    this.state.autoCampaignStatus[id] = 'deleted';
    this.save();
    this.toast('🗑 Automatisation supprimée','success', id);
    this.renderView();
  },

  // POINT CAMPAGNES (h) — Filtre live de la sélection client
  filterSegClients(query){
    const q = (query || '').trim().toLowerCase();
    document.querySelectorAll('.seg-client-item').forEach(el => {
      const name = (el.dataset.name || '');
      el.style.display = (!q || name.includes(q)) ? '' : 'none';
    });

  saveCustomSegment(){
    const name = document.getElementById('segName').value.trim();
    const criteria = document.getElementById('segCriteria').value.trim();
    if (!name) { this.toast('Nom requis','warn'); return; }
    const checks = document.querySelectorAll('.seg-client-check:checked');
    const ids = Array.from(checks).map(c => +c.dataset.id);
    if (ids.length === 0) { this.toast('Sélectionne au moins 1 client','warn'); return; }
    this.state.customSegments.push({ name, criteria, clientIds: ids });
    this.save();
    this.closeModal();
    this.toast('📌 Segment "'+name+'" créé','success', ids.length+' clients');
    this.renderView();
  },
  deleteCustomSegment(i){
    if (!confirm('Supprimer ce segment personnalisé ?')) return;
    this.state.customSegments.splice(i,1);
    this.save();
    this.renderView();
    this.toast('Segment supprimé','success');
  },

  // Modifier une réunion existante (pré-remplit le modal)
  editMeeting(id){
    const m = (this.state.meetings||[]).find(x => x.id === id);
    if (!m) return;
    this.addMeeting();
    setTimeout(() => {
      const dStr = m.dateISO.slice(0,10);
      const tStr = m.dateISO.slice(11,16);
      const el = (k) => document.getElementById(k);
      if (el('mtgClient')) el('mtgClient').value = m.client || '';
      if (el('mtgDate'))   el('mtgDate').value = dStr;
      if (el('mtgTime'))   el('mtgTime').value = tStr;
      if (el('mtgPlace'))  el('mtgPlace').value = m.place || '';
      if (el('mtgTopic'))  el('mtgTopic').value = m.topic || '';
      // Remplace le bouton "Créer" par "Modifier"
      const foot = document.querySelector('.modal-foot');
      if (foot) {
        const btn = foot.querySelector('.btn-p');
        if (btn) { btn.textContent = '💾 Enregistrer les modifications'; btn.onclick = () => Nx.saveMeetingEdit(id); }
      }
      const hd = document.querySelector('.modal-hd h3');
      if (hd) hd.textContent = '✏️ Modifier la réunion';
    }, 60);
  },

  saveMeetingEdit(id){
    const m = (this.state.meetings||[]).find(x => x.id === id);
    if (!m) return;
    const dateStr = (document.getElementById('mtgDate')||{}).value || '';
    const timeStr = (document.getElementById('mtgTime')||{}).value || '10:00';
    m.client = (document.getElementById('mtgClient')||{}).value || m.client;
    m.dateISO = dateStr + 'T' + timeStr;
    m.place = (document.getElementById('mtgPlace')||{}).value || m.place;
    m.topic = (document.getElementById('mtgTopic')||{}).value || m.topic;
    this.save();
    this.closeModal();
    this.toast('✓ Réunion modifiée','success', m.client);
    this.renderView();

  resendCampaign(campaignId){
    const c = this.state.campaigns.find(x=>x.id===campaignId);
    if (!c) { this.toast('Campagne introuvable','warn'); return; }
    if (!confirm('Renvoyer "'+c.name+'" à la même cible ('+c.audience+') ?')) return;
    const newC = {...c, id: Date.now(), date: 'Aujourd\'hui', status:'running', sent:0, opened:0, replied:0};

    this.save();

  // Nouveau calendrier intuitif (Augustin 19/05) — chips presets + datepicker stylisé + récurrence visuelle

    const sched = document.getElementById('campSchedule');

    // Toggle visuel chips
    document.querySelectorAll('.cal-chip').forEach(c => c.classList.toggle('on', c.dataset.preset === preset));
    const extra = document.getElementById('campScheduleExtra');
    if (!extra) return;
    if (preset === 'custom') {
      // Date + heure : 2 champs séparés, plus joli qu'un seul datetime-local
      const now = new Date();
      now.setDate(now.getDate() + 1); // demain par défaut
      const dateStr = now.toISOString().slice(0,10);
      extra.classList.remove('hidden');
      extra.innerHTML = `
        <div class="cal-custom-grid">
          <div>
            <label class="cal-lbl">📅 Date d'envoi</label>
            <input type="date" class="form-ctrl cal-input" id="campCustomDate" value="${dateStr}" min="${new Date().toISOString().slice(0,10)}" onchange="Nx.updateCampScheduleRecap()">
          </div>
          <div>
            <label class="cal-lbl">⏰ Heure</label>
            <input type="time" class="form-ctrl cal-input" id="campCustomTime" value="09:00" onchange="Nx.updateCampScheduleRecap()">
          </div>
        </div>
        <div class="cal-quick-hours">
          <span class="cal-quick-lbl">Suggestions :</span>

  // Recalcule le texte de récap "Envoi prévu : ..." selon le preset actif
  updateCampScheduleRecap(){
    const preset = document.getElementById('campSchedule')?.value || 'dimanche19';
    const recap = document.getElementById('campScheduleRecapText');
    if (!recap) return;
    const fr = (d) => d.toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
    const cap = (s) => s.charAt(0).toUpperCase() + s.slice(1);
    let txt = '';
    const today = new Date();
    if (preset === 'now') {
      txt = `${cap(fr(today))} à ${today.getHours()}h${String(today.getMinutes()).padStart(2,'0')} <span class="cal-recap-tag">maintenant</span>`;
    } else if (preset === 'dimanche19') {
      const d = new Date(today);
      d.setDate(d.getDate() + ((7 - d.getDay()) % 7 || 7));
      txt = `${cap(fr(d))} à 19h00 <span class="cal-recap-tag cal-peak-tag">🔥 peak</span>`;
    } else if (preset === 'demain9') {
      const d = new Date(today); d.setDate(d.getDate() + 1);
      txt = `${cap(fr(d))} à 9h00`;
    } else if (preset === 'custom') {
      const dStr = document.getElementById('campCustomDate')?.value;
      const tStr = document.getElementById('campCustomTime')?.value;
      if (dStr) {
        const d = new Date(dStr + 'T' + (tStr||'09:00'));
        txt = `${cap(fr(d))} à ${tStr||'09:00'}`;
      } else txt = '— choisir une date —';
    } else if (preset === 'recurring') {
      const freq = document.getElementById('campScheduleRec')?.value || 'weekly';
      const fLbl = {weekly:'chaque semaine', biweekly:'tous les 15 jours', monthly:'chaque mois', quarterly:'chaque trimestre'}[freq];
      const time = document.getElementById('campRecTime')?.value || '17:00';
      txt = `Récurrent · <b>${fLbl}</b> à ${time} <span class="cal-recap-tag">🔁 auto</span>`;
    }
    recap.innerHTML = txt;
  },

  // Lit les valeurs du formulaire + sauve dans state.autoCampaignDetails[id]
  activateAutoCampaign(){
    if (!this.state.autoCampaignDetails) this.state.autoCampaignDetails = {};
    if (!this.state.autoCampaignStatus)  this.state.autoCampaignStatus = {};
    // Récupère les champs
    const name    = (document.getElementById('autoName')||{}).value || '';
    const trigger = (document.getElementById('autoTrigger')||{}).value || 'monthly';
    const target  = (document.getElementById('autoTarget')||{}).value || 'rec';
    const message = (document.getElementById('autoMessage')||{}).value || '';
    const antiAbusWeek    = ((document.getElementById('autoAntiAbusWeek')||{}).checked) || false;
    const antiAbusCredits = ((document.getElementById('autoAntiAbusCredits')||{}).checked) || false;
    // Lit les inputs dynamiques du déclencheur (data-cfg-key)
    const cfg = {};
    document.querySelectorAll('#autoTriggerFields [data-cfg-key]').forEach(el => {
      cfg[el.dataset.cfgKey] = el.value;
    });
    // ID : si édition → garde le même, sinon nouveau
    const id = this.state.editingAutoCampaign || ('custom-' + Date.now());
    this.state.autoCampaignDetails[id] = { name, trigger, target, message, cfg, antiAbusWeek, antiAbusCredits, updatedAt: new Date().toISOString() };
    this.state.autoCampaignStatus[id] = 'active';
    this.state.editingAutoCampaign = null;
    this.save();
    this.closeModal();
    // Calcule un sub utile pour le toast
    let nextRun = '';
    if (trigger === 'monthly') nextRun = `Prochaine exécution : ${cfg.day||'28'} du mois à ${cfg.time||'09:00'}`;
    else if (trigger === 'weekly') nextRun = `Prochaine exécution : ${cfg.weekday||'Vendredi'} à ${cfg.time||'17:00'}`;
    else if (trigger === 'birthday') nextRun = `Déclenchée la veille de chaque anniversaire à ${cfg.time||'09:00'}`;
    else if (trigger === 'silence') nextRun = `Déclenchée si silence > ${cfg.silenceDays||'45'} jours`;
    else nextRun = 'Déclenchement automatique configuré';
    this.toast(this.state.editingAutoCampaign?'✏️ Automatisation mise à jour':'🤖 Campagne auto activée', 'success', nextRun);
    this.renderView();
  },

    const target = document.getElementById('campTarget').value;
    let recipientCount = 120;
    let audienceLabel = target;
    if (target === 'custom') {
      const picks = document.querySelectorAll('.camp-client-pick:checked');
      recipientCount = picks.length;
      audienceLabel = `Personnalisé (${recipientCount} clients à la pince)`;
      if (recipientCount === 0) { this.toast('Sélectionne au moins 1 client','warn'); return; }

    else if (target === 'lost') { recipientCount = this.state.clients.filter(c=>c.status==='lost').length; audienceLabel='Clients perdus'; }
    else if (target === 'recurrent') { recipientCount = this.state.clients.filter(c=>c.tag==='rec').length; audienceLabel='Récurrents'; }
    else if (target === 'new') { recipientCount = this.state.clients.filter(c=>c.status==='prospect').length; audienceLabel='Nouveaux'; }
    else if (target === 'occ') { recipientCount = Math.round(this.state.clients.length*0.3); audienceLabel='Occasionnels'; }
    else if (target.startsWith('custom_')) {
      const idx = parseInt(target.split('_')[1]);
      recipientCount = this.state.customSegments[idx]?.clientIds.length || 0;
      audienceLabel = '📌 ' + (this.state.customSegments[idx]?.name||'Segment custom');
    }
    this.state.campaigns.unshift({id:Date.now(),name,sent:0,opened:0,replied:0,status:'running',date:'Aujourd\'hui',audience:audienceLabel});
    this.save();
    this.closeModal();
    this.toast('🚀 Campagne lancée','success', recipientCount+' destinataires · suivi temps réel');
    const onb = this.state.onboarding.find(s=>s.id==='campaign');
    if (onb) onb.done = true;
    this.save();
    // Simulate live counter
    const opened = Math.round(recipientCount * 0.82);
    const replied = Math.round(recipientCount * 0.20);
    setTimeout(()=>this.toast('📬 '+recipientCount+' messages envoyés','info'),1000);
    setTimeout(()=>{this.toast('👀 '+opened+' ouverts ('+Math.round(opened/recipientCount*100)+'%)','info');this.state.campaigns[0].sent=recipientCount;this.state.campaigns[0].opened=opened;this.save();},2500);
    setTimeout(()=>{this.toast('💬 '+replied+' réponses reçues','success');this.state.campaigns[0].replied=replied;this.save();},4000);
  },
