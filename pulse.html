<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1A56DB">
<title>Nexus Pulse — Cockpit Juan & Iñigo</title>
<style>
:root{
  --bg:#F7F9FC; --bg2:#EEF2F7; --panel:#FFFFFF; --ink:#0F172A; --ink2:#334155; --muted:#64748B;
  --line:#E2E8F0; --line2:#F1F5F9;
  --blue:#1A56DB; --blue-soft:#EFF4FE; --blue-ink:#1E40AF; --blue-ghost:#DBE5FD;
  --violet:#7A3CFF; --violet-soft:#F3E8FF;
  --cyan:#06B6D4; --cyan-soft:#ECFEFF;
  --green:#22C55E; --green-soft:#ECFDF5;
  --amber:#F59E0B; --amber-soft:#FFFBEB;
  --red:#EF4444; --red-soft:#FEF2F2;
  --lime:#65D940;
  --shadow:0 1px 2px rgba(15,23,42,.04), 0 4px 16px -8px rgba(15,23,42,.08);
  --shadow-lg:0 8px 32px -12px rgba(15,23,42,.16);
  --shadow-xl:0 20px 60px -20px rgba(15,23,42,.24);
  --radius:14px; --radius-sm:8px;
  --grid-pattern:radial-gradient(circle at 1px 1px,rgba(15,23,42,.06) 1px,transparent 0);
}
html[data-theme="dark"]{
  --bg:#080B11; --bg2:#0C1119; --panel:#0F1621; --ink:#E8ECF3; --ink2:#B8C1CE; --muted:#8A94A6;
  --line:rgba(255,255,255,.06); --line2:rgba(255,255,255,.03);
  --blue-soft:rgba(26,86,219,.18); --blue-ghost:rgba(26,86,219,.3);
  --green-soft:rgba(34,197,94,.12); --amber-soft:rgba(245,158,11,.12); --red-soft:rgba(239,68,68,.12);
  --violet-soft:rgba(122,60,255,.15); --cyan-soft:rgba(6,182,212,.12);
  --grid-pattern:radial-gradient(circle at 1px 1px,rgba(255,255,255,.04) 1px,transparent 0);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:'Inter','Segoe UI',-apple-system,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased;font-size:14px;min-height:100vh}
.mono{font-family:'JetBrains Mono','SF Mono',Menlo,monospace}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit;font-size:14px}
a{color:inherit;text-decoration:none}
::selection{background:var(--blue-ghost);color:var(--blue-ink)}

/* GRID BG */
body::before{content:"";position:fixed;inset:0;background-image:var(--grid-pattern);background-size:24px 24px;pointer-events:none;z-index:0}
.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh;position:relative;z-index:1}
.main{display:flex;flex-direction:column;min-width:0}

/* SIDEBAR */
.sidebar{background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;backdrop-filter:blur(12px)}
.side-hd{padding:20px 18px;border-bottom:1px solid var(--line2)}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.logo{width:36px;height:36px}
.brand-name{font-size:16px;font-weight:800;letter-spacing:-.02em}
.brand-name span{background:linear-gradient(90deg,var(--blue),var(--cyan));-webkit-background-clip:text;background-clip:text;color:transparent}
.brand-sub{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:.1em;margin-top:2px}

.team-card{padding:14px;border:1px solid var(--line);border-radius:12px;background:linear-gradient(135deg,var(--blue-soft),var(--violet-soft))}
.team-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.team-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:11px;border:2px solid var(--panel)}
.team-stack{display:flex}
.team-stack .team-av{margin-left:-6px}
.team-stack .team-av:first-child{margin-left:0}
.team-name{font-size:12px;font-weight:600}
.team-role{font-size:10px;color:var(--muted);margin-top:1px}
.team-env{display:inline-flex;align-items:center;gap:6px;font-size:10px;color:var(--muted);margin-top:6px;font-family:'JetBrains Mono',monospace;letter-spacing:.05em}
.team-env .dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.side-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;padding:16px 20px 6px}
.nav-item{display:flex;align-items:center;gap:12px;padding:9px 18px;cursor:pointer;transition:all .15s;border-left:3px solid transparent;color:var(--ink2);position:relative}
.nav-item:hover{background:var(--bg2)}
.nav-item.active{background:var(--blue-soft);border-left-color:var(--blue);color:var(--blue-ink)}
.nav-ic{width:28px;height:28px;border-radius:8px;background:var(--bg2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.nav-item.active .nav-ic{background:var(--blue);color:#fff}
.nav-lbl{font-size:13px;font-weight:500;flex:1}
.nav-meta{font-size:10px;color:var(--muted);padding:2px 7px;background:var(--bg2);border-radius:999px;font-weight:700;font-family:'JetBrains Mono',monospace}
.nav-meta.amber{background:var(--amber-soft);color:var(--amber)}
.nav-meta.red{background:var(--red-soft);color:var(--red)}
.nav-meta.green{background:var(--green-soft);color:var(--green)}
.nav-item.active .nav-meta{background:var(--blue);color:#fff}

.side-foot{margin-top:auto;padding:14px 18px;border-top:1px solid var(--line2)}
.revenue-ticker{padding:12px;background:linear-gradient(135deg,rgba(101,217,64,.1),rgba(6,182,212,.1));border:1px solid rgba(101,217,64,.3);border-radius:10px;margin-bottom:8px}
.rt-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.rt-val{font-size:clamp(16px,2vw,20px);font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--green);display:flex;align-items:center;gap:6px;word-break:break-all}
.rt-val::before{content:"▲";font-size:12px}
.rt-delta{font-size:11px;color:var(--muted);margin-top:2px}
.rt-delta b{color:var(--green)}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:14px;padding:12px 24px;background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:50;flex-shrink:0;backdrop-filter:blur(12px)}
.breadcrumb{font-size:13px;color:var(--muted)}
.breadcrumb b{color:var(--ink);font-weight:600}
.status-pill{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;background:var(--bg2);border:1px solid var(--line);border-radius:999px;font-size:11px;color:var(--ink2);font-family:'JetBrains Mono',monospace;letter-spacing:.05em}
.status-pill .dot{width:6px;height:6px;background:var(--green);border-radius:50%;box-shadow:0 0 0 3px var(--green-soft)}
.status-pill.warn{background:var(--amber-soft);border-color:var(--amber);color:var(--amber)}
.status-pill.warn .dot{background:var(--amber);box-shadow:0 0 0 3px rgba(245,158,11,.15)}
.status-pill.red{background:var(--red-soft);border-color:var(--red);color:var(--red)}
.status-pill.red .dot{background:var(--red);animation:pulse 1s infinite}

.search-btn{display:flex;align-items:center;gap:10px;padding:7px 12px;background:var(--bg2);border:1px solid transparent;border-radius:8px;width:280px;transition:all .15s;color:var(--muted);cursor:pointer;font-family:inherit}
.search-btn:hover{background:var(--panel);border-color:var(--line)}
.search-btn .kbd{font-size:10px;padding:2px 6px;background:var(--panel);border:1px solid var(--line);border-radius:4px;margin-left:auto;font-family:'JetBrains Mono',monospace;color:var(--muted)}
.icon-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--line);background:var(--panel);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:all .15s;color:var(--ink2)}
.icon-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-soft)}
.badge-dot{position:absolute;top:4px;right:4px;min-width:14px;height:14px;padding:0 3px;background:var(--red);color:#fff;border-radius:999px;border:2px solid var(--panel);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}
.badge-dot.amber{background:var(--amber)}
.lang-btn{display:flex;gap:0;background:var(--bg2);border-radius:7px;padding:2px;border:1px solid var(--line)}
.lang-btn button{padding:4px 8px;border-radius:5px;border:0;background:transparent;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.05em;cursor:pointer}
.lang-btn button.on{background:var(--panel);color:var(--blue);box-shadow:var(--shadow)}

/* VIEW */
.view{padding:24px 32px 60px;max-width:1440px;margin:0 auto;width:100%}
.page-hd{margin-bottom:20px;display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap}
.page-hd h1{font-size:24px;font-weight:800;letter-spacing:-.02em;line-height:1.15}
.page-hd h1 em{background:linear-gradient(90deg,var(--blue),var(--cyan));-webkit-background-clip:text;background-clip:text;color:transparent;font-style:normal}
.page-hd .sub{color:var(--muted);font-size:13px;margin-top:4px}

/* CARDS */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;transition:all .2s}
.card-hd{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 10px;gap:12px}
.card-hd h3{font-size:13px;font-weight:700;letter-spacing:-.01em;display:flex;align-items:center;gap:8px}
.card-hd .actions{display:flex;gap:6px}
.card-body{padding:10px 20px 20px}

/* BUTTONS */
.btn{padding:8px 14px;border-radius:var(--radius-sm);font-size:12.5px;font-weight:600;cursor:pointer;border:0;transition:all .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-p{background:var(--blue);color:#fff}
.btn-p:hover{background:var(--blue-ink);transform:translateY(-1px);box-shadow:0 4px 12px -4px var(--blue)}
.btn-s{background:var(--panel);color:var(--ink2);border:1px solid var(--line)}
.btn-s:hover{border-color:var(--blue);color:var(--blue)}
.btn-g{background:transparent;color:var(--muted);border:1px solid var(--line);padding:5px 10px;font-size:11px;border-radius:6px}
.btn-g:hover{color:var(--blue);border-color:var(--blue)}
.btn-success{background:var(--green);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-warn{background:var(--amber);color:#fff}
.btn-gradient{background:linear-gradient(135deg,var(--blue),var(--violet));color:#fff}
.btn-gradient:hover{transform:translateY(-1px);box-shadow:0 8px 20px -6px var(--violet)}

/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;position:relative;overflow:hidden;transition:all .2s}
.kpi:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.kpi::after{content:"";position:absolute;inset:0;background:var(--accent-fade);opacity:0;transition:opacity .2s;pointer-events:none}
.kpi:hover::after{opacity:.06}
.kpi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.kpi-ic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--blue-soft);color:var(--blue)}
.kpi-ic.g{background:var(--green-soft);color:var(--green)}
.kpi-ic.a{background:var(--amber-soft);color:var(--amber)}
.kpi-ic.v{background:var(--violet-soft);color:var(--violet)}
.kpi-ic.c{background:var(--cyan-soft);color:var(--cyan)}
.kpi-ic.r{background:var(--red-soft);color:var(--red)}
.delta{font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px}
.delta.up{background:var(--green-soft);color:var(--green)}
.delta.dn{background:var(--red-soft);color:var(--red)}
.delta.eq{background:var(--bg2);color:var(--muted)}
.kpi-lbl{font-size:10.5px;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em;font-weight:700}
.kpi-val{font-size:clamp(18px,2.4vw,24px);font-weight:800;letter-spacing:-.02em;font-family:'JetBrains Mono',monospace;line-height:1.15;word-break:break-word;overflow-wrap:anywhere}
.kpi-val small{font-size:clamp(11px,1.4vw,13px);color:var(--muted);font-weight:600}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:6px}
.spark{width:100%;height:36px;margin-top:8px;opacity:.7}

/* GRIDS */
.g2{display:grid;grid-template-columns:1.5fr 1fr;gap:14px;margin-bottom:16px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:16px}
.g2e{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}

/* CHIPS */
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;font-size:10.5px;font-weight:700;background:var(--bg2);color:var(--ink2);font-family:'JetBrains Mono',monospace;letter-spacing:.04em}
.chip.blue{background:var(--blue-soft);color:var(--blue)}
.chip.green{background:var(--green-soft);color:var(--green)}
.chip.amber{background:var(--amber-soft);color:var(--amber)}
.chip.red{background:var(--red-soft);color:var(--red)}
.chip.violet{background:var(--violet-soft);color:var(--violet)}
.chip.cyan{background:var(--cyan-soft);color:var(--cyan)}

/* ACTIVITY FEED */
.feed{max-height:500px;overflow-y:auto}
.feed-item{padding:10px 18px;border-top:1px solid var(--line2);display:flex;gap:10px;align-items:flex-start;transition:background .15s}
.feed-item:first-child{border-top:0}
.feed-item:hover{background:var(--bg2)}
.feed-ic{width:28px;height:28px;border-radius:8px;background:var(--blue-soft);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.feed-ic.g{background:var(--green-soft);color:var(--green)}
.feed-ic.a{background:var(--amber-soft);color:var(--amber)}
.feed-ic.r{background:var(--red-soft);color:var(--red)}
.feed-ic.v{background:var(--violet-soft);color:var(--violet)}
.feed-body{flex:1;min-width:0}
.feed-title{font-size:12.5px;font-weight:600}
.feed-sub{font-size:11px;color:var(--muted);margin-top:1px}
.feed-time{font-size:10.5px;color:var(--muted);font-family:'JetBrains Mono',monospace;flex-shrink:0}

/* CLIENT ROW */
.client-row{padding:12px 18px;border-top:1px solid var(--line2);display:grid;grid-template-columns:40px 1.5fr 80px 80px 100px 80px 90px 60px;gap:12px;align-items:center;transition:background .15s;cursor:pointer}
.client-row:first-child{border-top:0}
.client-row:hover{background:var(--bg2)}
.client-row.table-hd{background:var(--bg2);font-size:10.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:10px 18px;cursor:default}
.client-row.table-hd:hover{background:var(--bg2)}
.client-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:11px}
.client-name{font-size:13px;font-weight:600}
.client-meta{font-size:11px;color:var(--muted)}
.health-bar{width:100%;height:5px;background:var(--bg2);border-radius:999px;overflow:hidden;margin-top:3px}
.health-bar span{display:block;height:100%;background:linear-gradient(90deg,var(--red),var(--amber),var(--green));border-radius:999px}

/* MAP */
.map-wrap{position:relative;background:linear-gradient(180deg,var(--bg2),var(--panel));border-radius:var(--radius);padding:20px;overflow:hidden;min-height:360px}
.map-marker{position:absolute;width:10px;height:10px;border-radius:50%;background:var(--blue);box-shadow:0 0 0 4px var(--blue-soft),0 0 12px var(--blue);animation:markerPulse 3s infinite;cursor:pointer;transition:transform .2s}
.map-marker:hover{transform:scale(1.5);z-index:2}
.map-marker.red{background:var(--red);box-shadow:0 0 0 4px var(--red-soft),0 0 12px var(--red)}
.map-marker.amber{background:var(--amber);box-shadow:0 0 0 4px var(--amber-soft),0 0 12px var(--amber)}
.map-marker.violet{background:var(--violet);box-shadow:0 0 0 4px var(--violet-soft),0 0 12px var(--violet)}
@keyframes markerPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}

/* FUNNEL */
.funnel-step{padding:12px 18px;margin-bottom:6px;background:var(--bg2);border-radius:10px;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden}
.funnel-step::before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,var(--blue-soft),transparent);opacity:.6}
.funnel-label{flex:1;font-size:13px;font-weight:600;position:relative}
.funnel-n{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:18px;position:relative;color:var(--blue)}
.funnel-pct{font-size:11px;color:var(--muted);margin-left:10px;position:relative}

/* PROGRESS */
.progress{height:10px;background:var(--bg2);border-radius:999px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--blue),var(--cyan));border-radius:999px;transition:width .6s}

/* GAUGE */
.gauge{position:relative;width:160px;height:80px;margin:0 auto}
.gauge svg{display:block}
.gauge-val{position:absolute;bottom:0;left:50%;transform:translateX(-50%);text-align:center;font-weight:800;font-size:clamp(16px,2.4vw,22px);font-family:'JetBrains Mono',monospace;line-height:1.15}
.gauge-val small{font-size:10px;color:var(--muted);display:block;margin-top:2px;font-weight:500}

/* TIMELINE */
.timeline{position:relative;padding-left:24px;padding-top:6px}
.timeline::before{content:"";position:absolute;left:6px;top:6px;bottom:6px;width:2px;background:var(--line)}
.tl-item{position:relative;padding-bottom:18px}
.tl-item::before{content:"";position:absolute;left:-24px;top:4px;width:14px;height:14px;border-radius:50%;background:var(--panel);border:3px solid var(--blue)}
.tl-item.g::before{border-color:var(--green)}
.tl-item.a::before{border-color:var(--amber)}
.tl-item.r::before{border-color:var(--red)}
.tl-time{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.tl-body{font-size:13px;color:var(--ink);margin-top:3px}

/* TOAST */
#toast-container{position:fixed;top:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--blue);padding:12px 16px;border-radius:var(--radius-sm);box-shadow:var(--shadow-xl);min-width:280px;font-size:13px;display:flex;align-items:flex-start;gap:10px;animation:slideIn .3s ease;pointer-events:auto}
.toast.success{border-left-color:var(--green)}
.toast.warn{border-left-color:var(--amber)}
.toast.error{border-left-color:var(--red)}
.toast .i{font-size:18px;flex-shrink:0}
.toast-body{flex:1}
.toast-body b{display:block;margin-bottom:2px}
.toast-body small{color:var(--muted);font-size:11.5px}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}

/* MODAL */
#modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.7);backdrop-filter:blur(6px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
#modal-overlay.hidden{display:none}
.modal{background:var(--panel);border-radius:var(--radius);max-width:720px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-xl);animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-hd{padding:16px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.modal-hd h3{font-size:16px;font-weight:700}
.modal-close{border:0;background:var(--bg2);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:16px;color:var(--muted)}
.modal-close:hover{background:var(--red-soft);color:var(--red)}
.modal-body{padding:20px}
.modal-foot{padding:14px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px;background:var(--bg2)}

/* CMD PALETTE */
#command-palette{position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(4px);z-index:150;display:flex;align-items:flex-start;justify-content:center;padding-top:100px}
#command-palette.hidden{display:none}
.cp{background:var(--panel);border-radius:var(--radius);max-width:600px;width:calc(100% - 40px);overflow:hidden;box-shadow:var(--shadow-xl);animation:slideUp .2s ease}
.cp-input{width:100%;padding:18px 24px;border:0;border-bottom:1px solid var(--line);background:var(--panel);color:var(--ink);font-size:16px}
.cp-input:focus{outline:0}
.cp-results{max-height:440px;overflow-y:auto}
.cp-group-title{padding:6px 24px;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:4px}
.cp-item{padding:10px 24px;display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px}
.cp-item:hover{background:var(--blue-soft);color:var(--blue-ink)}
.cp-item .meta{margin-left:auto;font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace}

/* FILTER BAR */
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filter-pill{padding:6px 12px;background:var(--panel);border:1px solid var(--line);border-radius:999px;font-size:12px;cursor:pointer;color:var(--ink2);transition:all .15s;font-weight:500}
.filter-pill:hover{border-color:var(--blue);color:var(--blue)}
.filter-pill.on{background:var(--blue);color:#fff;border-color:var(--blue)}

.form-ctrl{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--panel);color:var(--ink);font-size:13px}
.form-ctrl:focus{outline:0;border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,219,.12)}

/* LOG BLOCK */
.log{font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--bg2);padding:14px;border-radius:10px;max-height:280px;overflow-y:auto;line-height:1.7}
.log-line{display:flex;gap:8px;align-items:flex-start}
.log-t{color:var(--muted);flex-shrink:0}
.log-lvl{flex-shrink:0;font-weight:700}
.log-lvl.info{color:var(--blue)}
.log-lvl.ok{color:var(--green)}
.log-lvl.warn{color:var(--amber)}
.log-lvl.err{color:var(--red)}

/* CHART ANIM */
.ticker-up{color:var(--green);animation:flashGreen .8s}
@keyframes flashGreen{0%{background:var(--green-soft)}100%{background:transparent}}

/* BADGES PLAN */
.plan-free{background:#F1F5F9;color:#64748B}
.plan-starter{background:var(--blue-soft);color:var(--blue)}
.plan-pro{background:var(--violet-soft);color:var(--violet)}
.plan-scale{background:linear-gradient(135deg,#F59E0B,#EF4444);color:#fff}

/* AI FAB */
.ai-fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--violet));color:#fff;border:0;cursor:pointer;box-shadow:0 10px 30px -8px var(--violet);z-index:40;display:flex;align-items:center;justify-content:center;font-size:22px}
.ai-fab::after{content:"";position:absolute;inset:-4px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--violet));opacity:.3;animation:pulseRing 2s infinite;z-index:-1}
@keyframes pulseRing{0%{transform:scale(1);opacity:.5}100%{transform:scale(1.4);opacity:0}}

/* HIDDEN + UTIL */
.hidden{display:none!important}
.mt8{margin-top:8px}.mt16{margin-top:16px}
.flex{display:flex;gap:10px;align-items:center}.between{justify-content:space-between}

/* GRADIENT BORDER */
.gradient-border{background:linear-gradient(135deg,var(--blue),var(--violet),var(--cyan));padding:1.5px;border-radius:var(--radius)}
.gradient-border .inner{background:var(--panel);border-radius:calc(var(--radius) - 1.5px);padding:20px}

/* MENU TOGGLE (hamburger) — visible uniquement < 1100px */
.menu-toggle{display:none;width:36px;height:36px;border-radius:8px;border:1px solid var(--line);background:var(--panel);align-items:center;justify-content:center;cursor:pointer;color:var(--ink2);flex-shrink:0;transition:all .15s}
.menu-toggle:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-soft)}
.menu-toggle:focus-visible{outline:2px solid var(--blue);outline-offset:2px}
.sidebar-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.55);backdrop-filter:blur(2px);z-index:85;opacity:0;visibility:hidden;transition:opacity .2s,visibility .2s}
.sidebar-backdrop.show{opacity:1;visibility:visible}

/* FOCUS RINGS (a11y) */
button:focus-visible,a:focus-visible,.nav-item:focus-visible,.filter-pill:focus-visible{outline:2px solid var(--blue);outline-offset:2px;border-radius:6px}
.form-ctrl:focus,.cp-input:focus{outline:0;border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,219,.18);transition:box-shadow .15s}

/* RESPONSIVE — mobile-first cascade */
@media(max-width:1280px){
  .view{padding:22px 24px 50px}
  .kpi-grid{gap:12px}
}
@media(max-width:1100px){
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed;inset:0 auto 0 0;width:280px;max-width:85vw;z-index:90;transform:translateX(-100%);transition:transform .25s ease;box-shadow:0 20px 60px rgba(0,0,0,.3);height:100vh}
  .sidebar.open{transform:translateX(0)}
  .menu-toggle{display:inline-flex}
  .kpi-grid,.g4{grid-template-columns:repeat(2,1fr)}
  .g2,.g3,.g2e{grid-template-columns:1fr}
  .view{padding:20px 18px 44px}
  .search-btn{display:none}
  .topbar .status-pill{display:none}
}
@media(max-width:760px){
  .topbar{padding:10px 14px;gap:8px}
  .breadcrumb{font-size:12.5px;min-width:0;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lang-btn button{padding:3px 7px;font-size:10.5px}
  .ai-fab{bottom:18px;right:18px;width:50px;height:50px;font-size:20px}
  .modal{max-width:100%;border-radius:12px}
  .map-wrap{min-height:260px}
  .feed{max-height:380px}
  .client-row{grid-template-columns:36px 1fr 70px 60px;gap:8px;padding:10px 14px}
  .client-row .col-hide-md{display:none}
}
@media(max-width:520px){
  .kpi-grid,.g4,.g3{grid-template-columns:1fr}
  .kpi{padding:14px 16px}
  .kpi-val{font-size:clamp(17px,5vw,22px)}
  .kpi-val small{font-size:11px}
  .kpi-ic{width:32px;height:32px;font-size:14px}
  .view{padding:14px 12px 30px}
  .page-hd h1{font-size:20px}
  .page-hd .sub{font-size:12px}
  .funnel-n{font-size:15px}
  .funnel-step{padding:10px 14px}
  .gauge-val{font-size:18px}
  .rt-val{font-size:16px}
  .gauge{width:140px;height:70px}
  .modal-hd{padding:14px 18px}
  .modal-body{padding:16px}
  .topbar{padding:8px 12px}
  .icon-btn{width:32px;height:32px}
  .lang-btn{padding:1px}.lang-btn button{padding:2px 5px;font-size:10px}
  #toast-container{top:14px;right:14px;left:14px}
  .toast{min-width:0;width:100%}
  .ai-fab{bottom:14px;right:14px;width:46px;height:46px;font-size:18px}
}
@media(max-width:380px){

  .breadcrumb{font-size:11.5px}
}

/* PERF — limiter les animations infinies sur batterie/réduit */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
}

<script>
/* ============================================================

// ---------- I18N ----------
const I18N = {
  fr: {'nav.overview':'Vue d\'ensemble','nav.clients':'Clients PME','nav.revenue':'Revenus & MRR','nav.analytics':'Analytics','nav.agents':'Agents IA','nav.ops':'Ops · Infra','nav.support':'Support','nav.growth':'Growth','nav.campaigns':'Broadcasts','nav.alerts':'Alertes','nav.settings':'Paramètres'},

function generateClients(){
  const names = ['Don Carlos','Bella Vista','Casa del Pan','Peluquería María','Dr. Ramírez','Café Central','La Esquina','Don Tito','Flores Valentina','Panadería San Pedro','Taller Los Andes','Spa Zen','Clínica Smile','Yoga Aurora','Boutique Luna','Ferretería El Clavo','Contabilidad Gómez','Estudio Jurídico Soto','Gimnasio Power','Óptica Visión','Librería Cervantes','Dulcería Anita','Veterinaria Patitas','Mecánica Rápida','Restaurante El Parrón','Café La Nube','Panadería Araucana','Spa Termal','Peluquería Chic','Dental Care','Clínica Integral','Escuela de Música','Tienda Orgánica','Yoga Studio','Barbería Retro','Cervecería Artesanal','Heladería Italiana','Tattoo Studio','Pizzería Don Pepe','Floristería Rosa','Panadería Doña Rosa','Pastelería Dulce','Cafetería Montaña','Librería del Mar','Academia Baile','Óptica del Centro','Abogados Asociados','Papelería San José','Mueblería Norte','Panificadora Austral'];

    const plan = i<6 ? PLANS[3] : i<22 ? PLANS[2] : i<38 ? PLANS[1] : PLANS[0];
    const city = CITIES_CL[i % CITIES_CL.length];

const CLIENTS = generateClients();

const MOCK_FEED = [

const MOCK_ALERTS = [
  {id:1,lvl:'red',title:'Churn imminent — Taller Los Andes',body:'Health 38%, 0 message 8 jours, 2 tickets ouverts. Action recommandée: appel CEO.',age:'Il y a 12 min'},

const INCIDENTS_LOG = [
  {t:'14:23:04',lvl:'ok',msg:'All systems nominal · MRR ticker → 14,726 €'},
  {t:'14:22:41',lvl:'info',msg:'n8n workflow "daily-summary" triggered for 47 tenants'},

// ---------- STATE ----------
const DEFAULT_STATE = {

const STORAGE_KEY = 'nexus_pulse_state_v1';

const Px = {
  state:null,
  init(){
    const saved = localStorage.getItem(STORAGE_KEY);

  startLive(){
    // Live MRR ticker
    setInterval(()=>{
      if (Math.random() > 0.7) {
        const inc = Math.floor(Math.random()*15)+3;
        this.state.mrrLive += inc;

  kpi(ic,lbl,val,delta,sub,kind,spark){
    const deltaClass = delta > 0 ? 'up' : delta < 0 ? 'dn' : 'eq';
    const sign = delta > 0 ? '▲' : delta < 0 ? '▼' : '–';
    return `<div class="kpi">
      <div class="kpi-top"><div class="kpi-ic ${kind||''}">${ic}</div><span class="delta ${deltaClass}">${sign} ${Math.abs(delta)}%</span></div>
      <div class="kpi-lbl">${lbl}</div>
      <div class="kpi-val">${val}</div>
      <div class="kpi-sub">${sub}</div>
      ${spark||''}
    </div>`;
  },

  sparkSvg(data,color='#1A56DB'){
    const w=220,h=36;
    const max = Math.max(...data), min = Math.min(...data);
    const pts = data.map((v,i)=>{
      const x = (i/(data.length-1))*w;
      const y = h - ((v-min)/(max-min+0.001))*h*0.85 - h*0.075;
      return `${x},${y}`;
    }).join(' ');
    return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
      <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="0,${h} ${pts} ${w},${h}" fill="${color}" fill-opacity=".12"/>
    </svg>`;
  },

  revenueChart(){
    const data = [6800,7900,9100,10200,12100,13500,14726];
    const labels = ['Nov','Déc','Jan','Fév','Mar','Avr','Mai'];
    const max = Math.max(...data);
    // Dimensions en pixels (le viewBox = pixels rendus, donc font-size reste lisible)
    const W = 700, H = 240;
    const padX = 24, padTop = 32, padBottom = 28;
    const plotW = W - padX*2;
    const plotH = H - padTop - padBottom;
    const barW = plotW / data.length * 0.62;
    const gap = (plotW - barW*data.length) / (data.length-1);
    const bars = data.map((v,i)=>{
      const h = v/max*plotH;
      const x = padX + i*(barW+gap);
      const y = padTop + (plotH - h);
      const cx = x + barW/2;
      return `<g>
        <rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${h.toFixed(1)}" fill="url(#revG)" rx="6"/>
        <text x="${cx.toFixed(1)}" y="${(y-8).toFixed(1)}" font-size="12" fill="#1A56DB" text-anchor="middle" font-family="JetBrains Mono,monospace" font-weight="700">€${(v/1000).toFixed(1)}k</text>
        <text x="${cx.toFixed(1)}" y="${(H-10).toFixed(1)}" font-size="11" fill="#8A94A6" text-anchor="middle" font-family="JetBrains Mono,monospace">${labels[i]}</text>
      </g>`;
    }).join('');
    return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;max-height:280px;display:block" preserveAspectRatio="xMidYMid meet" role="img" aria-label="MRR growth 6 derniers mois">
      <defs><linearGradient id="revG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1A56DB"/><stop offset="100%" stop-color="#7A3CFF" stop-opacity=".55"/></linearGradient></defs>
      ${bars}
    </svg>`;
  },

  revenueChart12(){
    // 12 months of data + 3 future projection
    const data = [4100,4800,5600,6200,6800,7900,9100,10200,12100,13500,14726,null,null,null];
    const forecast = [null,null,null,null,null,null,null,null,null,null,14726,16200,18000,20400];
    const labels = ['Jui','Jul','Aoû','Sep','Oct','Nov','Déc','Jan','Fév','Mar','Avr','Mai','Jun','Jul'];
    const W = 800, H = 260;
    const max = 22000;
    const padL = 40, padR = 10, padT = 20, padB = 30;
    const chartW = W-padL-padR, chartH = H-padT-padB;
    const x = i => padL + (i/(data.length-1))*chartW;
    const y = v => v===null ? null : padT + chartH - (v/max)*chartH;

    let dataPath = '', forecastPath = '';
    data.forEach((v,i)=>{ if(v===null) return; dataPath += (dataPath?'L ':'M ')+x(i)+' '+y(v)+' '; });
    forecast.forEach((v,i)=>{ if(v===null) return; forecastPath += (forecastPath?'L ':'M ')+x(i)+' '+y(v)+' '; });

    return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:260px" preserveAspectRatio="xMidYMid meet">
      <defs><linearGradient id="rG2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1A56DB" stop-opacity=".3"/><stop offset="100%" stop-color="#1A56DB" stop-opacity="0"/></linearGradient></defs>
      <g stroke="#E2E8F0" stroke-width="1">
        ${[0,5000,10000,15000,20000].map(v=>`<line x1="${padL}" y1="${y(v)}" x2="${W-padR}" y2="${y(v)}"/><text x="${padL-6}" y="${y(v)+3}" font-size="10" fill="#94A3B8" text-anchor="end" font-family="JetBrains Mono">€${v/1000}k</text>`).join('')}
      </g>
      <path d="${dataPath}" fill="none" stroke="#1A56DB" stroke-width="2.5" stroke-linecap="round"/>
      <path d="${dataPath} L ${x(10)} ${padT+chartH} L ${x(0)} ${padT+chartH} Z" fill="url(#rG2)"/>
      <path d="${forecastPath}" fill="none" stroke="#7A3CFF" stroke-width="2" stroke-linecap="round" stroke-dasharray="6 4"/>
      ${data.map((v,i)=>v!==null?`<circle cx="${x(i)}" cy="${y(v)}" r="3.5" fill="#1A56DB"/>`:'').join('')}
      ${forecast.map((v,i)=>v!==null&&i>10?`<circle cx="${x(i)}" cy="${y(v)}" r="3.5" fill="#7A3CFF" stroke="#fff" stroke-width="1"/>`:'').join('')}
      ${labels.map((l,i)=>`<text x="${x(i)}" y="${H-10}" font-size="10" fill="#94A3B8" text-anchor="middle" font-family="JetBrains Mono">${l}</text>`).join('')}
      <text x="${x(12)}" y="${y(16200)-8}" font-size="9" fill="#7A3CFF" text-anchor="middle">Forecast</text>
    </svg>`;
  },

  apiUsageChart(){
    const days = 30;
    const data = Array.from({length:days},(_,i)=>Math.round(40+Math.sin(i/4)*15+Math.random()*12+i*1.5));
    const max = Math.max(...data);
    const W=800, H=180;
    const x = i => (i/(days-1))*(W-20)+10;
    const y = v => H-20 - (v/max)*(H-30);
    let path = data.map((v,i)=>(i===0?'M ':'L ')+x(i)+' '+y(v)).join(' ');
    return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:180px" preserveAspectRatio="xMidYMid meet">
      <defs><linearGradient id="apiG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#06B6D4" stop-opacity=".3"/><stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/></linearGradient></defs>
      <g stroke="#F1F5F9" stroke-width="1">
        ${[0,25,50,75,100].map(p=>`<line x1="10" y1="${H-20-p/100*(H-30)}" x2="${W-10}" y2="${H-20-p/100*(H-30)}"/>`).join('')}
      </g>
      <path d="${path} L ${x(days-1)} ${H-20} L ${x(0)} ${H-20} Z" fill="url(#apiG)"/>
      <path d="${path}" fill="none" stroke="#06B6D4" stroke-width="2" stroke-linecap="round"/>
      ${data.map((v,i)=>i%5===0?`<circle cx="${x(i)}" cy="${y(v)}" r="2.5" fill="#06B6D4"/><text x="${x(i)}" y="${H-5}" font-size="9" fill="#94A3B8" text-anchor="middle" font-family="JetBrains Mono">J${i+1}</text>`:'').join('')}
    </svg>`;
  },

  gaugeSvg(val,max){
    const pct = Math.min(1,val/max);
    const angle = pct * 180;
    const r = 60, cx = 80, cy = 70;
    const x2 = cx + r*Math.cos((180-angle)*Math.PI/180);
    const y2 = cy - r*Math.sin((180-angle)*Math.PI/180);
    const large = angle > 180 ? 1 : 0;
    const color = pct < 0.3 ? '#22C55E' : pct < 0.7 ? '#F59E0B' : '#EF4444';
    return `<svg viewBox="0 0 160 80" style="width:100%">
      <path d="M 20 70 A 60 60 0 0 1 140 70" fill="none" stroke="#F1F5F9" stroke-width="10" stroke-linecap="round"/>
      <path d="M 20 70 A 60 60 0 0 ${large} ${x2} ${y2}" fill="none" stroke="${color}" stroke-width="10" stroke-linecap="round"/>
      <text x="80" y="68" text-anchor="middle" font-size="20" font-weight="800" font-family="JetBrains Mono">${val}min</text>
    </svg>`;
  },

              <div style="width:36px;height:36px;border-radius:10px;background:var(--${a.lvl==='red'?'red-soft':a.lvl==='amber'?'amber-soft':'blue-soft'});color:var(--${a.lvl==='red'?'red':a.lvl==='amber'?'amber':'blue'});display:flex;align-items:center;justify-content:center;font-size:16px">${a.lvl==='red'?'🚨':a.lvl==='amber'?'⚠️':'💡'}</div>
              <div style="flex:1"><div style="font-weight:700;font-size:13px">${a.title}</div><div style="font-size:12px;color:var(--muted);margin-top:3px">${a.body}</div><div style="font-size:11px;color:var(--muted);margin-top:6px">${a.age}</div></div>
              <div class="flex" style="gap:6px"><button class="btn btn-p" style="font-size:11px" onclick="Px.toast('Action déclenchée','success')">Agir</button><button class="btn btn-s" style="font-size:11px" onclick="Px.toast('Silencé 24h','info')">Silence</button></div>
            </div>`).join('')}
          </div>
        </div>

        <div class="card">
          <div class="card-hd"><h3>⚙ Règles d'alerte actives</h3><span class="chip blue">12</span></div>
          <div class="card-body" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px">
            ${[
              'Health score < 40 pendant 3j',
              'Paiement échoué × 2 consécutifs',
              'Trial expire dans 48h',
              '0 message sur 7j consécutifs',
              'NPS < 20 sur survey',
              'Usage features > 80% (upsell)',
              'Churn prédit > 70% probabilité',
              'API latency p95 > 500ms 10min',
              'Claude tokens > 80% cap',
              'Stripe webhook fail × 3',
              'Support ticket > SLA',
              'Workflow n8n failed × 2'
            ].map(r=>`<div style="padding:12px;background:var(--bg2);border-radius:8px;display:flex;align-items:center;gap:10px"><span style="width:8px;height:8px;background:var(--green);border-radius:50%"></span><span style="flex:1;font-size:12px">${r}</span><button class="btn-g" onclick="Px.toast('Règle éditée','info')">⚙</button></div>`).join('')}
          </div>
        </div>
      </div>`;
  },

  // ---------- SETTINGS ----------
  viewSettings(){
    return `
      <div class="view">
        <div class="page-hd"><div><h1>⚙️ Paramètres · Nexus Pulse</h1><div class="sub">Ton cockpit, tes règles.</div></div></div>
        <div class="g2e">
          <div class="card" style="padding:22px">
            <h3 style="margin-bottom:14px">👥 Équipe</h3>
            ${[
              {n:'Juan Paillard',r:'Co-founder · Sales & Marketing',av:'J',col:'linear-gradient(135deg,#1A56DB,#7A3CFF)'},
              {n:'Iñigo Arze',r:'Co-founder · Tech & Product',av:'I',col:'linear-gradient(135deg,#06B6D4,#22C55E)'}
            ].map(m=>`<div class="flex" style="padding:10px 0;border-top:1px solid var(--line2);gap:12px">
              <div class="team-av" style="background:${m.col};width:36px;height:36px;font-size:13px">${m.av}</div>
              <div style="flex:1"><div style="font-weight:600;font-size:13px">${m.n}</div><div style="font-size:11px;color:var(--muted)">${m.r}</div></div>
              <span class="chip green">Admin</span>
            </div>`).join('')}
            <button class="btn btn-s" style="width:100%;margin-top:12px" onclick="Px.toast('Invitation envoyée','success')">+ Inviter un membre</button>
          </div>

          <div class="card" style="padding:22px">
            <h3 style="margin-bottom:14px">🔑 API & intégrations</h3>
            ${['Anthropic Claude API','Stripe (Live)','Supabase (Prod)','Vercel','Railway','WhatsApp Business','Meta Business','Google Cloud'].map(i=>`<div class="flex between" style="padding:8px 0;border-top:1px solid var(--line2)">
              <span style="font-size:13px">${i}</span>
              <span class="chip green">✓ Connecté</span>
            </div>`).join('')}
          </div>

          <div class="card" style="padding:22px">
            <h3 style="margin-bottom:14px">🛎 Notifications</h3>
            ${[
              {n:'Alertes push desktop',on:true},
              {n:'Daily digest email 09:00',on:true},
              {n:'Weekend mode (silence weekends)',on:false},
              {n:'Slack #ops channel alerts',on:true},
              {n:'SMS pour alertes rouges',on:true},
              {n:'Investor weekly report',on:true}
            ].map(n=>`<div class="flex between" style="padding:10px 0;border-top:1px solid var(--line2)">
              <span style="font-size:13px">${n.n}</span>
              <label style="position:relative;display:inline-block;width:34px;height:20px"><input type="checkbox" ${n.on?'checked':''} style="display:none"><span style="position:absolute;inset:0;background:${n.on?'var(--blue)':'var(--line)'};border-radius:999px;cursor:pointer;transition:background .2s"><span style="position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:2px;${n.on?'right:2px':'left:2px'};transition:all .2s"></span></span></label>
            </div>`).join('')}
          </div>

          <div class="card" style="padding:22px">
            <h3 style="margin-bottom:14px">🎨 Apparence</h3>
            <div style="padding:10px 0;border-bottom:1px solid var(--line2)"><div class="flex between"><span style="font-size:13px">Thème sombre</span><label style="position:relative;display:inline-block;width:34px;height:20px"><input type="checkbox" ${this.state.theme==='dark'?'checked':''} onchange="Px.toggleTheme()" style="display:none"><span style="position:absolute;inset:0;background:${this.state.theme==='dark'?'var(--blue)':'var(--line)'};border-radius:999px;cursor:pointer"><span style="position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:2px;${this.state.theme==='dark'?'right:2px':'left:2px'}"></span></span></label></div></div>
            <div style="padding:10px 0;border-bottom:1px solid var(--line2)"><span style="font-size:13px;display:block;margin-bottom:8px">Accent color</span>
              <div style="display:flex;gap:8px;flex-wrap:wrap">${['#1A56DB','#7A3CFF','#06B6D4','#22C55E','#EF4444','#F59E0B'].map(c=>`<div style="width:32px;height:32px;border-radius:10px;background:${c};cursor:pointer" onclick="document.documentElement.style.setProperty('--blue','${c}');Px.toast('Couleur appliquée','success')"></div>`).join('')}</div>
            </div>
            <div style="padding:10px 0"><button class="btn btn-s" style="width:100%" onclick="if(confirm('Reset démo?'))Px.reset()">🔄 Reset démo</button></div>
          </div>

};

window.addEventListener('DOMContentLoaded',()=>Px.init());
</script>
